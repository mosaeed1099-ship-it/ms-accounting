<!DOCTYPE html>
<!-- v3.2 — fix under_establishment loading: better error handling -->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/ms-accounting/sw.js', {updateViaCache:'none'})
        .then(function(reg) {
          // If new SW is waiting, activate it immediately
          if (reg.waiting) reg.waiting.postMessage({type:'SKIP_WAITING'});
          reg.addEventListener('updatefound', function() {
            var sw = reg.installing;
            sw.addEventListener('statechange', function() {
              if (sw.state === 'installed' && reg.waiting) {
                reg.waiting.postMessage({type:'SKIP_WAITING'});
              }
            });
          });
        })
        .catch(function(){});
    }
  </script>
  <title>MS Accounting — نظام إدارة مكتب المحاسبة</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Cairo','system-ui','sans-serif'] } } }
    }
  </script>
  <style>
    *{font-family:'Cairo',system-ui,sans-serif;box-sizing:border-box}
    body{background:#f1f5f9;margin:0}
    /* Sidebar */
    .sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.72);margin:1px 0}
    .sidebar-link:hover{background:rgba(255,255,255,.1);color:white}
    .sidebar-link.active{background:rgba(255,255,255,.18);color:white;box-shadow:0 3px 12px rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.15)}
    .sidebar-link .icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:16px;flex-shrink:0;background:rgba(255,255,255,.1)}
    .sidebar-link:hover .icon{background:rgba(255,255,255,.18)}
    .sidebar-link.active .icon{background:rgba(255,255,255,.22)}
    /* Cards */
    .card{background:white;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);border:1px solid #e8edf3}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:inherit}
    .btn-primary{background:linear-gradient(135deg,#1a2472,#152060);color:white;box-shadow:0 2px 8px rgba(37,99,235,.3)}
    .btn-primary:hover{background:linear-gradient(135deg,#152060,#0f1848);transform:translateY(-1px)}
    .btn-secondary{background:white;color:#374151;border:1.5px solid #d1d5db}
    .btn-secondary:hover{background:#f9fafb;border-color:#9ca3af}
    .btn-success{background:#16a34a;color:white}
    .btn-danger{background:#dc2626;color:white}
    .btn-sm{padding:5px 12px;font-size:12px}
    /* Inputs */
    .input{width:100%;padding:9px 13px;border:1.5px solid #d1d5db;border-radius:9px;font-size:13.5px;font-family:inherit;outline:none;transition:border .15s;background:white}
    .input:focus{border-color:#1a2472;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    /* Badges */
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600}
    .badge-green{background:#dcfce7;color:#15803d}
    .badge-blue{background:#d8def5;color:#152060}
    .badge-red{background:#fee2e2;color:#dc2626}
    .badge-yellow{background:#fef9c3;color:#a16207}
    .badge-gray{background:#f3f4f6;color:#4b5563}
    .badge-purple{background:#ede9fe;color:#6d28d9}
    .badge-orange{background:#fff7ed;color:#c2410c}
    /* Table */
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{padding:11px 14px;text-align:right;font-size:11px;color:#6b7280;font-weight:700;background:#f8fafc;border-bottom:1.5px solid #e5e7eb;text-transform:uppercase;letter-spacing:.3px}
    tbody td{padding:11px 14px;border-bottom:1px solid #f3f4f6;color:#374151}
    tbody tr:hover{background:#fafbff}
    tbody tr:last-child td{border-bottom:none}
    /* Modal */
    .modal-overlay,.modal-backdrop{position:fixed;inset:0;background:rgba(15,23,42,.72);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;backdrop-filter:blur(4px)}
    .modal{background:white;border-radius:18px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.25)}
    /* Toast */
    .toasts{position:fixed;top:16px;left:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast-item{display:flex;align-items:center;gap:10px;padding:13px 18px;background:white;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.12);min-width:280px;border-right:4px solid;animation:slideIn .25s ease}
    @keyframes slideIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
    /* Kanban */
    .kanban-col{background:#f8fafc;border-radius:14px;min-height:400px;border:1.5px solid #e8edf3}
    .kanban-card{background:white;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e8edf3;transition:all .15s;cursor:pointer}
    .kanban-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px)}
    /* Stat cards */
    .stat-card{background:white;border-radius:10px;padding:8px 12px;border:1px solid #e8edf3;box-shadow:0 1px 4px rgba(0,0,0,.06);position:relative;overflow:hidden}
    .stat-card::after{content:'';position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 14px 14px 0}
    .stat-blue::after{background:linear-gradient(180deg,#4478b0,#152060)}
    .stat-green::after{background:linear-gradient(180deg,#22c55e,#15803d)}
    .stat-red::after{background:linear-gradient(180deg,#f87171,#dc2626)}
    .stat-purple::after{background:linear-gradient(180deg,#a78bfa,#5b8ec4)}
    /* Page animation */
    .page{animation:fadeUp .2s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    /* Loading */
    .spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#1a2472;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Section headings */
    .section-title{font-size:15px;font-weight:700;color:#1a2472;margin:0 0 16px;padding-right:12px;border-right:3px solid #1a2472;line-height:1.4;display:flex;align-items:center;gap:6px}
    .page-section-title{font-size:15px;font-weight:700;color:#1a2472;margin:0 0 16px;padding:10px 14px;background:linear-gradient(135deg,#eef1fb,#f8fafc);border-radius:10px;border-right:4px solid #1a2472;display:flex;align-items:center;gap:8px}
    /* Scrollbar */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#f1f5f9}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
    select,textarea{font-family:inherit}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    @media(max-width:640px){.form-row{grid-template-columns:1fr}}
    /* Global compact layout — reduce bloated padding on cards/sections */
    .card{padding:16px!important}
    .page > *{margin-bottom:10px}
    /* Tables: no unnecessary overflow */
    #main>*{max-width:100%;box-sizing:border-box}
    .priority-urgent{border-right:3px solid #dc2626!important}
    .priority-high{border-right:3px solid #f97316!important}
    .priority-medium{border-right:3px solid #eab308!important}
    .priority-low{border-right:3px solid #22c55e!important}

    /* ── Responsive Layout ─────────────────────────────── */
    .app-sidebar{width:230px;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto;background:linear-gradient(180deg,#0c1340 0%,#1a2472 55%,#1e3a8a 100%);border-left:none;box-shadow:4px 0 24px rgba(15,24,72,.35)}
    .app-main{margin-right:0;flex:1;display:flex;flex-direction:column;min-height:100vh}
    .mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:#1a2472}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:190;backdrop-filter:blur(2px)}

    @media(max-width:768px){
      /* Sidebar: use transform instead of right:-250px so iOS Safari doesn't show it on page scroll */
      .app-sidebar{
        position:fixed;right:0;top:0;width:250px;height:100vh;
        z-index:200;
        transform:translateX(110%);
        transition:transform .28s ease;
        box-shadow:none;border-left:none
      }
      .app-sidebar.open{transform:translateX(0);box-shadow:-6px 0 24px rgba(0,0,0,.18)}
      .sidebar-overlay.open{display:block}
      /* Main content fills full width */
      .app-main{margin-right:0;max-width:100vw;overflow-x:hidden}
      /* Show hamburger button */
      .mobile-menu-btn{display:flex!important;align-items:center;justify-content:center}
      /* Tables: scroll only within their card container */
      .card{overflow-x:auto;-webkit-overflow-scrolling:touch}
      .table-responsive{overflow-x:auto;-webkit-overflow-scrolling:touch}
      /* Kanban columns stack */
      .kanban-col{min-width:260px}
      /* Stat cards: 2 columns */
      .stats-grid{grid-template-columns:1fr 1fr!important}
      /* Page padding */
      #main{padding:10px!important}
      /* Modal full width - bottom sheet on mobile */
      .modal-overlay{align-items:flex-end!important;padding:0!important}
      .modal{max-width:100%!important;width:100%!important;margin:0!important;border-radius:16px 16px 0 0!important;max-height:92vh!important;overflow-y:auto}
      /* Topbar */
      .topbar-date{display:none}
      .topbar-extra-btn{display:none!important}
      #globalSearchWrap .search-placeholder-text{display:none}
      /* Login card */
      .login-card{margin:12px!important;padding:24px!important}

      /* ── Dashboard responsive grids ── */
      .dash-kpi-grid{grid-template-columns:1fr 1fr!important}
      .dash-obl-breakdown{grid-template-columns:repeat(3,1fr)!important}
      .dash-charts-row{grid-template-columns:1fr!important}
      .dash-2col{grid-template-columns:1fr!important}
      .dash-formation-pipeline{grid-template-columns:repeat(5,1fr)!important;overflow-x:auto}

      /* KPI card: smaller font on mobile */
      .ea-kpi .kpi-number{font-size:26px!important;letter-spacing:-.5px!important}
      .ea-kpi{padding:16px 14px!important}

      /* Charts: scrollable wrapper */
      .ea-white-card{overflow-x:auto}

      /* Topbar: compact on mobile */
      #topbar-wrap{padding:10px 12px!important}
      #pageTitle{font-size:15px!important}
      /* Search: icon-only on mobile */
      #globalSearchWrap>div{padding:0 10px!important;min-width:38px;width:38px}
      .search-placeholder-text{display:none!important}

      /* Form rows */
      .form-row{grid-template-columns:1fr!important}
      .form-group{margin-bottom:12px}

      /* Leads table mobile fix */
      .leads-table-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch}
    }

    /* ── Tasks page mobile ── */
    @media(max-width:768px){
      .tasks-inner-sidebar{display:none!important}
      .tasks-day-strip{display:flex!important}
      #tasksMainTable{min-width:400px}
    }
    .tasks-day-strip{display:none;overflow-x:auto;gap:6px;padding:8px 12px;background:#fff;border-bottom:1px solid #e2e8f0;-webkit-overflow-scrolling:touch}
    .tasks-day-pill{white-space:nowrap;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:600;cursor:pointer;border:1.5px solid #e2e8f0;background:#f8fafc;color:#64748b}
    .tasks-day-pill.active{background:#1e3a5f;color:#fff;border-color:#1e3a5f}

    @media(max-width:480px){
      .stats-grid{grid-template-columns:1fr!important}
      .dash-kpi-grid{grid-template-columns:1fr!important}
      .dash-obl-breakdown{grid-template-columns:repeat(2,1fr)!important}
      .dash-formation-pipeline{grid-template-columns:repeat(3,1fr)!important}
      thead th{font-size:10px;padding:8px}
      tbody td{font-size:12px;padding:8px}
      #main{padding:8px!important}
    }

    /* ── Global responsive grids for all pages ── */
    @media(max-width:600px){
      /* Any 4+ column grids become 2 columns on mobile */
      #main [style*="grid-template-columns:repeat(4"]{grid-template-columns:repeat(2,1fr)!important}
      #main [style*="grid-template-columns:repeat(5"]{grid-template-columns:repeat(2,1fr)!important}
      #main [style*="grid-template-columns:repeat(10"]{grid-template-columns:repeat(3,1fr)!important;overflow-x:auto}
      /* 3-column grids become 2 */
      #main [style*="grid-template-columns:repeat(3"]{grid-template-columns:repeat(2,1fr)!important}
      /* Multi-fr side-by-side layouts stack */
      #main [style*="grid-template-columns:3fr"]{grid-template-columns:1fr!important}
      #main [style*="grid-template-columns:2fr 1fr"]{grid-template-columns:1fr!important}
      #main [style*="grid-template-columns:1fr 1fr"]{grid-template-columns:1fr!important}
      /* Inputs full-width in forms */
      .form-row,[class*="form-grid"]{grid-template-columns:1fr!important}
    }

    /* ─── Bottom Navigation Bar (Mobile only) ─── */
    .bottom-nav{display:none}
    @media(max-width:768px){
      .bottom-nav{
        display:flex;position:fixed;bottom:0;left:0;right:0;z-index:180;
        background:white;border-top:1.5px solid #e8edf3;
        box-shadow:0 -4px 20px rgba(0,0,0,.08);
        height:62px;align-items:stretch;
        padding-bottom:env(safe-area-inset-bottom,0px);
      }
      .bottom-nav-item{
        flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:3px;border:none;background:none;cursor:pointer;padding:6px 2px;
        color:#94a3b8;font-size:10px;font-weight:600;font-family:inherit;
        transition:color .15s;-webkit-tap-highlight-color:transparent;
      }
      .bottom-nav-item .bn-icon{font-size:20px;line-height:1}
      .bottom-nav-item.active{color:#1a2472}
      .bottom-nav-item.active .bn-icon{filter:drop-shadow(0 0 4px rgba(26,36,114,.3))}
      /* push page content above bottom nav */
      #main{padding-bottom:74px!important}
      /* hide sidebar drawer toggle — bottom nav replaces it */
      .mobile-menu-btn{display:none!important}
    }

    /* ─── Page & Section Titles ─── */

    /* العناوين الرئيسية للصفحات (h2) — تدرج ناف/أزرق */
    #main h2 {
      background: linear-gradient(135deg, #1a2472 0%, #2563eb 100%) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
    }

    /* عناوين الأقسام الداخلية (h3 في المودالات وغيرها) */
    #main h3 {
      color: #1a2472 !important;
    }

    /* العنوان في الـ topbar — أكثر وضوحاً */
    #pageTitle {
      background: linear-gradient(135deg, #0f1848 0%, #1a2472 50%, #2563eb 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      border-right-color: #2563eb !important;
    }

    /* ─── Skeleton Loading ─── */
    .skeleton{background:linear-gradient(90deg,#f0f4f8 25%,#e2e8f0 50%,#f0f4f8 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f3f4f6}
    .skel-row:last-child{border-bottom:none}
    .skel-circle{border-radius:50%;flex-shrink:0}
    .skel-line{height:12px;border-radius:6px}

    /* ─── FAB ─── */
    .fab-wrap{position:fixed;bottom:80px;left:20px;z-index:170;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
    @media(max-width:768px){.fab-wrap{bottom:74px}}
    /* ─── Mobile table column hiding ─── */
    @media(max-width:768px){
      .col-mob-hide{display:none!important}
      .mob-actions-wrap{gap:3px!important}
      .mob-actions-wrap .btn-sm{padding:4px 6px!important;font-size:13px!important;min-width:28px}
    }
    .fab-main{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1a2472,#2563eb);color:white;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 18px rgba(26,36,114,.4);display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
    .fab-main:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(26,36,114,.5)}
    .fab-main.open{transform:rotate(45deg);background:linear-gradient(135deg,#dc2626,#f87171)}
    .fab-menu{display:none;flex-direction:column;gap:8px;align-items:flex-end}
    .fab-menu.open{display:flex;animation:fadeUp .2s ease}
    .fab-option{display:flex;align-items:center;gap:10px;padding:9px 16px;background:white;border:1.5px solid #e8edf3;border-radius:24px;cursor:pointer;font-size:13px;font-weight:600;color:#1e293b;box-shadow:0 2px 10px rgba(0,0,0,.1);white-space:nowrap;font-family:inherit;transition:all .15s}
    .fab-option:hover{background:#eef1fb;border-color:#1a2472;color:#1a2472;transform:translateX(-3px)}
    .fab-option-icon{font-size:18px}

    /* ─── Nav Group Headers ─── */
    .nav-group-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.35);padding:14px 14px 5px;margin-top:4px}
    .nav-group-label:first-child{padding-top:2px;margin-top:0}

    /* ─── Confirm Dialog ─── */
    .confirm-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
    .confirm-box{background:white;border-radius:18px;padding:28px 28px 20px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeUp .2s ease}
    .confirm-box h3{margin:0 0 10px;font-size:16px;font-weight:800;color:#1e293b}
    .confirm-box p{margin:0 0 22px;font-size:14px;color:#64748b;line-height:1.6}
    .confirm-btns{display:flex;gap:10px;justify-content:flex-end}

    /* ─── Form Labels ─── */
    .form-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}

    /* ─── Empty State ─── */
    .empty-state{text-align:center;padding:48px 20px;color:#94a3b8}
    .empty-state .es-icon{font-size:40px;margin-bottom:10px}
    .empty-state .es-title{font-size:13px;font-weight:700;color:#475569;margin-bottom:6px}
    .empty-state .es-sub{font-size:12px;color:#94a3b8}

    /* ─── Print Styles ─── */
    .print-header { display:none }

    @media print {
      @page { size:A4; margin:15mm 12mm; }

      /* إخفاء عناصر الـ UI */
      .app-sidebar,
      .sidebar-overlay,
      #topbar-wrap,
      .mobile-menu-btn,
      .bottom-nav,
      .no-print,
      .btn,
      .btn-primary,
      .btn-secondary,
      .modal-overlay { display:none !important; }

      /* إخفاء الأزرار داخل الجداول والبطاقات */
      button { display:none !important; }

      /* تخطيط الطباعة */
      html, body { background:white !important; font-size:12px; color:#000; }
      .app-layout { display:block !important; }
      .app-main   { width:100% !important; padding:0 !important; }
      .page       { padding:0 !important; margin:0 !important; }

      /* رأس الطباعة */
      .print-header {
        display:flex !important;
        justify-content:space-between;
        align-items:center;
        border-bottom:2.5px solid #1a2472;
        margin-bottom:16px;
        padding-bottom:10px;
      }
      .print-header .ph-title { font-size:18px; font-weight:800; color:#1a2472; }
      .print-header .ph-meta  { font-size:11px; color:#64748b; text-align:left; }

      /* جداول */
      table { width:100% !important; border-collapse:collapse !important; font-size:11px; }
      th, td { border:1px solid #cbd5e1 !important; padding:5px 8px !important; }
      thead tr { background:#1a2472 !important; color:white !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      tfoot tr { background:#f1f5f9 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      tr:nth-child(even) td { background:#f8fafc !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }

      /* بطاقات */
      div[style*="border-radius"] { break-inside:avoid; }
      .kanban-col, .kanban-card   { break-inside:avoid; }

      /* ألوان الشارات والحالات */
      * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }

      /* لا تقطع الصفوف */
      tr { break-inside:avoid; page-break-inside:avoid; }
    }
  </style>
  <style>
    /* منع Browser Autofill تماماً على جداول الـ Leads */
    #leadsGrid input:-webkit-autofill,
    #leadsGrid input:-webkit-autofill:hover,
    #leadsGrid input:-webkit-autofill:focus,
    #leadsGrid input:-webkit-autofill:active,
    [data-field]:-webkit-autofill,
    [data-expand-field]:-webkit-autofill {
      -webkit-box-shadow: 0 0 0 1000px #ffffff inset !important;
      -webkit-text-fill-color: #0f172a !important;
      background-color: #ffffff !important;
