version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - uploads_data:/app/uploads
      - db_data:/app/data
    environment:
      - DATABASE_URL=sqlite:///./data/ms_accounting.db
      - SECRET_KEY=your-production-secret-key-change-this
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  uploads_data:
  db_data:
