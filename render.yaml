services:
  - type: web
    name: ms-accounting-api
    env: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 1
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: ms-accounting-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "false"
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: mosaeed1099@gmail.com
      - key: SMTP_PASS
        sync: false   # set manually in Render dashboard
      - key: EMAIL_FROM_NAME
        value: MS Accounting
      - key: EMAIL_FROM
        value: mosaeed1099@gmail.com

databases:
  - name: ms-accounting-db
    databaseName: ms_accounting
    user: ms_user
    plan: free
