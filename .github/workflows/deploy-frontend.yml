name: Deploy Frontend → GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'frontend/index.html'
      - 'frontend/config.js'
      - 'frontend/sw.js'
      - 'frontend/assets/**'
      - 'frontend/portal.html'

permissions:
  contents: write

jobs:
  deploy:
    name: Sync frontend → gh-pages
    runs-on: ubuntu-latest

    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"

      - name: Deploy to gh-pages
        run: |
          # Save frontend files from main
          cp frontend/index.html /tmp/deploy_index.html
          cp frontend/config.js  /tmp/deploy_config.js
          cp frontend/sw.js      /tmp/deploy_sw.js

          # Switch to gh-pages
          git checkout gh-pages

          # Copy files
          cp /tmp/deploy_index.html index.html
          cp /tmp/deploy_config.js  config.js
          cp /tmp/deploy_sw.js      sw.js

          # Also copy portal if exists
          if [ -f /tmp/deploy_portal.html ]; then
            cp /tmp/deploy_portal.html portal.html
          fi

          # Commit only if something changed
          git add index.html config.js sw.js portal.html 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "No changes to deploy."
          else
            COMMIT=$(git -C / log -1 --format='%h %s' main 2>/dev/null || echo "manual")
            git commit -m "deploy: $COMMIT"
            git push origin gh-pages
            echo "✅ Deployed to GitHub Pages."
          fi
