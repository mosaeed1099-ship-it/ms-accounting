window.toggleLeadExpand = function(id) {
  const row = document.getElementById(`lead-expand-${id}`);
  const btn = document.getElementById(`expand-btn-${id}`);
  if (!row) return;
  const isOpen = row.style.display !== 'none';
  if (!isOpen) {
    // sync inline fields to expand state before opening
    const mainRow = document.querySelector(`tr[data-id="${id}"]`);
    if (mainRow) _syncLeadInlineToState(mainRow);
  }
  row.style.display = isOpen ? 'none' : '';
  if (btn) btn.textContent = isOpen ? '▾' : '▴';
};

window._saveLeadExpandField = async function(id, field, value) {
  const st = _leadExpandState[id];
  if (!st) return;
  st[field] = value;
  // Map expand fields to backend fields
  const fieldMap = {
    email: 'email',
    legal_entity: 'quote_legal_entity',
    activity: 'quote_activity',
    capital: 'quote_capital',
    total_fees: 'quote_total_fees',
    notes2: 'quote_notes',
    extra: 'losses_detail',
  };
  const backendField = fieldMap[field];
  if (!backendField) return;
  const parsedVal = (field==='capital'||field==='total_fees') ? (parseFloat(value)||null) : (value||null);
  try {
    await api('PUT', `/api/leads/${id}`, {[backendField]: parsedVal,
      ...(field==='total_fees' ? {quote_expenses_total: parsedVal} : {})
    });
    const lead = leadsData.find(l=>l.id===id);
    if (lead) lead[backendField] = parsedVal;
    const statusEl = document.getElementById(`expand-save-status-${id}`);
    if (statusEl) { statusEl.textContent = '✓ محفوظ'; setTimeout(()=>{if(statusEl)statusEl.textContent='';},1500); }
  } catch(e) { console.warn('expand save failed:', e); }
};

window._saveLeadExpandAll = async function(id) {
  const st = _leadExpandState[id];
  if (!st) return;
  const statusEl = document.getElementById(`expand-save-status-${id}`);
  try {
    const updated = await api('PUT', `/api/leads/${id}`, {
      email: st.email || null,
      quote_legal_entity: st.legal_entity || null,
      quote_activity: st.activity || null,
      quote_capital: parseFloat(st.capital) || null,
      quote_total_fees: parseFloat(st.total_fees) || null,
      quote_expenses_total: parseFloat(st.total_fees) || null,
      quote_notes: st.notes2 || null,
      losses_detail: st.extra || null,
      quote_deliver_docs: JSON.stringify(st.deliverables),
      quote_required_docs: JSON.stringify(st.reqDocs),
    });
    const idx = leadsData.findIndex(l=>l.id===id);
    if (idx>=0) leadsData[idx] = updated;
    if (statusEl) { statusEl.textContent = '✅ تم الحفظ'; setTimeout(()=>{if(statusEl)statusEl.textContent='';},2000); }
    toast('تم حفظ البيانات ✓');

window._toggleLeadExpandCheck = function(id, listKey, idx, checked) {
  const st = _leadExpandState[id];
  if (st && st[listKey] && st[listKey][idx]) {
    st[listKey][idx].checked = checked;
  }
};
window._editLeadExpandCheckText = function(id, listKey, idx, text) {
  const st = _leadExpandState[id];
  if (st && st[listKey] && st[listKey][idx]) {
    st[listKey][idx].text = text;
  }
};
window._removeLeadExpandCheck = function(id, listKey, idx, containerId) {
  const st = _leadExpandState[id];
  if (!st || !st[listKey]) return;
  st[listKey].splice(idx, 1);
  // Rebuild the checklist in place
  const lead = leadsData.find(l=>l.id===id);
  if (!lead) return;
  const container = document.getElementById(containerId);
  if (!container) return;
  const wrapper = container.parentElement;
  if (!wrapper) return;
  wrapper.innerHTML = `<div style="font-size:12px;font-weight:700;color:#1a2472;margin-bottom:10px">${listKey==='deliverables'?'✅ حضرتك هتستلم مننا:':'📋 هحتاج من حضرتك:'}</div>` +
    _buildChecklistHTML(st[listKey], listKey, containerId, id);
};
window._addLeadExpandCheck = function(id, listKey, containerId) {
  const st = _leadExpandState[id];
  if (!st || !st[listKey]) return;
  const idx = st[listKey].length;
  st[listKey].push({text: '', checked: true});
  const container = document.getElementById(containerId);
  if (!container) return;
  const itemDiv = document.createElement('div');
  itemDiv.id = `${containerId}-item-${idx}`;
  itemDiv.style.cssText = 'display:flex;align-items:center;gap:6px';
  itemDiv.innerHTML = `
    <input type="checkbox" checked style="width:15px;height:15px;accent-color:#1a2472;cursor:pointer;flex-shrink:0"
      onchange="_toggleLeadExpandCheck(${id},'${listKey}',${idx},this.checked)"/>
    <input style="flex:1;border:none;border-bottom:1px solid #e2e8f0;padding:2px 4px;font-size:12px;font-family:inherit;outline:none;background:transparent"
      placeholder="اكتب العنصر..." autofocus
      onblur="_editLeadExpandCheckText(${id},'${listKey}',${idx},this.value)"/>
    <button onclick="_removeLeadExpandCheck(${id},'${listKey}',${idx},'${containerId}')"
      style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:13px;padding:0 2px;flex-shrink:0"
      onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#d1d5db'">✕</button>`;
  container.insertBefore(itemDiv, container.lastElementChild);
  itemDiv.querySelector('input[type="text"], input:not([type="checkbox"])').focus?.();
};

function _buildChecklistHTML(items, listKey, containerId, leadId) {
  return `<div id="${containerId}" style="display:flex;flex-direction:column;gap:5px">
    ${items.map((item, idx) => `
      <div id="${containerId}-item-${idx}" style="display:flex;align-items:center;gap:6px">
        <input type="checkbox" ${item.checked?'checked':''} style="width:15px;height:15px;accent-color:#1a2472;cursor:pointer;flex-shrink:0"
          onchange="_toggleLeadExpandCheck(${leadId},'${listKey}',${idx},this.checked)"/>
        <input style="flex:1;border:none;border-bottom:1px solid #e2e8f0;padding:2px 4px;font-size:12px;font-family:inherit;outline:none;background:transparent"
          value="${escH(item.text)}"
          onblur="_editLeadExpandCheckText(${leadId},'${listKey}',${idx},this.value)"/>
        <button onclick="_removeLeadExpandCheck(${leadId},'${listKey}',${idx},'${containerId}')"
          style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:13px;padding:0 2px;flex-shrink:0"
          onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#d1d5db'">✕</button>
      </div>`).join('')}
  </div>
  <button onclick="_addLeadExpandCheck(${leadId},'${listKey}','${containerId}')"
    style="margin-top:6px;background:none;border:1px dashed #c7d3ef;border-radius:6px;color:#4478b0;padding:4px 10px;font-size:11px;cursor:pointer;font-family:inherit;width:100%">+ إضافة عنصر</button>`;
}

async function saveLeadCell(el) {
  const row=el.closest('tr[data-id]');
  if(!row) return;
  const rowId=row.dataset.id;
  const field=el.dataset.field;
  let value;
  if(el.type==='checkbox') value=el.checked;
  else if(el.type==='number') value=el.value!==''?parseFloat(el.value):null;
  else value=el.value||null;

  if(rowId==='new'){
    const nameEl=row.querySelector('[data-field="name"]');
    if(!nameEl||!nameEl.value.trim()) return;
    if(_leadNewSaving) return;
    _leadNewSaving=true;
    const body={status:'new'};
    row.querySelectorAll('[data-field]').forEach(inp=>{
      const f=inp.dataset.field;
      if(inp.type==='checkbox') body[f]=inp.checked;
      else if(inp.type==='number') body[f]=inp.value!==''?parseFloat(inp.value):null;
      else body[f]=inp.value||null;
    });
    try {
      const result=await api('POST','/api/leads',body);
      _leadNewSaving=false;
      if(!result) return;
      leadsData.push(result);
      // Replace single new-row with full two-row structure (main + expand)
      const tmp2=document.createElement('table');
      tmp2.innerHTML=`<tbody>${_buildLeadRow(result)}</tbody>`;
      const newRows=tmp2.querySelectorAll('tr');
      row.replaceWith(...newRows);
      toast('تم إضافة العميل المحتمل');
    } catch(err){_leadNewSaving=false;toast(err.message,'error');}
    return;
  }

  const id=parseInt(rowId);
  if(!id||isNaN(id)) return;

  const origColor=el.style.borderColor;
  el.style.borderColor='#f59e0b';
  try {
    await api('PUT',`/api/leads/${id}`,{[field]:value});
    if(field==='status'){
      const sc=LEAD_STATUS_COLORS[value]||'#94a3b8';
      el.style.background=`${sc}18`;
      el.style.color=sc;
      el.style.borderColor=`${sc}44`;
      // Update row background
      const row2=el.closest('tr');
      if(row2) row2.style.background=LEAD_ROW_BG[value]||'';
      // Auto WhatsApp for "لم يرد"
      if(value==='not_answered'){
        const rowId2 = el.closest('tr[data-id]')?.dataset.id;
        const lead2 = leadsData.find(l=>l.id===parseInt(rowId2));
        if(lead2?.phone) setTimeout(()=>sendLeadNoAnswerWhatsApp(lead2),400);
      }
    } else {
      el.style.borderColor='#10b981';
      setTimeout(()=>{if(el!==document.activeElement)el.style.borderColor='transparent';},1000);
    }
    const lead=leadsData.find(l=>l.id===id);
    if(lead) lead[field]=value;
  } catch(err){
    el.style.borderColor='#ef4444';
    toast(err.message,'error');
  }
}

function addLeadRow() {
  const tbody=document.getElementById('leadsGridBody');
  if(!tbody){loadLeads();return;}
  if(tbody.querySelector('tr[data-id="new"]')){
    const n=tbody.querySelector('tr[data-id="new"] [data-field="name"]');
    if(n) n.focus();
    return;
  }
  const newLead={id:null,code:null,name:'',phone:'',company_activities:'',company_type:'',estimated_capital:null,has_office:false,suggested_name:'',status:'new',meeting_date:null,assigned_to:null,notes:''};
  const tmp=document.createElement('table');
  tmp.innerHTML=`<tbody>${_buildLeadRow(newLead)}</tbody>`;
  // Only take the main row (first tr), not the expand row (which requires an id)
  const trs = tmp.querySelectorAll('tr');
  const tr = trs[0];
  tr.style.background='#f0fdf4';
  tbody.insertBefore(tr,tbody.firstChild);
  const n=tr.querySelector('[data-field="name"]');
  if(n) n.focus();
}

async function deleteLeadRow(id) {
  if(!id){
    const nr=document.querySelector('tr[data-id="new"]');
    if(nr) nr.remove();
    return;
  }
  if(!await confirmDlg('حذف هذا العميل المحتمل؟')) return;
  try {
    await api('DELETE',`/api/leads/${id}`);
    const row=document.querySelector(`tr[data-id="${id}"]`);
    if(row) row.remove();
    const expRow=document.getElementById(`lead-expand-${id}`);
    if(expRow) expRow.remove();
    delete _leadExpandState[id];
    leadsData=leadsData.filter(l=>l.id!==id);
    toast('تم الحذف');
  } catch(e){toast(e.message,'error');}
}

function _ldField(label, field, val, type='text'){
  const v = val!=null?String(val):'';
  return `<div>
    <label class="form-label">${label}</label>
    <input id="ld-${field}" class="input" type="${type}" value="${escH(v)}" ${type==='tel'?'style="direction:ltr"':''}/>
  </div>`;
}
function _ldSelectField(label, field, val, opts){
  const optsHtml = Object.entries(opts).map(([k,v])=>`<option value="${k}" ${val===k?'selected':''}>${v}</option>`).join('');
  return `<div>
    <label class="form-label">${label}</label>
    <select id="ld-${field}" class="input">${optsHtml}</select>
  </div>`;
}

function _ldTab(tab) {
  ['info','quote','activity'].forEach(t=>{
    const btn=document.getElementById(`ld-tab-${t}`);
    const pane=document.getElementById(`ld-pane-${t}`);
    if(!btn||!pane) return;
    const active = t===tab;
    btn.style.borderBottomColor = active?'#1a2472':'transparent';
    btn.style.color = active?'#1a2472':'#64748b';
    btn.style.background = active?'#fff':'transparent';
    btn.style.fontWeight = active?'700':'600';
    pane.style.display = active?'':'none';
  });
}

function _qsCalc() {
  const fees = parseFloat(document.getElementById('qq-total_fees')?.value)||0;
  const amt = document.getElementById('qs-total-amt');
  if(amt) amt.textContent = fees > 0 ? fees.toLocaleString('ar-EG')+' جنيه' : '—';
}

function _qsAddService() {
  const svc = {name:'',price:0};
  window._qsServices = window._qsServices||[];
  const i = window._qsServices.length;
  window._qsServices.push(svc);
  const tbody = document.getElementById('qs-services-tbody');
  if(!tbody) return;
  const tr = document.createElement('tr');
  tr.id = `qs-row-${i}`;
  tr.style.borderBottom = '1px solid #f1f5f9';
  tr.innerHTML = `
    <td style="padding:6px 8px"><input class="input" style="font-size:12px;padding:4px 8px" placeholder="اسم الخدمة" oninput="window._qsServices[${i}].name=this.value;_qsCalc()"/></td>
    <td style="padding:6px 8px"><input class="input" type="number" style="font-size:12px;padding:4px 8px;width:110px;direction:ltr" placeholder="0" oninput="window._qsServices[${i}].price=parseFloat(this.value)||0;_qsCalc()"/></td>
    <td style="padding:6px 4px;text-align:center"><button onclick="window._qsServices.splice(${i},1);this.closest('tr').remove();_qsCalc()" style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:14px" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#d1d5db'">✕</button></td>`;
  tbody.append(tr);
}

function _qsAddDoc() {
  window._qsDocs = window._qsDocs||[];
  const i = window._qsDocs.length;
  window._qsDocs.push('');
  const wrap = document.getElementById('qs-docs-wrap');
  if(!wrap) return;
  const div = document.createElement('div');
  div.id = `qd-${i}`;
  div.style.cssText = 'display:flex;align-items:center;gap:6px;margin-bottom:6px';
  div.innerHTML = `
    <input class="input" style="flex:1;font-size:12px;padding:4px 8px" placeholder="مستند مطلوب..." oninput="window._qsDocs[${i}]=this.value"/>
    <button onclick="window._qsDocs.splice(${i},1);this.closest('div').remove()" style="background:none;border:none;color:#d1d5db;cursor:pointer;font-size:14px" onmouseover="this.style.color='#ef4444'" onmouseout="this.style.color='#d1d5db'">✕</button>`;
  wrap.append(div);
}

async function saveLeadInfo(id) {
  const btn = document.getElementById('ld-save-info');
  const body = {};
  ['name','phone','email','company_activities','company_type','estimated_capital',
   'governorate','suggested_name','proposed_names','meeting_date','follow_up_date','status','notes'].forEach(f=>{
    const el = document.getElementById(`ld-${f}`);
    if(!el) return;
    if(el.type==='number') body[f] = el.value!==''?parseFloat(el.value):null;
    else body[f] = el.value||null;
  });
  const officeEl = document.getElementById('ld-has_office');
  if(officeEl) body.has_office = officeEl.checked;
  const excEl = document.getElementById('ld-has_existing_companies');
  if(excEl) body.has_existing_companies = excEl.checked;

  await withSaving(btn, async()=>{
    const updated = await api('PUT', `/api/leads/${id}`, body);
    // Refresh local cache
    const idx = leadsData.findIndex(l=>l.id===id);
    if(idx>=0) leadsData[idx]=updated;
    else leadsData.push(updated);
    // Update grid row if visible — rebuild & replace (main + expand rows)
    const row = document.querySelector(`tr[data-id="${id}"]`);
    if(row){
      const expandRow = document.getElementById(`lead-expand-${id}`);
      const wasOpen = expandRow && expandRow.style.display !== 'none';
      const tmp=document.createElement('table');
      tmp.innerHTML=`<tbody>${_buildLeadRow(updated)}</tbody>`;
      const rows = tmp.querySelectorAll('tr');
      if(expandRow) expandRow.remove();
      row.replaceWith(...rows);
      if(wasOpen) {
        const newExpand = document.getElementById(`lead-expand-${id}`);
        if(newExpand) { newExpand.style.display=''; }
        const btn = document.getElementById(`expand-btn-${id}`);
        if(btn) btn.textContent='▴';
      }
    }
    // Update status badge inside modal if open
    const modalBadge = document.querySelector('.modal .lead-status-badge');
    if(modalBadge && updated.status){
      const sc=LEAD_STATUS_COLORS[updated.status]||'#94a3b8';
      modalBadge.style.background=`${sc}22`;
      modalBadge.style.color=sc;
      modalBadge.textContent=LEAD_STATUS_LABEL[updated.status]||updated.status;
    }
    toast('تم حفظ بيانات العميل ✓');
  });
}

async function saveLeadQuote(id) {
  const btn = document.getElementById('ld-save-quote');
  const total = parseFloat(document.getElementById('qq-total_fees')?.value)||0;
  const body = {
    quote_legal_entity: document.getElementById('qq-legal_entity')?.value||null,
    quote_activity:     document.getElementById('qq-activity')?.value||null,
    quote_location:     document.getElementById('qq-location')?.value||null,
    quote_capital:      parseFloat(document.getElementById('qq-capital')?.value)||null,
    quote_total_fees:   total||null,
    quote_government_fees: 0,
    quote_expenses_total: total||null,
    quote_services:     JSON.stringify((window._qsServices||[]).filter(s=>s.name)),
    quote_required_docs: JSON.stringify((window._qsDocs||[]).filter(Boolean)),
    quote_notes:        document.getElementById('qq-notes')?.value||null,
  };
  await withSaving(btn, async()=>{
    const updated = await api('PUT', `/api/leads/${id}`, body);
    const idx = leadsData.findIndex(l=>l.id===id);
    if(idx>=0) leadsData[idx]=updated;
    _qsCalc();
    toast('تم حفظ عرض السعر ✓');
  });
}

async function sendLeadQuoteEmail(id, defaultEmail) {
  const email = prompt('البريد الإلكتروني للإرسال:', defaultEmail||'');
  if(!email) return;
  try {
    await api('POST', `/api/leads/${id}/quote/send-email`, {to_email:email});
    toast('تم الإرسال بنجاح ✓');
  } catch(e){ toast(e.message,'error'); }
}

function _buildLeadMessage(lead, st) {
  // Deliverables & required docs from state
  const delivers = (st.deliverables||[]).filter(i=>i.checked).map(i=>`• ${i.text}`).join('\n');
  const reqDocs  = (st.reqDocs||[]).filter(i=>i.checked).map(i=>`• ${i.text}`).join('\n');
  const capital  = parseFloat(st.capital) || lead.quote_capital || lead.estimated_capital || 0;
  const total    = parseFloat(st.total_fees) || lead.quote_total_fees || lead.quote_expenses_total || 0;
  const legal    = st.legal_entity || lead.quote_legal_entity || '';
  const activity = st.activity || lead.quote_activity || lead.company_activities || '';
  const extra    = [st.notes2, st.extra].filter(Boolean).join('\n');

  return `السلام عليكم أستاذ / ${lead?.name||''}

عرض السعر الخاص بتأسيس الشركة:

الكيان القانوني: ${legal||'—'}
النشاط: ${activity||'—'}
رأس المال: ${capital>0?capital.toLocaleString('ar-EG')+' جنيه':'—'}

إجمالي مصاريف وأتعاب التأسيس:
${total>0?total.toLocaleString('ar-EG')+' جنيه':'—'}
${delivers ? `\nحضرتك هتستلم مننا:\n${delivers}` : ''}
${reqDocs  ? `\nهحتاج من حضرتك:\n${reqDocs}` : ''}
${extra    ? `\n${extra}` : ''}

مع خالص الشكر والتقدير
المستشار / عمرو شعبان`.replace(/\n{3,}/g, '\n\n').trim();
}

async function sendLeadWhatsApp(id) {
  const lead = leadsData.find(l=>l.id===id);
  if (!lead) { toast('بيانات العميل غير موجودة','error'); return; }
  const waPhone = toWAPhone(lead?.phone);
  if(!waPhone){ toast('لا يوجد رقم هاتف لهذا العميل','error'); return; }

  if(lead.status === 'not_answered') {
    sendLeadNoAnswerWhatsApp(lead);
    return;
  }

  const mainRow = document.querySelector(`tr[data-id="${id}"]`);
  if (mainRow) _syncLeadInlineToState(mainRow);
  const st = _getLeadExpandState(lead);
  const msg = _buildLeadMessage(lead, st);
  window.open(`https://wa.me/${waPhone}?text=${encodeURIComponent(msg)}`, '_blank');
}

window.sendLeadEmailDirect = function(id) {
  const lead = leadsData.find(l=>l.id===id);
  if (!lead) return;
  const mainRow = document.querySelector(`tr[data-id="${id}"]`);
  if (mainRow) _syncLeadInlineToState(mainRow);
  const st = _getLeadExpandState(lead);
  const email = st.email || lead.email || '';
  if (!email) { toast('لا يوجد بريد إلكتروني لهذا العميل','error'); return; }
  const msg = _buildLeadMessage(lead, st);
  const subject = encodeURIComponent(`عرض سعر تأسيس شركة — ${lead.name||''}`);
  const body = encodeURIComponent(msg);
  window.open(`mailto:${email}?subject=${subject}&body=${body}`, '_blank');
};

  </div>
  <div style="display:flex;flex-direction:column;gap:12px">
    ${estData.length===0?`<div class="card" style="padding:48px;text-align:center;color:#94a3b8"><div style="font-size:40px;margin-bottom:12px">🏢</div><div>لا توجد ملفات تأسيس</div></div>`:
      estData.map(est=>`
      <div class="card" style="overflow:hidden">
        <div style="padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #f1f5f9">
          <div style="display:flex;align-items:center;gap:12px">
            <div style="width:42px;height:42px;background:#eef1fb;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:20px">🏢</div>

              <div style="font-weight:700;color:#1e293b;font-size:15px">${est.company_name}</div>
              <div style="font-size:11px;color:#94a3b8">${est.code||''} ${est.company_type?'· '+est.company_type:''} ${est.assigned_name?'· '+est.assigned_name:''}</div>

          <div style="display:flex;align-items:center;gap:12px">
            <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">

              <div style="display:flex;align-items:center;gap:6px">
                <div style="width:100px;height:6px;background:#e5e7eb;border-radius:3px;overflow:hidden">
                  <div style="height:100%;background:#1a2472;border-radius:3px;width:${est.progress||0}%"></div>
                </div>
                <span style="font-size:11px;color:#64748b;font-weight:600">${est.progress||0}%</span>

            </div>

        <div style="padding:14px 20px;display:grid;grid-template-columns:repeat(6,1fr);gap:8px">
          ${stageKeys.map(sk=>{
            const stage=est.stages?.find(s=>s.key===sk.key)||{};
            const st=stage.status||'pending';
            return `<div style="text-align:center;padding:8px;background:#f8fafc;border-radius:8px;border:1.5px solid ${st==='done'?'#bbf7d0':st==='in_progress'?'#fef9c3':st==='blocked'?'#fecaca':'#e5e7eb'}">

              <button onclick="updateEstStage(${est.id},'${sk.key}','${st}')" style="font-size:9px;background:none;border:none;cursor:pointer;color:#1a2472;margin-top:4px;font-family:inherit;padding:0">تحديث</button>

async function updateEstStage(estId, stageKey, currentStatus) {
  const stageLabels={pending:'لم يبدأ',in_progress:'جاري',done:'مكتمل',blocked:'موقوف'};
  const stageKeys_labels={name_reservation:'حجز الاسم',commercial_register:'السجل التجاري',tax_card:'البطاقة الضريبية',vat_registration:'ق.م.م',insurance:'التأمينات',bank_account:'الحساب البنكي'};
  const stageLabel=stageKeys_labels[stageKey]||stageKey;
  const overlay=document.createElement('div');
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.4);display:flex;align-items:center;justify-content:center;z-index:2000';
  overlay.innerHTML=`<div style="background:#fff;border-radius:12px;padding:24px;min-width:280px;box-shadow:0 20px 60px rgba(0,0,0,.2)">
    <h3 class="section-title" style="font-size:15px">تحديث: ${stageLabel}</h3>
    <div style="display:flex;flex-direction:column;gap:8px">
      ${Object.entries(stageLabels).map(([k,v])=>`<button onclick="doUpdateEstStage(${estId},'${stageKey}','${k}')" style="padding:10px 16px;border-radius:8px;border:2px solid ${currentStatus===k?'#1a2472':'#e5e7eb'};background:${currentStatus===k?'#eef1fb':'#fff'};font-size:13px;font-weight:${currentStatus===k?'700':'500'};cursor:pointer;text-align:right;color:#1e293b;font-family:inherit">${v}${currentStatus===k?' ✓':''}</button>`).join('')}
    </div>
    <button onclick="this.closest('div[style]').remove()" style="margin-top:14px;width:100%;padding:8px;border:1px solid #e5e7eb;border-radius:8px;background:#f8fafc;cursor:pointer;font-family:inherit;color:#64748b">إلغاء</button>
  </div>`;
  document.body.append(overlay);
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
}

async function doUpdateEstStage(estId, stageKey, newStatus) {
  document.querySelector('div[style*="z-index:2000"]')?.remove();
  try {
    await api('PUT',`/api/establishment/${estId}/stage`,{stage_key:stageKey,status:newStatus});
    toast('تم تحديث المرحلة');
    loadEstablishment();
  } catch(e){toast(e.message,'error')}
}

// ── OBLIGATIONS ────────────────────────────────────
// ─────────────────────────────────────────────────────────────────────────────
// SMART AUTOMATION ENGINE — الالتزامات الضريبية
// ─────────────────────────────────────────────────────────────────────────────
const OBL_NAME_AR = {
  vat_monthly:              'إقرار القيمة المضافة الشهري',
  vat_quarterly:            'إقرار القيمة المضافة الربعي',
  payroll_monthly:          'نموذج 1 — مرتبات شهري',
  withholding_monthly:      'خصم وإضافة شهري',
  insurance_monthly:        'تأمينات اجتماعية شهرية',
  stamp_quarterly:          'الدمغة النسبية ربعي',
  income_annual:            'إقرار ضريبة الدخل السنوي',
  form_41:                  'نموذج 41 — إقرار المرتبات السنوي',
  corporate_tax:            'ضريبة الأرباح التجارية السنوية',
  commercial_register_renewal: 'تجديد السجل التجاري',
};
const OBL_ICON = {
  vat_monthly:'🧾', vat_quarterly:'🧾', payroll_monthly:'💼', withholding_monthly:'✂️',
  insurance_monthly:'🛡️', stamp_quarterly:'🔏', income_annual:'📊', form_41:'📋',
  corporate_tax:'🏛️', commercial_register_renewal:'📜',
};
const OBL_STATUS_BADGE = {
  upcoming:'badge-blue', pending:'badge-yellow', in_progress:'badge-purple',
  submitted:'badge-green', paid:'badge-green', late:'badge-red', exempted:'badge-gray'
};
const OBL_STATUS_AR = {
  upcoming:'قادم', pending:'معلق', in_progress:'قيد التنفيذ',
  submitted:'مُقدَّم', paid:'مدفوع', late:'متأخر', exempted:'معفى'
};
const PRIORITY_AR = {urgent:'عاجل', high:'مرتفع', medium:'متوسط', low:'منخفض'};
const FREQ_AR = {monthly:'شهري', quarterly:'ربعي', annual:'سنوي'};

let oblStats={}, oblInstances=[], oblTab='upcoming', oblDays=30, oblClientFilter='', oblTypeFilter='', oblStatusFilter='';
let oblClientsCache=[];

async function loadObligations() {
  try {
    const [stats, inst] = await Promise.all([
      api('GET', '/api/obligations/stats'),
      api('GET', `/api/obligations/instances?days_ahead=${oblDays}&page_size=200`),
    ]);
    if (!stats) return;
    oblStats = stats;
    oblInstances = inst?.items || [];
    // Also refresh notifications badge
    loadNotifCount();
    renderObligations();
  } catch(e){ toast(e.message,'error'); }
}

function renderObligations() {
  const main = document.getElementById('main');
  main.className = 'page';

  // Filter instances
  let filtered = oblInstances;
  if (oblClientFilter) filtered = filtered.filter(i=>String(i.client_id)===oblClientFilter);
  if (oblTypeFilter) filtered = filtered.filter(i=>i.obligation_type===oblTypeFilter);
  if (oblStatusFilter) filtered = filtered.filter(i=>i.status===oblStatusFilter);

  const overdueLst = filtered.filter(i=>i.days_remaining<0);
  const soonLst = filtered.filter(i=>i.days_remaining>=0&&i.days_remaining<=7);
  const okLst = filtered.filter(i=>i.days_remaining>7);

  // KPI row
  const kpiRow = `
  <div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:22px">
    ${[
      {label:'التزام نشط',val:oblStats.total_active_obligations||0,icon:'🔔',cls:'stat-blue'},
      {label:'خلال 30 يوم',val:oblStats.upcoming_30_days||0,icon:'📅',cls:'stat-purple'},
      {label:'هذا الأسبوع',val:oblStats.due_this_week||0,icon:'⏰',cls:''},
      {label:'متأخرة',val:oblStats.overdue||0,icon:'🚨',cls:'stat-red'},
      {label:'مُقدَّم هذا الشهر',val:oblStats.submitted_this_month||0,icon:'✅',cls:'stat-green'},
      {label:'عملاء لديهم التزامات',val:oblStats.clients_with_obligations||0,icon:'👥',cls:'stat-blue'},
    ].map(k=>`<div class="stat-card ${k.cls}" style="padding:16px">
      <div style="font-size:22px;margin-bottom:6px">${k.icon}</div>
      <div style="font-size:26px;font-weight:800;color:#1e293b;line-height:1">${k.val}</div>
      <div style="font-size:11px;color:#64748b;margin-top:4px">${k.label}</div>
    </div>`).join('')}
  </div>`;

  // Build client options from instances
  const clientMap = new Map(oblInstances.filter(i=>i.client_id).map(i=>[i.client_id,i.client_name]));
  const typeSet = [...new Set(oblInstances.map(i=>i.obligation_type).filter(Boolean))];

  // Toolbar
  const toolbar = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <select class="input" style="width:auto;font-size:12px;padding:5px 10px" onchange="oblDays=+this.value;loadObligations()">
        ${[7,14,30,60,90].map(d=>`<option value="${d}" ${oblDays===d?'selected':''}>خلال ${d} يوم</option>`).join('')}
      </select>
      <select class="input" style="width:auto;font-size:12px;padding:5px 10px" onchange="oblClientFilter=this.value;renderObligations()">
        <option value="">كل العملاء</option>
        ${[...clientMap.entries()].map(([id,name])=>`<option value="${id}" ${oblClientFilter===String(id)?'selected':''}>${escH(name||'')}</option>`).join('')}
      </select>
      <select class="input" style="width:auto;font-size:12px;padding:5px 10px" onchange="oblTypeFilter=this.value;renderObligations()">
        <option value="">كل الأنواع</option>
        ${typeSet.map(t=>`<option value="${t}" ${oblTypeFilter===t?'selected':''}>${OBL_NAME_AR[t]||t}</option>`).join('')}
      </select>
      <select class="input" style="width:auto;font-size:12px;padding:5px 10px" onchange="oblStatusFilter=this.value;renderObligations()">
        <option value="">كل الحالات</option>
        ${Object.entries(OBL_STATUS_AR).map(([k,v])=>`<option value="${k}" ${oblStatusFilter===k?'selected':''}>${v}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="runBulkGenerate()" title="توليد الالتزامات لجميع العملاء تلقائياً">⚙️ Auto-Generate الكل</button>
      <button class="btn btn-secondary" onclick="runRefreshNotifs()">🔔 تحديث الإشعارات</button>
      <button class="btn btn-primary" onclick="showObligationModal()">+ إضافة التزام</button>
    </div>
  </div>`;

  // Instance table builder
  function instRow(i) {
    const over = i.days_remaining < 0;
    const close = i.days_remaining >= 0 && i.days_remaining <= 7;
    const rowStyle = over ? 'background:#fff5f5' : close ? 'background:#fffbeb' : '';
    const daysText = over
      ? `<span style="color:#dc2626;font-weight:700">⚠ ${Math.abs(i.days_remaining)} يوم متأخر</span>`
      : i.days_remaining === 0
        ? `<span style="color:#dc2626;font-weight:700">اليوم!</span>`
        : `<span style="color:${close?'#d97706':'#16a34a'};font-weight:600">${i.days_remaining} يوم</span>`;
    const prioColor = PRIORITY_COLOR[i.priority] || '#94a3b8';
    return `<tr style="${rowStyle}" data-id="${i.id}">
      <td>
        <div style="font-weight:600;color:#1e293b;font-size:13px">${escH(i.client_name||'—')}</div>
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:15px">${OBL_ICON[i.obligation_type]||'📋'}</span>
          <div>
            <div style="font-size:12px;font-weight:600;color:#374151">${OBL_NAME_AR[i.obligation_type]||i.obligation_type||'—'}</div>
            <div style="font-size:10px;color:#94a3b8">${i.period_label||''}</div>
          </div>
        </div>
      </td>
      <td style="font-size:13px">${dateAr(i.due_date)}</td>
      <td>${daysText}</td>
      <td>
        <span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;background:${prioColor}22;color:${prioColor};padding:2px 8px;border-radius:99px;font-weight:700">
          ${PRIORITY_AR[i.priority]||'—'}
        </span>
      </td>
      <td><span class="badge ${OBL_STATUS_BADGE[i.status]||'badge-gray'}">${OBL_STATUS_AR[i.status]||i.status}</span></td>
      <td style="color:#64748b;font-size:12px">${escH(i.assigned_name||'—')}</td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;gap:4px">
          ${i.status!=='submitted'&&i.status!=='paid'?`<button class="btn btn-success btn-sm" onclick="submitObligation(${i.id})" title="تقديم">✅</button>`:''}
          ${i.status!=='paid'?`<button class="btn btn-secondary btn-sm" onclick="showUpdateOblModal(${i.id})" title="تعديل">✏️</button>`:''}
        </div>
      </td>
    </tr>`;
  }

  const tableSection = `
  <div class="card" style="overflow:hidden">
    <div style="padding:14px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:13px;font-weight:700;color:#1e293b">
        ${filtered.length} التزام
        ${overdueLst.length?`<span style="color:#dc2626;margin-right:8px">• ${overdueLst.length} متأخر</span>`:''}
        ${soonLst.length?`<span style="color:#d97706;margin-right:8px">• ${soonLst.length} هذا الأسبوع</span>`:''}
      </span>
      <span style="font-size:11px;color:#94a3b8">مرتب حسب الأقرب</span>
    </div>
    <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>العميل</th><th>الالتزام</th><th>الاستحقاق</th><th>المتبقي</th>
        <th>الأولوية</th><th>الحالة</th><th>المحاسب</th><th>إجراءات</th>
      </tr></thead>
      <tbody>
        ${filtered.length===0
          ? `<tr><td colspan="8" style="text-align:center;padding:50px;color:#94a3b8"><div style="font-size:40px;margin-bottom:10px">✅</div><div>لا توجد التزامات بالفلاتر المختارة</div></td></tr>`
          : [...overdueLst,...soonLst,...okLst].map(instRow).join('')}
      </tbody>
    </table>
    </div>
  </div>`;

  main.innerHTML = kpiRow + toolbar + tableSection;
}

async function runBulkGenerate() {
  try {
    const btn = document.activeElement;
    if(btn) { btn.disabled=true; btn.textContent='⏳ جاري...'; }
    const r = await api('POST', '/api/obligations/bulk-generate');
    toast(`تم: ${r.total_obligations_created} التزام جديد لـ ${r.processed_clients} عميل`);
    loadObligations();
  } catch(e){ toast(e.message,'error'); }
}

async function runRefreshNotifs() {
  try {
    const r = await api('POST', '/api/obligations/refresh-notifications');
    toast(`${r.created_notifications} إشعار جديد`);
    loadNotifCount();
  } catch(e){ toast(e.message,'error'); }
}

async function submitObligation(instanceId) {
  try {
    await api('PUT', `/api/obligations/instances/${instanceId}`, {status:'submitted', submitted_at:new Date().toISOString()});
    toast('✅ تم تسجيل التقديم');
    loadObligations();
  } catch(e){ toast(e.message,'error'); }
}

async function showUpdateOblModal(instanceId) {
  const inst = oblInstances.find(i=>i.id===instanceId);
  if (!inst) return;
  let usersLst=[];
  try{ const u=await api('GET','/api/users'); usersLst=u||[]; }catch(e){}
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal" style="max-width:440px">
    <div style="padding:18px 22px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
      <h2 style="font-size:16px;font-weight:700;color:#1e293b;margin:0">تعديل الالتزام</h2>
      <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8">✕</button>
    </div>
    <div style="padding:18px 22px">
      <div style="background:#f8fafc;border-radius:10px;padding:12px;margin-bottom:16px;font-size:12px;color:#374151">
        <b>${OBL_ICON[inst.obligation_type]||'📋'} ${OBL_NAME_AR[inst.obligation_type]||inst.obligation_type}</b><br/>
        ${escH(inst.client_name||'')} • ${inst.period_label||''} • استحقاق ${dateAr(inst.due_date)}
      </div>
      <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">الحالة</label>
        <select id="updStatus" class="input">
          ${Object.entries(OBL_STATUS_AR).map(([k,v])=>`<option value="${k}" ${inst.status===k?'selected':''}>${v}</option>`).join('')}
        </select></div>
      <div class="form-row" style="margin-bottom:14px">
        <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">المبلغ (اختياري)</label>
          <input id="updAmount" class="input" type="number" placeholder="0" value="${inst.tax_amount||''}"/></div>
        <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">الغرامة</label>
          <input id="updPenalty" class="input" type="number" placeholder="0" value="${inst.penalty||''}"/></div>
      </div>
      <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">المحاسب المسؤول</label>
        <select id="updAssigned" class="input">
          <option value="">— غير محدد —</option>
          ${usersLst.map(u=>`<option value="${u.id}" ${inst.assigned_to===u.id?'selected':''}>${escH(u.name)}</option>`).join('')}
        </select></div>
      <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">ملاحظات</label>
        <textarea id="updNotes" class="input" rows="2">${escH(inst.notes||'')}</textarea></div>
    </div>
    <div style="padding:14px 22px;border-top:1px solid #f1f5f9;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">إلغاء</button>
      <button id="updOblBtn" class="btn btn-primary">💾 حفظ</button>
    </div>
  </div>`;
  document.body.append(overlay);
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
  document.getElementById('updOblBtn').onclick=async()=>{
    const btn=document.getElementById('updOblBtn');
    btn.disabled=true; btn.textContent='جاري...';
    try {
      const status=$('#updStatus',overlay).value;
      const body={status};
      const amt=$('#updAmount',overlay).value;
      const pen=$('#updPenalty',overlay).value;
      const ass=$('#updAssigned',overlay).value;
      const notes=$('#updNotes',overlay).value;
      if(amt) body.tax_amount=parseFloat(amt);
      if(pen) body.penalty=parseFloat(pen);
      if(ass) body.assigned_to=parseInt(ass);
      if(notes) body.notes=notes;
      if(status==='submitted') body.submitted_at=new Date().toISOString();
      await api('PUT',`/api/obligations/instances/${instanceId}`,body);
      toast('تم حفظ التعديلات');
      overlay.remove(); loadObligations();
    } catch(e){ toast(e.message,'error'); btn.disabled=false; btn.textContent='💾 حفظ'; }
  };
}

async function showObligationModal(preClientId=null) {
  let clientsList=[];
  try{ clientsList=await getClients(); }catch(e){}
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal" style="max-width:500px">
    <div style="padding:18px 22px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
      <h2 style="font-size:16px;font-weight:700;color:#1e293b;margin:0">🔔 إضافة التزام ضريبي</h2>
      <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8">✕</button>
    </div>
    <div style="padding:18px 22px">
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">العميل *</label>
        <select id="oblClient" class="input">
          <option value="">— اختر العميل —</option>
          ${clientsList.map(c=>`<option value="${c.id}" ${preClientId===c.id?'selected':''}>${escH(c.name)}</option>`).join('')}
        </select>
      </div>
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">نوع الالتزام</label>
        <select id="oblType" class="input" onchange="autoFillOblFields(this.value)">
          <option value="">— اختر النوع —</option>
          <optgroup label="▸ شهرية">
            <option value="vat_monthly">🧾 إقرار القيمة المضافة الشهري</option>
            <option value="payroll_monthly">💼 نموذج 1 — مرتبات شهري</option>
            <option value="withholding_monthly">✂️ خصم وإضافة شهري</option>
            <option value="insurance_monthly">🛡️ تأمينات اجتماعية شهرية</option>
          </optgroup>
          <optgroup label="▸ ربع سنوية">
            <option value="vat_quarterly">🧾 إقرار القيمة المضافة الربعي</option>
            <option value="stamp_quarterly">🔏 الدمغة النسبية ربعي</option>
          </optgroup>
          <optgroup label="▸ سنوية">
            <option value="income_annual">📊 إقرار ضريبة الدخل السنوي</option>
            <option value="form_41">📋 نموذج 41 — إقرار المرتبات السنوي</option>
            <option value="corporate_tax">🏛️ ضريبة الأرباح التجارية</option>
            <option value="commercial_register_renewal">📜 تجديد السجل التجاري</option>
          </optgroup>
        </select>
        <div id="oblTypeDesc" style="font-size:11px;color:#64748b;margin-top:4px;min-height:14px"></div>
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">التكرار</label>
          <select id="oblFreq" class="input">
            <option value="monthly">شهري</option>
            <option value="quarterly">ربعي</option>
            <option value="annual">سنوي</option>
          </select>
        </div>
        <div>
          <label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">يوم الاستحقاق</label>
          <input id="oblDay" class="input" type="number" value="15" min="1" max="31"/>
        </div>
      </div>
    </div>
    <div style="padding:14px 22px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:space-between;align-items:center">
      <button class="btn btn-secondary" style="background:#f0f7ff;color:#1a2472;border-color:#bbd4f8;font-size:12px" onclick="autoGenerateForClient()">⚙️ Auto-Generate للعميل</button>
      <div style="display:flex;gap:8px">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">إلغاء</button>
        <button id="saveOblBtn" class="btn btn-primary">🔔 إضافة</button>
      </div>
    </div>
  </div>`;
  document.body.append(overlay);
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};

  // Auto-fill rules
  const oblDescMap = {
    vat_monthly:'تقديم وسداد الإقرار قبل اليوم 15 من الشهر التالي',
    payroll_monthly:'نموذج 1 الخاص بالمرتبات قبل اليوم 15',
    withholding_monthly:'تسوية الخصم والإضافة على المدفوعات للغير',
    insurance_monthly:'سداد اشتراكات التأمينات الاجتماعية قبل 15',
    vat_quarterly:'للمنشآت الصغيرة — إقرار ربعي قبل 15 من الشهر التالي للربع',
    stamp_quarterly:'ضريبة الدمغة النسبية على المعاملات التجارية',
    income_annual:'الإقرار السنوي لضريبة الدخل — 30 أبريل من كل عام',
    form_41:'الإقرار السنوي عن المرتبات — 31 يناير',
    corporate_tax:'ضريبة الأرباح التجارية والصناعية — 30 أبريل',
    commercial_register_renewal:'تجديد السجل التجاري سنويًا',
  };

  window.autoFillOblFields = function(type) {
    const freqMap = {vat_monthly:'monthly',payroll_monthly:'monthly',withholding_monthly:'monthly',insurance_monthly:'monthly',vat_quarterly:'quarterly',stamp_quarterly:'quarterly',income_annual:'annual',form_41:'annual',corporate_tax:'annual',commercial_register_renewal:'annual'};
    const dayMap = {vat_monthly:15,payroll_monthly:15,withholding_monthly:15,insurance_monthly:15,vat_quarterly:15,stamp_quarterly:15,income_annual:30,form_41:31,corporate_tax:30,commercial_register_renewal:28};
    const freq = freqMap[type]; const day = dayMap[type];
    if(freq){ const f=document.getElementById('oblFreq'); if(f) f.value=freq; }
    if(day){ const d=document.getElementById('oblDay'); if(d) d.value=day; }
    const desc=document.getElementById('oblTypeDesc');
    if(desc) desc.textContent=oblDescMap[type]||'';
  };

  window.autoGenerateForClient = async function() {
    const clientId=parseInt(document.getElementById('oblClient').value);
    if(!clientId){toast('اختر العميل أولاً','error');return;}
    try {
      const r=await api('POST',`/api/obligations/auto-generate/${clientId}`);
      toast(`تم: ${r.created.length} التزام جديد للعميل`);
      overlay.remove(); loadObligations();
    } catch(e){toast(e.message,'error');}
  };

  document.getElementById('saveOblBtn').onclick=async()=>{
    const btn=document.getElementById('saveOblBtn');
    const clientId=parseInt(document.getElementById('oblClient').value);
    const oblType=document.getElementById('oblType').value;
    if(!clientId){toast('اختر العميل','error');return;}
    if(!oblType){toast('اختر نوع الالتزام','error');return;}
    btn.disabled=true; btn.textContent='جاري الحفظ...';
    try {
      await api('POST','/api/obligations',{
        client_id:clientId,
        obligation_type:oblType,
        frequency:document.getElementById('oblFreq').value,
        due_day:parseInt(document.getElementById('oblDay').value)||15,
      });
      toast('تم إنشاء الالتزام الضريبي');
      overlay.remove(); loadObligations();
    } catch(e){toast(e.message,'error');btn.disabled=false;btn.textContent='🔔 إضافة';}
  };
}

// ── EMPLOYEES ──────────────────────────────────────
const ROLE_LABEL={admin:'مدير النظام',manager:'مدير',accountant:'محاسب',viewer:'مشاهد'};
const ROLE_COLOR={admin:'#5b8ec4',manager:'#1a2472',accountant:'#059669',viewer:'#94a3b8'};
const SPEC_OPTS=['ضريبة القيمة المضافة','ضريبة الدخل','تأسيس شركات','محاسبة عامة','مرتبات','جمارك','زكاة','مراجعة حسابات','استشارات مالية'];

async function loadEmployees() {
  const main=document.getElementById('main');
  main.className='page';
  main.innerHTML=`<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:24px">
    <div>
      <h2 style="font-size:22px;font-weight:800;color:#1a2472;margin:0;padding-right:14px;border-right:4px solid #1a2472">👤 إدارة الموظفين</h2>
      <p style="font-size:13px;color:#94a3b8;margin:4px 0 0">توزيع المهام والتخصصات والعبء الوظيفي</p>
    </div>
    ${currentUser?.role==='admin'?`<button class="btn btn-primary" onclick="showEmployeeModal()">+ إضافة موظف</button>`:''}
  </div>
  <div id="empGrid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px">
    <div style="text-align:center;padding:60px;color:#94a3b8;grid-column:1/-1">⏳ جاري التحميل...</div>
  </div>`;
  try {
    const users=await api('GET','/api/users');
    renderEmployeeGrid(users);
  } catch(e){toast(e.message,'error');}
}

function renderEmployeeGrid(users) {
  const grid=document.getElementById('empGrid');
  if(!users||!users.length){grid.innerHTML='<div style="text-align:center;padding:60px;color:#94a3b8;grid-column:1/-1">لا يوجد موظفون</div>';return;}
  grid.innerHTML=users.map(u=>{
    const specs=Array.isArray(u.specialization)?u.specialization:[];
    const taskLoad=u.task_count||0;
    const leadLoad=u.lead_count||0;
    const loadColor=taskLoad+leadLoad>10?'#ef4444':taskLoad+leadLoad>5?'#f59e0b':'#10b981';
    const loadPct=Math.min(100,Math.round((taskLoad+leadLoad)/15*100));
    return `<div class="card" style="padding:0;overflow:hidden">
      <div style="padding:20px 20px 16px;border-bottom:1px solid #f1f5f9">
        <div style="display:flex;align-items:flex-start;gap:14px">
          <div style="width:52px;height:52px;border-radius:50%;background:${ROLE_COLOR[u.role]||'#94a3b8'};display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;flex-shrink:0">
            ${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`:(u.name||'?')[0]}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:3px">${escH(u.name)}</div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${ROLE_COLOR[u.role]+'22'};color:${ROLE_COLOR[u.role]};font-weight:600">${ROLE_LABEL[u.role]||u.role}</span>
              <span style="font-size:12px;color:#94a3b8">${escH(u.email||'')}</span>
            </div>
            ${u.phone?`<div style="font-size:12px;color:#64748b;margin-top:3px">📞 ${escH(u.phone)}</div>`:''}
          </div>
          ${currentUser?.role==='admin'?`<button onclick="showEmployeeModal(${u.id})" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;padding:4px" title="تعديل">✏️</button>`:''}
        </div>
      </div>
      <div style="padding:16px 20px">
        <div style="display:flex;gap:16px;margin-bottom:14px">
          <div style="text-align:center;flex:1;padding:10px;background:#f8fafc;border-radius:8px">
            <div style="font-size:20px;font-weight:700;color:#4478b0">${taskLoad}</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px">مهام نشطة</div>
          </div>
          <div style="text-align:center;flex:1;padding:10px;background:#f8fafc;border-radius:8px">
            <div style="font-size:20px;font-weight:700;color:#8b5cf6">${leadLoad}</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px">عملاء محتملين</div>
          </div>
          <div style="text-align:center;flex:1;padding:10px;background:#f8fafc;border-radius:8px">
            <div style="font-size:20px;font-weight:700;color:${loadColor}">${loadPct}%</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px">الحمل الوظيفي</div>
          </div>
        </div>
        <div style="margin-bottom:10px">
          <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;display:flex;justify-content:space-between">
            <span>العبء الوظيفي</span><span style="color:${loadColor}">${taskLoad+leadLoad} / 15</span>
          </div>
          <div style="height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${loadPct}%;background:${loadColor};border-radius:3px;transition:width .3s"></div>
          </div>
        </div>
        ${specs.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px">
          ${specs.map(s=>`<span style="font-size:10px;padding:3px 8px;background:#eef1fb;color:#4478b0;border-radius:10px;border:1px solid #b3c4e8">${escH(s)}</span>`).join('')}
        </div>`:`<div style="font-size:11px;color:#cbd5e1;margin-top:10px;font-style:italic">لا توجد تخصصات محددة</div>`}
        ${u.notes?`<div style="margin-top:10px;font-size:12px;color:#64748b;padding:8px;background:#fefce8;border-radius:6px;border-right:3px solid #fbbf24">📝 ${escH(u.notes)}</div>`:''}
      </div>
      <div style="padding:12px 20px;border-top:1px solid #f1f5f9;display:flex;gap:8px">
        <button onclick="showAssignTaskModal(${u.id},'${escH(u.name)}')" class="btn btn-secondary" style="flex:1;font-size:12px">📋 تعيين مهمة</button>
        <button onclick="showEmployeeTasks(${u.id},'${escH(u.name)}')" class="btn btn-secondary" style="flex:1;font-size:12px">👁 مهامه</button>
      </div>
    </div>`;
  }).join('');
}

async function showEmployeeModal(userId=null) {

    try{const users=await api('GET','/api/users');user=users.find(u=>u.id===userId)||null;}catch(e){}

  const specs=user&&Array.isArray(user.specialization)?user.specialization:[];
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px';
  overlay.innerHTML=`<div class="modal" style="width:520px;max-height:90vh;overflow-y:auto">
    <div style="padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">

      <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8">×</button>
    </div>

        <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">الاسم الكامل *</label>
          <input id="empName" class="input" value="${escH(user?.name||'')}" placeholder="اسم الموظف"/></div>
        <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">البريد الإلكتروني *</label>
          <input id="empEmail" class="input" type="email" value="${escH(user?.email||'')}" placeholder="email@example.com" ${userId?'disabled style="background:#f8fafc;color:#94a3b8"':''}/></div>
      </div>
      <div class="form-row" style="margin-bottom:14px">
        <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">رقم الهاتف</label>
          <input id="empPhone" class="input" value="${escH(user?.phone||'')}" placeholder="01xxxxxxxxx"/></div>
        <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">الدور الوظيفي</label>
          <select id="empRole" class="input">

          </select></div>
      </div>
      ${!userId?`<div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">كلمة المرور *</label>
        <input id="empPass" class="input" type="password" placeholder="••••••••"/></div>`:''}
      <div style="margin-bottom:14px"><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">ملاحظات</label>
        <textarea id="empNotes" class="input" rows="2" style="resize:none">${escH(user?.notes||'')}</textarea></div>
      <div style="margin-bottom:4px"><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:8px">التخصصات</label>
        <div id="specList" style="display:flex;flex-wrap:wrap;gap:6px">
          ${SPEC_OPTS.map(s=>`<label style="display:flex;align-items:center;gap:5px;cursor:pointer;font-size:12px;padding:5px 10px;border:1px solid ${specs.includes(s)?'#4478b0':'#e2e8f0'};border-radius:20px;background:${specs.includes(s)?'#eef1fb':'#fff'};transition:.15s" onclick="this.style.background=this.querySelector('input').checked?'#fff':'#eef1fb';this.style.borderColor=this.querySelector('input').checked?'#e2e8f0':'#4478b0'">
            <input type="checkbox" style="display:none" value="${s}" ${specs.includes(s)?'checked':''}>${s}

async function deactivateEmployee(userId) {

  }catch(e){toast(e.message,'error');}
}

let collectionsData=[], collectionsTab='establishment', collectionsSearch='';

async function loadCollections() {
  try {
    const [summary, data] = await Promise.all([
      api('GET','/api/collections/summary'),
      api('GET',`/api/collections?page_size=100`),
    ]);
    if(!data) return;
    collectionsData=data.items||[];
    renderCollections(summary);
  } catch(e){toast(e.message,'error')}
}

async function fetchAndPreview() {
  const btn = document.getElementById('fetchSheetBtn');
  const url = document.getElementById('sheetUrl')?.value?.trim();
  if (!url) { toast('أدخل رابط الشيت', 'error'); return; }
  btn.disabled = true; btn.textContent = '⏳ جاري التحميل...';
  const area = document.getElementById('importPreviewArea');
  area.innerHTML = `<div class="card" style="padding:40px;text-align:center;color:#94a3b8"><div style="font-size:32px;margin-bottom:12px">⏳</div>جاري جلب وتحليل البيانات...</div>`;
  try {
    // Convert share URL to CSV export URL if needed
    let csvUrl = url;
    if (url.includes('/edit') || url.includes('/view')) {
      const match = url.match(/spreadsheets\/d\/([^/]+)/);
      const gidMatch = url.match(/[#&]gid=(\d+)/);
      if (match) {
        csvUrl = `https://docs.google.com/spreadsheets/d/${match[1]}/export?format=csv${gidMatch ? '&gid='+gidMatch[1] : ''}`;
      }
    }
    // Fetch CSV via backend proxy
    const csvResp = await fetch(csvUrl);
    if (!csvResp.ok) throw new Error('فشل في جلب البيانات من Google Sheets');
    importCsvText = await csvResp.text();
    // Send to preview endpoint
    const preview = await api('POST', '/api/import/preview', { csv_text: importCsvText });
    importPreviewData = preview;
    renderImportPreview(preview);
  } catch(e) {
    area.innerHTML = `<div class="card" style="padding:30px;text-align:center;color:#ef4444">❌ ${escH(e.message)}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '🔄 جلب البيانات وعرض المعاينة';
  }
}

function filterImportRows(filter) {
  // Update active tab
  ['all','clean','issues','inactive','dup'].forEach(t => {
    const btn = document.getElementById('iTab_'+t);
    if (btn) btn.className = 'btn btn-sm ' + (t === filter ? 'btn-primary' : 'btn-secondary');
  });
  document.querySelectorAll('.import-row').forEach(row => {
    const s = row.dataset.status;
    const inactive = row.dataset.inactive === 'true';
    let show = false;
    if (filter === 'all') show = true;
    else if (filter === 'clean') show = s === 'clean' && !inactive;
    else if (filter === 'issues') show = s === 'issues';
    else if (filter === 'inactive') show = inactive;
    else if (filter === 'dup') show = s === 'dup';
    row.style.display = show ? '' : 'none';
  });
}

  if (!importCsvText) { toast('لا توجد بيانات. أعد المعاينة أولاً', 'error'); return; }

  const importIssues = document.getElementById('importIssues')?.checked !== false;

  btn.disabled = true; btn.textContent = '⏳ جاري الاستيراد...';
  try {
    const result = await api('POST', '/api/import/confirm', {
      csv_text: importCsvText,
      skip_duplicates: skipDup,
      import_with_issues: importIssues,

  } catch(e) {
    toast(e.message, 'error');

}

function mailOnClientChange(sel) {
  const opt = sel.options[sel.selectedIndex];
  const email = opt.dataset.email || '';
  const name = opt.dataset.name || '';
  if(email) document.getElementById('mailTo').value = email;
  if(name) {
    const sub = document.getElementById('mailSubject');
    if(!sub.value || sub.value === sub.dataset.auto) {
      const auto = `تذكير من مكتب MS Accounting — ${name}`;
      sub.value = auto;
      sub.dataset.auto = auto;
    }
  }
  mailSelectedClient = sel.value ? parseInt(sel.value) : null;
}

function mailFocusCompose() {
  document.getElementById('mailBody')?.focus();
}

function mailQuickReminder() {
  const body = document.getElementById('mailBody');
  if(body && !body.value) {
    body.value = `السادة المحترمون،

نود التذكير بأن لديكم التزامات ضريبية قادمة تستوجب التقديم في المواعيد المحددة، لتجنب الغرامات والعقوبات المقررة قانوناً.

نرجو التكرم بمراجعتنا في أقرب وقت للاستعداد لهذه الالتزامات.

مع خالص التقدير،
مكتب MS Accounting`;
    document.getElementById('mailInclObl').checked = true;
  }
  body?.focus();
}

function mailQuickInvoice() {
  const body = document.getElementById('mailBody');
  if(body && !body.value) {
    body.value = `السادة المحترمون،

نود التذكير بوجود فواتير مستحقة السداد، ونأمل منكم التفضل بتسوية المستحقات في أقرب وقت ممكن.

لأي استفسار، يرجى التواصل مع مكتبنا.

مع خالص التقدير،
مكتب MS Accounting`;
    document.getElementById('mailInclInv').checked = true;
  }
  body?.focus();
}

function mailClear() {
  document.getElementById('mailClientPicker').value = '';
  document.getElementById('mailTo').value = '';
  document.getElementById('mailSubject').value = '';
  document.getElementById('mailBody').value = '';
  document.getElementById('mailInclObl').checked = false;
  document.getElementById('mailInclInv').checked = false;
  document.getElementById('mailResult').innerHTML = '';
  mailSelectedClient = null;
}

async function mailSend() {
  const btn = document.getElementById('mailSendBtn');
  const resultDiv = document.getElementById('mailResult');
  const toEmail = document.getElementById('mailTo')?.value?.trim();
  const subject = document.getElementById('mailSubject')?.value?.trim();
  const body = document.getElementById('mailBody')?.value?.trim();
  const inclObl = document.getElementById('mailInclObl')?.checked;
  const inclInv = document.getElementById('mailInclInv')?.checked;

  if(!toEmail) {
    resultDiv.innerHTML = `<div style="color:#dc2626;font-size:13px;padding:10px 14px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca">⚠️ يرجى إدخال البريد الإلكتروني للمستلم</div>`;
    document.getElementById('mailTo')?.focus(); return;
  }
  if(!subject) {
    resultDiv.innerHTML = `<div style="color:#dc2626;font-size:13px;padding:10px 14px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca">⚠️ يرجى إدخال موضوع الرسالة</div>`;
    document.getElementById('mailSubject')?.focus(); return;
  }
  if(!body) {
    resultDiv.innerHTML = `<div style="color:#dc2626;font-size:13px;padding:10px 14px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca">⚠️ يرجى كتابة نص الرسالة</div>`;
    document.getElementById('mailBody')?.focus(); return;
  }

  btn.disabled = true;
  btn.innerHTML = '⏳ جارٍ الإرسال...';
  resultDiv.innerHTML = '';

  try {
    const r = await api('POST', '/api/notifications/compose', {
      to_email: toEmail,
      subject: subject,
      body: body,
      client_id: mailSelectedClient || null,
      include_obligations: inclObl,
      include_invoices: inclInv,
    });
    resultDiv.innerHTML = `<div style="color:#16a34a;font-size:13.5px;padding:12px 16px;background:#f0fdf4;border-radius:8px;border:1px solid #bbf7d0;display:flex;align-items:center;gap:8px">
      <span style="font-size:18px">✅</span>
      <div><strong>تم الإرسال بنجاح!</strong><br><span style="font-size:12px;color:#15803d">${escH(r.message)}</span></div>
    </div>`;
    btn.innerHTML = '✅ تم الإرسال';
    // Log to sent list visually
    const sentList = document.getElementById('mailSentList');
    if(sentList) {
      const now = new Date().toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'});
      const item = document.createElement('div');
      item.style.cssText = 'padding:8px 10px;border-radius:7px;background:#f0fdf4;border:1px solid #bbf7d0;margin-bottom:6px;font-size:12px;color:#374151';
      item.innerHTML = `<div style="font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(subject)}</div>
        <div style="color:#16a34a;font-size:11px;margin-top:2px">📧 ${escH(toEmail)} · ${now}</div>`;
      sentList.innerHTML = '';
      sentList.prepend(item);
    }
    // Reset after 3s
    setTimeout(()=>{
      btn.disabled = false;
      btn.innerHTML = '📨 إرسال الرسالة';
    }, 3000);
  } catch(e) {
    resultDiv.innerHTML = `<div style="color:#dc2626;font-size:13px;padding:10px 14px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca">
      <strong>❌ فشل الإرسال</strong><br><span style="font-size:12px">${escH(e.message)}</span>
    </div>`;
    btn.disabled = false;
    btn.innerHTML = '📨 إرسال الرسالة';
  }
}
window.mailSend = mailSend;
window.mailClear = mailClear;
window.mailFocusCompose = mailFocusCompose;
window.mailQuickReminder = mailQuickReminder;
window.mailQuickInvoice = mailQuickInvoice;
window.mailOnClientChange = mailOnClientChange;

  accepted:    {label:'مقبول ✓',    color:'#15803d', bg:'#dcfce7', icon:'✅'},
  rejected:    {label:'مرفوض',      color:'#dc2626', bg:'#fee2e2', icon:'❌'},
  negotiation: {label:'تفاوض',      color:'#d97706', bg:'#fef9c3', icon:'🤝'},

// Built-in templates cache
let quoTemplates = {builtin:[], custom:[]};
let quoCurrentData = null; // currently editing/viewing

async function loadQuotations() {
  const main = document.getElementById('main');
  main.className = 'page';

  // Load stats and templates in parallel
  const activeStatus = document.getElementById('quoStatusFilter')?.value || '';
  const activeSearch = document.getElementById('quoSearch')?.value?.trim() || '';
  let stats = {total:0, by_status:{}, total_value:0, accepted_value:0, conversion_rate:0};
  let data  = {total:0, items:[]};
  try {
    let listUrl = '/api/quotations?page_size=50';
    if(activeStatus) listUrl += `&status=${encodeURIComponent(activeStatus)}`;
    if(activeSearch) listUrl += `&q=${encodeURIComponent(activeSearch)}`;
    [stats, data, quoTemplates] = await Promise.all([
      api('GET', '/api/quotations/stats').catch(()=>({total:0,by_status:{},total_value:0,accepted_value:0,conversion_rate:0})),
      api('GET', listUrl).catch(()=>({total:0,items:[]})),
      api('GET', '/api/quotations/templates').catch(()=>({builtin:[],custom:[]})),
    ]);
  } catch(e) {}

  const items = data.items || [];

  main.innerHTML = `
  <!-- Stats row -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:20px">
    ${[
      {k:'total',       label:'إجمالي العروض',    icon:'💼', val:stats.total||0,       color:'#1a2472'},
      {k:'sent',        label:'مُرسَلة',           icon:'📨', val:stats.by_status?.sent||0,     color:'#1a2472'},
      {k:'negotiation', label:'تفاوض',             icon:'🤝', val:stats.by_status?.negotiation||0, color:'#d97706'},
      {k:'accepted',    label:'مقبولة',            icon:'✅', val:stats.by_status?.accepted||0,  color:'#15803d'},
      {k:'total_val',   label:'قيمة العروض',       icon:'💰', val:money(stats.total_value||0),   color:'#0369a1'},
      {k:'conv',        label:'نسبة التحويل',      icon:'📈', val:(stats.conversion_rate||0)+'%', color:'#7c3aed'},
    ].map(s=>`
      <div class="stat-card" style="padding:16px;border-right:3px solid ${s.color}">
        <div style="font-size:20px;margin-bottom:6px">${s.icon}</div>
        <div style="font-size:22px;font-weight:800;color:#1e293b;line-height:1">${s.val}</div>
        <div style="font-size:11px;color:#64748b;margin-top:3px">${s.label}</div>
      </div>`).join('')}
  </div>

  <!-- Actions bar -->
  <div class="card" style="padding:16px 20px;margin-bottom:16px;display:flex;gap:10px;align-items:center;flex-wrap:wrap">
    <button class="btn btn-primary" onclick="showQuotationForm()" style="gap:8px">
      <span style="font-size:16px">✏️</span> إنشاء عرض سعر جديد
    </button>
    <input id="quoSearch" class="input" style="max-width:280px" placeholder="بحث باسم العميل أو رقم العرض..." oninput="quoSearchDebounce(this.value)"/>
    <select id="quoStatusFilter" class="input" style="max-width:160px" onchange="loadQuotations()">
      <option value="">كل الحالات</option>
      ${Object.entries(QUO_STATUS).map(([k,v])=>`<option value="${k}">${v.icon} ${v.label}</option>`).join('')}
    </select>
  </div>

  <!-- Quotations table -->
  <div class="card" style="overflow:hidden">
    <div style="overflow-x:auto">
    <table>
      <thead>
        <tr>
          <th>رقم العرض</th>
          <th>العميل</th>
          <th>الكيان القانوني</th>
          <th>النشاط</th>
          <th>الإجمالي</th>
          <th>الحالة</th>
          <th>التاريخ</th>
          <th>الإجراءات</th>
        </tr>
      </thead>
      <tbody>
        ${items.length === 0 ? `<tr><td colspan="8" style="text-align:center;padding:40px;color:#94a3b8">
          <div style="font-size:40px;margin-bottom:10px">💼</div>
          <div>لا توجد عروض أسعار بعد</div>
          <button class="btn btn-primary" style="margin-top:14px" onclick="showQuotationForm()">✏️ أنشئ أول عرض</button>
        </td></tr>` : items.map(q => {
          const st = QUO_STATUS[q.status] || QUO_STATUS.draft;
          return `<tr style="cursor:pointer" onclick="showQuotationDetail(${q.id})">
            <td style="font-weight:700;color:#1a2472">${escH(q.quote_number||'')}</td>
            <td>
              <div style="font-weight:600">${escH(q.client_name||'')}</div>
              ${q.client_phone?`<div style="font-size:11px;color:#94a3b8">${escH(q.client_phone)}</div>`:''}
            </td>
            <td><span style="font-size:12px;background:#eef1fb;color:#1a2472;padding:3px 8px;border-radius:6px">${escH(q.legal_entity||'—')}</span></td>
            <td style="font-size:12px;color:#64748b;max-width:150px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${escH(q.activity||'—')}</td>
            <td style="font-weight:700;color:#15803d">${q.expenses_total?money(q.expenses_total):'—'}</td>
            <td onclick="event.stopPropagation()">
              <select onchange="quickStatusUpdate(${q.id},this.value)" style="font-size:12px;border:1.5px solid ${st.color};border-radius:8px;padding:3px 8px;background:${st.bg};color:${st.color};font-family:inherit;cursor:pointer;outline:none">
                ${Object.entries(QUO_STATUS).map(([k,v])=>`<option value="${k}" ${q.status===k?'selected':''}>${v.icon} ${v.label}</option>`).join('')}
              </select>
            </td>
            <td style="font-size:12px;color:#94a3b8">${q.created_at?new Date(q.created_at).toLocaleDateString('ar-EG'):'—'}</td>
            <td onclick="event.stopPropagation()">
              <div style="display:flex;gap:5px">
                <button class="btn btn-secondary btn-sm" onclick="showQuotationDetail(${q.id})" title="عرض التفاصيل">👁</button>
                <button class="btn btn-secondary btn-sm" onclick="showQuotationPreview(${q.id})" title="معاينة وطباعة PDF">🖨️</button>
                <button class="btn btn-secondary btn-sm" onclick="duplicateQuotation(${q.id})" title="نسخ العرض">📋</button>
              </div>
            </td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>
    </div>
  </div>`;

  // Set up search
  window._quoSearchTimeout = null;
}

function quoItemRow(containerId, text='', idx=0) {
  return `<div style="display:flex;gap:6px;margin-bottom:6px" id="${containerId}_item_${idx}">
    <input class="input" style="flex:1;font-size:13px" value="${escH(text)}" placeholder="أضف بنداً..."/>
    <button onclick="this.parentElement.remove()" style="background:#fee2e2;border:none;border-radius:6px;width:30px;cursor:pointer;font-size:14px;color:#dc2626">×</button>
  </div>`;
}

function addQuoItem(containerId) {
  const container = document.getElementById(containerId);
  if(!container) return;
  const idx = container.children.length;
  container.insertAdjacentHTML('beforeend', quoItemRow(containerId, '', idx));
}

function calcQuoTotal() {
  const gov = parseFloat(document.getElementById('qGovFees')?.value||0);
  const off = parseFloat(document.getElementById('qOfficeFees')?.value||0);
  const total = document.getElementById('qTotal');
  if(total && (gov+off > 0)) total.value = gov + off;
}

function getQuoItems(containerId) {
  const container = document.getElementById(containerId);
  if(!container) return [];
  return Array.from(container.querySelectorAll('input')).map(i=>i.value.trim()).filter(Boolean);
}

function applyQuoTemplate(templateId) {
  const all = window._quoTemplateData || [];
  const t = all.find(x => x.id === templateId || x.id === String(templateId));
  if(!t) return;

  // Fill legal entity
  const le = document.getElementById('qLegalEntity');
  if(le && t.legal_entity) le.value = t.legal_entity;

  // Fill greeting
  const gr = document.getElementById('qGreeting');
  if(gr && t.greeting) gr.value = t.greeting;

  // Fill total
  const tot = document.getElementById('qTotal');
  if(tot && t.default_expenses) tot.value = t.default_expenses;

  // Fill deliverables
  const deliv = document.getElementById('qDeliverables');
  if(deliv && t.deliverables?.length) {
    deliv.innerHTML = t.deliverables.map((d,i)=>quoItemRow('qDeliverables',d,i)).join('');
  }

  // Fill requirements
  const reqs = document.getElementById('qRequirements');
  if(reqs && t.requirements?.length) {
    reqs.innerHTML = t.requirements.map((r,i)=>quoItemRow('qRequirements',r,i)).join('');
  }

  toast(`تم تطبيق قالب: ${t.name}`);
}

async function saveQuotationForm(existingId, closeAfter = false) {
  const resultDiv = document.getElementById('quoFormResult');
  const btn = event?.target;
  const clientName = document.getElementById('qClientName')?.value?.trim();
  if(!clientName) {
    resultDiv.innerHTML = `<div style="color:#dc2626;padding:8px 12px;background:#fef2f2;border-radius:6px">⚠️ اسم العميل مطلوب</div>`;
    return;
  }

  const payload = {
    client_name: clientName,
    client_phone: document.getElementById('qClientPhone')?.value?.trim()||null,
    client_email: document.getElementById('qClientEmail')?.value?.trim()||null,
    legal_entity: document.getElementById('qLegalEntity')?.value||null,
    activity: document.getElementById('qActivity')?.value?.trim()||null,
    activity_location: document.getElementById('qActivityLocation')?.value||null,
    capital: parseFloat(document.getElementById('qCapital')?.value||0),
    deliverables: getQuoItems('qDeliverables'),
    requirements: getQuoItems('qRequirements'),
    expenses_total: parseFloat(document.getElementById('qTotal')?.value||0),
    government_fees: parseFloat(document.getElementById('qGovFees')?.value||0),
    office_fees: parseFloat(document.getElementById('qOfficeFees')?.value||0),
    notes: document.getElementById('qNotes')?.value?.trim()||null,
    greeting: document.getElementById('qGreeting')?.value||'مساء الخير',
    advisor_name: document.getElementById('qAdvisor')?.value?.trim()||null,
  };

  if(btn) { btn.disabled = true; btn.textContent = '⏳ جارٍ الحفظ...'; }
  resultDiv.innerHTML = '';

  try {
    let result;
    if(existingId) {
      result = await api('PUT', `/api/quotations/${existingId}`, payload);
      toast('تم تحديث عرض السعر بنجاح ✅');
    } else {
      result = await api('POST', '/api/quotations', payload);
      toast('تم إنشاء عرض السعر بنجاح ✅');
    }

    const overlay = document.querySelector('.modal-overlay');
    if(overlay) overlay.remove();

    // Show the detail/preview
    if(!closeAfter) showQuotationDetail(result.id);
    else loadQuotations();
  } catch(e) {
    resultDiv.innerHTML = `<div style="color:#dc2626;padding:8px 12px;background:#fef2f2;border-radius:6px">❌ ${escH(e.message)}</div>`;
    if(btn) { btn.disabled = false; btn.textContent = existingId ? '💾 حفظ التعديلات' : '📋 إنشاء عرض السعر'; }
  }
}

async function quoUpdateStatus(id, status) {
  try {
    await api('PATCH', `/api/quotations/${id}/status`, {status});
    toast(`${QUO_STATUS[status]?.icon||''} تم تحديث الحالة: ${QUO_STATUS[status]?.label||status}`);
    // Refresh detail modal
    document.querySelector('.modal-overlay')?.remove();
    showQuotationDetail(id);
  } catch(e) { toast(e.message,'error'); }
}

async function sendQuotationEmail(id, currentEmail) {
  const email = prompt('إيميل المستلم:', currentEmail || '');
  if(!email) return;
  try {
    const r = await api('POST', `/api/quotations/${id}/send`, {to_email: email});
    toast(r.message || '✅ تم الإرسال بنجاح');
  } catch(e) { toast(e.message,'error'); }
}

function sendQuotationWhatsApp(id, phone, clientName, quoteNumber, total, legalEntity) {
  // ── تنسيق رقم الهاتف للواتساب (مصري → دولي)
  const num = toWAPhone(phone);
  if(!num){ toast('لا يوجد رقم هاتف مسجّل لهذا العميل','error'); return; }
  // ── رسالة واتساب جاهزة
  const entityAr = {
    llc:'شركة ذات مسؤولية محدودة',
    one_person:'شركة شخص واحد',
    sole:'مؤسسة فردية',
    limited_partnership:'شركة توصية بسيطة',
    joint_stock:'شركة مساهمة',
    branch:'فرع شركة أجنبية',
  }[legalEntity] || legalEntity || 'شركة';
  const totalFmt = total ? Number(total).toLocaleString('ar-EG') + ' جنيه' : '—';
  const msg = [
    `السلام عليكم ورحمة الله وبركاته 🌟`,
    ``,
    `السيد / ${clientName}`,
    ``,
    `نشكركم على تواصلكم مع مكتب MS Accounting للمحاسبة والضرائب.`,
    ``,
    `يسعدنا تقديم عرض السعر الخاص بتأسيس ${entityAr}،`,
    `وقد تم إعداده بعناية ليشمل جميع الخدمات المطلوبة.`,
    ``,
    `📋 رقم العرض: ${quoteNumber}`,
    `💰 إجمالي الأتعاب: ${totalFmt}`,
    ``,
    `نرجو مراجعة التفاصيل والتواصل معنا لأي استفسار.`,
    `نحن هنا لخدمتكم 🤝`,
    ``,
    `مكتب MS Accounting`,
  ].join('\n');

  const url = `https://wa.me/${num}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');

  // سجّل آخر تواصل في النظام
  api('PATCH', `/api/quotations/${id}/status`, {status: 'sent'}).catch(()=>{});
}

async function duplicateQuotation(id) {
  try {
    const r = await api('POST', `/api/quotations/${id}/duplicate`);
    toast('تم نسخ عرض السعر ✅');
    document.querySelector('.modal-overlay')?.remove();
    showQuotationDetail(r.id);
  } catch(e) { toast(e.message,'error'); }
}

async function convertQuotationToClient(id) {
  if(!await confirmDlg('هل تريد تحويل عرض السعر إلى عميل جديد؟ سيتم إنشاء ملف العميل وبدء workflow التأسيس تلقائياً.')) return;
  try {
    const r = await api('POST', `/api/quotations/${id}/convert`);
    toast(r.message);
    document.querySelector('.modal-overlay')?.remove();
    if(r.client_id) setTimeout(()=>{ navigate('clients'); setTimeout(()=>showClientDetail(r.client_id),500); }, 300);
  } catch(e) { toast(e.message,'error'); }
}

function switchStab(tabId) {
  ['general','notifications','team','import','backup'].forEach(id => {
    const el = document.getElementById('stab-'+id);
    const btn = document.getElementById('stab-btn-'+id);
    if(el) el.style.display = id===tabId ? 'block' : 'none';
    if(btn){ btn.style.borderBottomColor = id===tabId?'#1a2472':'transparent'; btn.style.color = id===tabId?'#1a2472':'#64748b'; }
  });
  if(tabId==='team') _loadSettingsTeam();
  if(tabId==='backup') loadBackupList();
}

async function _loadSettingsTeam() {
  try {
    const users = await api('GET','/api/users');
    renderEmployeeGrid(users);
  } catch(e){ toast(e.message,'error'); }
}

async function doComposeEmail(clientId) {
  const btn=document.getElementById('composeSendBtn');
  const resultDiv=document.getElementById('composeResult');
  const toEmail=document.getElementById('composeToEmail')?.value?.trim();
  const subject=document.getElementById('composeSubject')?.value?.trim();
  const body=document.getElementById('composeBody')?.value?.trim();
  const inclObl=document.getElementById('composeInclObl')?.checked;
  const inclInv=document.getElementById('composeInclInv')?.checked;

  if(!toEmail){resultDiv.innerHTML=`<div style="color:#dc2626;font-size:13px;padding:8px 12px;background:#fef2f2;border-radius:6px">⚠️ أدخل البريد الإلكتروني</div>`;return;}
  if(!subject){resultDiv.innerHTML=`<div style="color:#dc2626;font-size:13px;padding:8px 12px;background:#fef2f2;border-radius:6px">⚠️ أدخل موضوع الرسالة</div>`;return;}
  if(!body){resultDiv.innerHTML=`<div style="color:#dc2626;font-size:13px;padding:8px 12px;background:#fef2f2;border-radius:6px">⚠️ اكتب نص الرسالة</div>`;return;}

  btn.disabled=true;
  btn.innerHTML='<span>⏳</span> جارٍ الإرسال...';
  resultDiv.innerHTML='';
  try {
    const r=await api('POST','/api/notifications/compose',{
      to_email: toEmail,
      subject: subject,
      body: body,
      client_id: clientId||null,
      include_obligations: inclObl,
      include_invoices: inclInv,
    });
    resultDiv.innerHTML=`<div style="color:#16a34a;font-size:13px;background:#f0fdf4;padding:10px 12px;border-radius:6px;display:flex;align-items:center;gap:6px"><span>✅</span> ${escH(r.message)}</div>`;
    btn.innerHTML='<span>✅</span> تم الإرسال';
    setTimeout(()=>{document.querySelector('.modal-overlay')?.remove();},2200);
  } catch(e){
    resultDiv.innerHTML=`<div style="color:#dc2626;font-size:13px;padding:8px 12px;background:#fef2f2;border-radius:6px">❌ ${escH(e.message)}</div>`;
    btn.disabled=false;
