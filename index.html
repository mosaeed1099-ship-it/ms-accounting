<html lang="ar" dir="rtl">
<head>

      theme: { extend: { fontFamily: { sans: ['Cairo','system-ui','sans-serif'] } } }
    }

  <style>
    *{font-family:'Cairo',system-ui,sans-serif;box-sizing:border-box}
    body{background:#f1f5f9;margin:0}
    /* Sidebar */
    .sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s;color:#475569;margin:1px 0}
    .sidebar-link:hover{background:#f1f5f9;color:#0f1848}
    .sidebar-link.active{background:linear-gradient(135deg,#1a2472,#152060);color:white;box-shadow:0 4px 12px rgba(37,99,235,.3)}
    .sidebar-link .icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:16px;flex-shrink:0}
    /* Cards */
    .card{background:white;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);border:1px solid #e8edf3}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:inherit}
    .btn-primary{background:linear-gradient(135deg,#1a2472,#152060);color:white;box-shadow:0 2px 8px rgba(37,99,235,.3)}
    .btn-primary:hover{background:linear-gradient(135deg,#152060,#0f1848);transform:translateY(-1px)}
    .btn-secondary{background:white;color:#374151;border:1.5px solid #d1d5db}
    .btn-secondary:hover{background:#f9fafb;border-color:#9ca3af}
    .btn-success{background:#16a34a;color:white}
    .btn-danger{background:#dc2626;color:white}
    .btn-sm{padding:5px 12px;font-size:12px}
    /* Inputs */
    .input{width:100%;padding:9px 13px;border:1.5px solid #d1d5db;border-radius:9px;font-size:13.5px;font-family:inherit;outline:none;transition:border .15s;background:white}
    .input:focus{border-color:#1a2472;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    /* Badges */
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600}
    .badge-green{background:#dcfce7;color:#15803d}
    .badge-blue{background:#d8def5;color:#152060}
    .badge-red{background:#fee2e2;color:#dc2626}
    .badge-yellow{background:#fef9c3;color:#a16207}
    .badge-gray{background:#f3f4f6;color:#4b5563}
    .badge-purple{background:#ede9fe;color:#6d28d9}
    .badge-orange{background:#fff7ed;color:#c2410c}
    /* Table */
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{padding:11px 14px;text-align:right;font-size:11px;color:#6b7280;font-weight:700;background:#f8fafc;border-bottom:1.5px solid #e5e7eb;text-transform:uppercase;letter-spacing:.3px}
    tbody td{padding:11px 14px;border-bottom:1px solid #f3f4f6;color:#374151}
    tbody tr:hover{background:#fafbff}
    tbody tr:last-child td{border-bottom:none}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px)}
    .modal{background:white;border-radius:18px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.25)}
    /* Toast */
    .toasts{position:fixed;top:16px;left:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast-item{display:flex;align-items:center;gap:10px;padding:13px 18px;background:white;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.12);min-width:280px;border-right:4px solid;animation:slideIn .25s ease}

    /* Kanban */
    .kanban-col{background:#f8fafc;border-radius:14px;min-height:400px;border:1.5px solid #e8edf3}
    .kanban-card{background:white;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e8edf3;transition:all .15s;cursor:pointer}
    .kanban-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px)}

    .stat-card{background:white;border-radius:14px;padding:20px;border:1px solid #e8edf3;box-shadow:0 1px 4px rgba(0,0,0,.06);position:relative;overflow:hidden}
    .stat-card::after{content:'';position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 14px 14px 0}
    .stat-blue::after{background:linear-gradient(180deg,#4478b0,#152060)}
    .stat-green::after{background:linear-gradient(180deg,#22c55e,#15803d)}
    .stat-red::after{background:linear-gradient(180deg,#f87171,#dc2626)}
    .stat-purple::after{background:linear-gradient(180deg,#a78bfa,#5b8ec4)}
    /* Page animation */
    .page{animation:fadeUp .2s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    /* Loading */
    .spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#1a2472;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Section headings */
    .section-title{font-size:15px;font-weight:700;color:#1a2472;margin:0 0 16px;padding-right:12px;border-right:3px solid #1a2472;line-height:1.4;display:flex;align-items:center;gap:6px}

    /* Scrollbar */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#f1f5f9}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
    select,textarea{font-family:inherit}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:640px){.form-row{grid-template-columns:1fr}}
    .priority-urgent{border-right:3px solid #dc2626!important}
    .priority-high{border-right:3px solid #f97316!important}
    .priority-medium{border-right:3px solid #eab308!important}
    .priority-low{border-right:3px solid #22c55e!important}

    /* ── Responsive Layout ─────────────────────────────── */
    .app-sidebar{width:230px;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto;background:white;border-left:1.5px solid #e8edf3;box-shadow:2px 0 8px rgba(0,0,0,.04)}
    .app-main{margin-right:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
    .mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:#1a2472}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:190;backdrop-filter:blur(2px)}

    @media(max-width:768px){
      /* Sidebar becomes a slide-in drawer */
      .app-sidebar{
        position:fixed;right:-250px;top:0;width:250px;height:100vh;
        z-index:200;transition:right .28s ease;

      .app-sidebar.open{right:0;box-shadow:-6px 0 24px rgba(0,0,0,.18)}

      /* Main content fills full width */
      .app-main{margin-right:0}
      /* Show hamburger button */
      .mobile-menu-btn{display:flex!important;align-items:center;justify-content:center}
      /* Tables scroll horizontally */
      .card{overflow-x:auto}
      table{min-width:500px}
      /* Kanban columns stack */
      .kanban-col{min-width:260px}
      /* Stat cards: 2 columns */
      .stats-grid{grid-template-columns:1fr 1fr!important}
      /* Page padding */
      #main{padding:16px!important}
      /* Modal full width */
      .modal{max-width:100%!important;margin:0;border-radius:14px 14px 0 0;position:fixed;bottom:0;right:0;left:0;max-height:92vh}
      .modal-overlay{align-items:flex-end}
      /* Topbar */
      .topbar-date{display:none}
      /* Login card */
      .login-card{margin:12px!important;padding:24px!important}
    }

    @media(max-width:480px){
      .stats-grid{grid-template-columns:1fr!important}
      thead th{font-size:10px;padding:8px}
      tbody td{font-size:12px;padding:8px}
    }
  </style>
</head>
<body>
<div id="app"></div>
<div id="toasts" class="toasts"></div>

<script type="module">
const API = window.MS_API_BASE || (
  window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? `http://${window.location.hostname}:8000`
    : `https://${window.location.hostname.replace(/^[^.]+\./, 'api.')}`
);
let token = localStorage.getItem('ms_token');
let currentUser = JSON.parse(localStorage.getItem('ms_user') || 'null');
let currentPage = 'dashboard';
let chartInstances = {};

// ── Utilities ──────────────────────────────────────
const $ = (s,c=document) => c.querySelector(s);
const $$ = (s,c=document) => [...c.querySelectorAll(s)];

async function api(method, path, body=null) {
  const opts = {
    method,
    headers:{'Content-Type':'application/json', ...(token?{Authorization:`Bearer ${token}`}:{})}
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(API+path, opts);
    if (r.status===401){logout();return null}
    const data = await r.json().catch(()=>({}));
    if (!r.ok) {
      let msg = 'خطأ في الطلب';
      if (typeof data.detail === 'string') msg = data.detail;
      else if (Array.isArray(data.detail)) msg = data.detail.map(e=>e.msg||e).join(' | ');
      else if (data.message) msg = data.message;
      throw new Error(msg);
    }
    return data;
  } catch(e) {
    if (e.message && e.message.includes('fetch')) throw new Error('تعذّر الاتصال بالخادم — تأكد من تشغيل الـ Backend');
    throw e;
  }
}

function toast(msg, type='success') {
  const colors={success:'#16a34a',error:'#dc2626',warning:'#d97706',info:'#1a2472'};
  const icons={success:'✓',error:'✕',warning:'⚠',info:'ℹ'};
  const el=document.createElement('div');
  el.className='toast-item';
  el.style.borderColor=colors[type];
  el.innerHTML=`<span style="color:${colors[type]};font-weight:800;font-size:16px">${icons[type]}</span><span style="font-size:13px;color:#1f2937;font-weight:500">${msg}</span>`;
  document.getElementById('toasts').append(el);
  setTimeout(()=>el.remove(),4000);
}

function money(n) {
  return new Intl.NumberFormat('ar-EG',{style:'currency',currency:'EGP',minimumFractionDigits:0}).format(n||0);
}
function dateAr(d) {
  if(!d) return '—';
  return new Intl.DateTimeFormat('ar-EG',{year:'numeric',month:'short',day:'numeric'}).format(new Date(d));
}
function daysUntil(d) {
  if(!d) return null;
  const diff = Math.ceil((new Date(d)-new Date())/(1000*60*60*24));
  return diff;
}
function destroyChart(key) {
  if(chartInstances[key]) { chartInstances[key].destroy(); delete chartInstances[key]; }
}

// ── Auth ───────────────────────────────────────────
async function login(email, password) {
  const body=new URLSearchParams({username:email,password});
  const r=await fetch(`${API}/api/auth/login`,{method:'POST',body,headers:{'Content-Type':'application/x-www-form-urlencoded'}});
  const data=await r.json();
  if(!r.ok) throw new Error(data.detail||'بيانات الدخول غير صحيحة');
  token=data.access_token; currentUser=data.user;
  localStorage.setItem('ms_token',token);
  localStorage.setItem('ms_user',JSON.stringify(currentUser));
  renderApp();
}
function logout() {
  token=null; currentUser=null;
  localStorage.removeItem('ms_token'); localStorage.removeItem('ms_user');
  renderApp();
}

          <p style="font-size:12px;color:#0369a1;margin:0">كلمة المرور: admin123</p>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('loginBtn').onclick = async () => {
    const btn=document.getElementById('loginBtn');
    const err=document.getElementById('loginErr');
    err.textContent='';
    btn.disabled=true; btn.textContent='جاري الدخول...';
    try { await login(document.getElementById('loginEmail').value, document.getElementById('loginPass').value); }
    catch(e){ err.textContent=e.message; btn.disabled=false; btn.innerHTML='🔐 دخول'; }
  };
  document.getElementById('loginPass').onkeydown = e => { if(e.key==='Enter') document.getElementById('loginBtn').click(); };
}

  // Build nav
  const nav = document.getElementById('nav');
  navItems.forEach(item => {

  fetch(`${API}/`).then(r=>r.ok?null:setApiStatus(false)).catch(()=>setApiStatus(false));

  setInterval(loadNotifCount, 120000);

// ── Notifications Bell ─────────────────────────────
let notifData = [], notifDropdownOpen = false;

async function loadNotifCount() {
  try {
    const d = await api('GET', '/api/obligations/notifications?unread_only=true&limit=1');
    if (!d) return;
    const badge = document.getElementById('notifBadge');
    if (badge) {
      const cnt = d.unread_count || 0;
      badge.textContent = cnt > 99 ? '99+' : cnt;
      badge.style.display = cnt > 0 ? 'block' : 'none';
    }
  } catch(e) {}
}

async function loadNotifData() {
  try {
    const d = await api('GET', '/api/obligations/notifications?limit=20');
    notifData = d?.items || [];
    renderNotifList();
    const badge = document.getElementById('notifBadge');
    if (badge) {
      const cnt = d?.unread_count || 0;
      badge.textContent = cnt > 99 ? '99+' : cnt;
      badge.style.display = cnt > 0 ? 'block' : 'none';
    }
  } catch(e) { document.getElementById('notifList').innerHTML='<div style="padding:20px;text-align:center;color:#94a3b8">تعذّر تحميل الإشعارات</div>'; }
}

function renderNotifList() {
  const el = document.getElementById('notifList');
  if (!el) return;
  if (!notifData.length) {
    el.innerHTML = '<div style="text-align:center;padding:30px;color:#94a3b8;font-size:13px">🎉 لا توجد إشعارات جديدة</div>';
    return;
  }
  const typeIcon = {warning:'⚠️', info:'📅', error:'🚨', success:'✅', deadline:'⏰'};
  el.innerHTML = notifData.map(n=>`
    <div onclick="markNotifRead(${n.id})" style="padding:12px 16px;border-bottom:1px solid #f8fafc;cursor:pointer;background:${n.is_read?'white':'#f0f7ff'};transition:background .15s" onmouseover="this.style.background='#f8fafc'" onmouseout="this.style.background='${n.is_read?'white':'#f0f7ff'}'">
      <div style="display:flex;align-items:flex-start;gap:10px">
        <span style="font-size:16px;flex-shrink:0;margin-top:1px">${typeIcon[n.type]||'🔔'}</span>
        <div style="flex:1;min-width:0">
          <div style="font-size:12px;font-weight:${n.is_read?600:700};color:#1e293b;margin-bottom:2px;line-height:1.4">${escH(n.title)}</div>
          <div style="font-size:11px;color:#64748b;line-height:1.4">${escH(n.message||'')}</div>
          <div style="font-size:10px;color:#cbd5e1;margin-top:4px">${dateAr(n.created_at)}</div>
        </div>
        ${!n.is_read?'<span style="width:8px;height:8px;background:#1a73e8;border-radius:50%;flex-shrink:0;margin-top:4px"></span>':''}
      </div>
    </div>`).join('');
}

function toggleNotifDropdown() {
  notifDropdownOpen = !notifDropdownOpen;
  const dd = document.getElementById('notifDropdown');
  if (!dd) return;
  dd.style.display = notifDropdownOpen ? 'block' : 'none';
  if (notifDropdownOpen) {
    loadNotifData();
    // Close on outside click
    setTimeout(()=>document.addEventListener('click', closeNotifOnOutside, {once:true}), 10);
  }
}

function closeNotifOnOutside(e) {
  const wrap = document.getElementById('notifBellWrap');
  if (wrap && !wrap.contains(e.target)) {
    const dd = document.getElementById('notifDropdown');
    if (dd) dd.style.display = 'none';
    notifDropdownOpen = false;
  }
}

async function markNotifRead(id) {
  try {
    await api('PUT', `/api/obligations/notifications/${id}/read`);
    notifData = notifData.map(n => n.id===id ? {...n, is_read:true} : n);
    renderNotifList();
    loadNotifCount();
  } catch(e) {}
}

async function markAllNotifsRead() {
  try {
    await api('PUT', '/api/obligations/notifications/read-all');
    notifData = notifData.map(n=>({...n,is_read:true}));
    renderNotifList();
    const badge = document.getElementById('notifBadge');
    if (badge) badge.style.display = 'none';
  } catch(e) {}
}

function setApiStatus(ok) {
  const dot=document.getElementById('apiDot');
  if(dot) dot.style.background=ok?'#22c55e':'#ef4444';
}

function navigate(page) {
  currentPage = page;

}

    } catch(e){toast(e.message,'error');btn.disabled=false;btn.innerHTML=`💾 ${c?'حفظ التعديلات':'إضافة عميل'}`}
  };
}

function toggleOblLabel(cb){
  const lbl=document.getElementById('cObl_'+cb.dataset.key+'_label');
  if(lbl){lbl.style.borderColor=cb.checked?'#1a2472':'#e5e7eb';lbl.style.background=cb.checked?'#eef1fb':'#fff';}
}
window.toggleOblLabel=toggleOblLabel;

// ── INVOICES ───────────────────────────────────────
let invoicesData=[], invoiceFilter='all';

async function loadInvoices() {
  try {
    const p = new URLSearchParams({limit:'100'});
    if(invoiceFilter && invoiceFilter!=='all') p.append('status', invoiceFilter);
    const data=await api('GET',`/api/invoices?${p}`);
    if(!data) return;
    invoicesData=data.items||[];
    renderInvoices();
  } catch(e){toast(e.message,'error')}
}

function renderInvoices() {
  const main=document.getElementById('main');
  main.className='page';
  const statusBadge={paid:'badge-green',sent:'badge-blue',partial:'badge-yellow',overdue:'badge-red',draft:'badge-gray',cancelled:'badge-gray'};
  const statusLabel={paid:'مسددة',sent:'مرسلة',partial:'جزئي',overdue:'متأخرة',draft:'مسودة',cancelled:'ملغاة'};
  const total=invoicesData.reduce((s,i)=>s+i.total,0);
  const collected=invoicesData.reduce((s,i)=>s+i.paid_amount,0);

      <div><div style="font-size:18px;font-weight:800;color:#dc2626">${money(outstanding)}</div><div style="font-size:12px;color:#64748b">المستحق</div></div>
    </div>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:8px;flex-wrap:wrap">

      <tbody>
        ${invoicesData.length===0?`<tr><td colspan="9" style="text-align:center;padding:40px;color:#94a3b8">لا توجد فواتير</td></tr>`:
          invoicesData.map(inv=>`
          <tr>
            <td><span style="font-weight:700;color:#1a2472">${inv.invoice_number}</span></td>
            <td style="font-weight:500;color:#374151">${inv.client_name||inv.client_id}</td>
            <td>${dateAr(inv.issue_date)}</td>
            <td style="color:${daysUntil(inv.due_date)<0&&inv.status!=='paid'?'#dc2626':'#374151'}">${dateAr(inv.due_date)}</td>
            <td style="font-weight:700;color:#1e293b">${money(inv.total)}</td>
            <td style="color:#16a34a;font-weight:600">${money(inv.paid_amount)}</td>
            <td style="color:${inv.remaining>0?'#dc2626':'#16a34a'};font-weight:600">${money(inv.remaining)}</td>
            <td><span class="badge ${statusBadge[inv.status]||'badge-gray'}">${statusLabel[inv.status]||inv.status}</span></td>
            <td>
              <div style="display:flex;gap:5px">
                ${inv.remaining>0&&inv.status!=='cancelled'?`<button class="btn btn-success btn-sm" onclick="showPaymentModal(${inv.id},${inv.remaining},'${inv.invoice_number}')">💵</button>`:''}

async function showInvoiceModal(id=null, preClientId=null) {
  let inv=null, clients=[];
  try {
    clients=(await api('GET','/api/clients?limit=200'))?.items||[];
    if(id) inv=invoicesData.find(x=>x.id===id);
  } catch(e){toast(e.message,'error');return}

  let items=inv?.items||[{description:'',quantity:1,unit_price:0,tax_percent:14}];

  const overlay=document.createElement('div');
  overlay.className='modal-overlay';

  function buildModal() {
    overlay.innerHTML=`<div class="modal" style="max-width:660px">
      <div style="padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
        <h2 style="font-size:17px;font-weight:700;color:#1e293b;margin:0">${inv?'تعديل أتعاب':'أتعاب جديدة'}</h2>
        <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button>
      </div>
      <div style="padding:20px 24px">
        <div class="form-row" style="margin-bottom:14px">
          <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">العميل *</label>
            <select id="invClient" class="input">
              ${clients.map(c=>`<option value="${c.id}" ${(preClientId||inv?.client_id)==c.id?'selected':''}>${c.name}</option>`).join('')}
            </select></div>
          <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">تاريخ الإصدار</label>
            <input id="invDate" class="input" type="date" value="${inv?.issue_date||new Date().toISOString().split('T')[0]}"/></div>
        </div>
        <div style="margin-bottom:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <label style="font-size:13px;font-weight:700;color:#374151">بنود الفاتورة</label>
            <button class="btn btn-secondary btn-sm" id="addItemBtn">+ بند</button>
          </div>
          <div id="itemsContainer"></div>
        </div>
        <div style="background:#f8fafc;border-radius:10px;padding:14px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:#64748b">المجموع</span><span id="subTotal" style="font-weight:700">0</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:#64748b">ضريبة القيمة المضافة (14%)</span><span id="taxTotal" style="font-weight:700;color:#d97706">0</span></div>
          <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:800;border-top:1.5px solid #e5e7eb;padding-top:8px;margin-top:8px"><span>الإجمالي</span><span id="grandTotal" style="color:#1a2472">0</span></div>
        </div>
      </div>
      <div style="padding:16px 24px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">إلغاء</button>
        <button id="saveInvBtn" class="btn btn-primary">💾 ${inv?'حفظ التعديلات':'إنشاء الأتعاب'}</button>
      </div>
    </div>`;

    function renderItems() {
      const cont=document.getElementById('itemsContainer');
      if(!cont) return;
      cont.innerHTML='';
      let sub=0;
      items.forEach((item,i)=>{
        const row=document.createElement('div');
        row.style='display:grid;grid-template-columns:2fr 80px 100px 40px;gap:8px;margin-bottom:8px;align-items:center';
        row.innerHTML=`
          <input class="input" value="${item.description}" placeholder="وصف البند" oninput="items[${i}].description=this.value"/>
          <input class="input" type="number" value="${item.quantity}" placeholder="الكمية" min="0.1" step="0.1" oninput="items[${i}].quantity=parseFloat(this.value)||0;renderItemsInner()"/>
          <input class="input" type="number" value="${item.unit_price}" placeholder="السعر" oninput="items[${i}].unit_price=parseFloat(this.value)||0;renderItemsInner()"/>
          <button onclick="items.splice(${i},1);renderItemsInner()" style="background:#fee2e2;border:none;border-radius:8px;padding:7px;cursor:pointer;color:#dc2626;font-size:14px">${items.length>1?'✕':''}</button>`;
        cont.append(row);
        sub+=item.quantity*item.unit_price;
      });
      const tax=sub*0.14;
      document.getElementById('subTotal').textContent=money(sub);
      document.getElementById('taxTotal').textContent=money(tax);
      document.getElementById('grandTotal').textContent=money(sub+tax);
    }
    window.renderItemsInner=renderItems;
    renderItems();

    document.getElementById('addItemBtn').onclick=()=>{items.push({description:'',quantity:1,unit_price:0,tax_percent:14});renderItems()};

    document.getElementById('saveInvBtn').onclick=async()=>{
      const btn=document.getElementById('saveInvBtn');
      btn.disabled=true; btn.textContent='جاري الحفظ...';
      try {
        const sub=items.reduce((s,it)=>s+it.quantity*it.unit_price,0);
        const tax=sub*0.14;
        const body={
          client_id:parseInt($('#invClient',overlay).value),
          issue_date:$('#invDate',overlay).value,
          due_date:new Date(new Date($('#invDate',overlay).value).getTime()+30*86400000).toISOString().split('T')[0],
          subtotal:sub,tax_percent:14,tax_amount:tax,total:sub+tax,
          discount_percent:0,discount_amount:0,stamp_tax:0,withholding_tax:0,
          items:items.filter(it=>it.description.trim())
        };
        if(inv) await api('PUT',`/api/invoices/${inv.id}`,body);
        else await api('POST','/api/invoices',body);
        toast(inv?'تم تحديث الفاتورة':'تم إنشاء الفاتورة بنجاح');
        overlay.remove(); loadInvoices();
      } catch(e){toast(e.message,'error');btn.disabled=false;btn.innerHTML=`💾 ${inv?'حفظ التعديلات':'إنشاء فاتورة'}`}
    };
  }

  buildModal();
  document.body.append(overlay);
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
}

    renderKanban();
  } catch(e){toast(e.message,'error')}
}

        <span style="font-size:13px;font-weight:700;color:${col.color}">${col.label}</span>

        </div>
        ${t.client_name?`<div style="font-size:11px;color:#64748b;margin-bottom:6px">👤 ${t.client_name}</div>`:''}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:8px">

          ${cols.filter(c=>c.id!==col.id).slice(0,2).map(c=>`<button onclick="updateTaskStatus(${t.id},'${c.id}')" style="font-size:10px;padding:3px 8px;border-radius:6px;background:${c.bg};color:${c.color};border:1px solid ${c.color}33;cursor:pointer;font-family:inherit;font-weight:600">${c.label}</button>`).join('')}
        </div>
      </div>`).join('')}
      ${tasksData.filter(t=>t.status===col.id).length===0?`<div style="text-align:center;padding:24px;color:#94a3b8;font-size:12px">لا مهام</div>`:''}

async function updateTaskStatus(id, status) {
  try {
    await api('PUT',`/api/tasks/${id}`,{status});
    tasksData=tasksData.map(t=>t.id===id?{...t,status}:t);
    renderKanban();
    toast('تم تحديث حالة المهمة');
  } catch(e){toast(e.message,'error')}
}

        due_date:$('#tDue',overlay).value||null,
        notes:$('#tNotes',overlay).value||null,
      };
      if(!body.title){toast('عنوان المهمة مطلوب','error');btn.disabled=false;return}
      if(t) await api('PUT',`/api/tasks/${t.id}`,body);
      else await api('POST','/api/tasks',body);
      toast(t?'تم تحديث المهمة':'تم إضافة المهمة بنجاح');
      overlay.remove(); loadTasks();
    } catch(e){toast(e.message,'error');btn.disabled=false;btn.innerHTML=`💾 ${t?'حفظ':'إضافة'}`}
  };
}

let docsData=[];

async function loadDocuments() {
  try {
    const data=await api('GET','/api/documents?page_size=100');
    if(!data) return;
    docsData=data.items||[];
    renderDocuments();
  } catch(e){toast(e.message,'error')}
}

const DOC_CAT_ICON={
  contract:'📝',invoice:'📄',tax_return:'🧾',financial_statement:'📊',
  id_documents:'🪪',commercial_register:'🏢',tax_card:'💳',
  vat_certificate:'✅',bank_statement:'🏦',payroll:'💰',
  establishment:'🏗️',national_id:'🪪',other:'📁'
};
const DOC_CAT_LABEL={
  contract:'عقد',invoice:'فاتورة',tax_return:'إقرار ضريبي',
  financial_statement:'قوائم مالية',id_documents:'وثائق هوية',
  commercial_register:'سجل تجاري',tax_card:'بطاقة ضريبية',
  vat_certificate:'شهادة ق.م.ض',bank_statement:'كشف بنكي',
  payroll:'مرتبات',establishment:'تأسيس',national_id:'رقم قومي',other:'أخرى'
};

function docFileUrl(d){
  if(!d) return null;
  if(d.gdrive_view_url) return d.gdrive_view_url;
  if(!d.file_path) return null;
  const parts=d.file_path.replace(/\\/g,'/').split('/');
  return API+'/'+parts.map(p=>encodeURIComponent(p)).join('/');
}

function openDoc(idx){
  const d=docsData[idx];
  if(!d) return;
  const url=docFileUrl(d);
  if(!url){toast('رابط الملف غير متوفر','error');return;}
  window.open(url,'_blank');
}

function downloadDoc(idx,e){
  if(e) e.stopPropagation();
  const d=docsData[idx];
  if(!d){toast('الملف غير موجود','error');return;}
  if(d.gdrive_file_id){
    // Drive files: use export=download URL
    window.open(`https://drive.google.com/uc?export=download&id=${d.gdrive_file_id}`,'_blank');
  } else if(d.file_path){
    const url=docFileUrl(d);
    if(!url){toast('رابط التحميل غير متوفر','error');return;}
    const a=document.createElement('a');
    a.href=url; a.download=d.original_name||d.name||'file';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } else {
    toast('لا يوجد ملف للتحميل','error');
  }
}

  <!-- Filters -->

function driveShowStep(n){
  [1,2,3].forEach(i=>{
    const el=document.getElementById('driveStep'+i);
    if(el) el.style.display=i===n?(i===2?'flex':'block'):'none';
  });
  const stepEl=document.getElementById('driveWizardStep');
  if(stepEl) stepEl.textContent={1:'الخطوة 1 من 3 — أدخل رابط المجلد',2:'الخطوة 2 من 3 — راجع الملفات',3:'الخطوة 3 من 3 — اكتمل الاستيراد'}[n]||'';
}

async function runDriveScan(){
  const url=document.getElementById('driveFolderUrl').value.trim();
  const apiKey=document.getElementById('driveApiKey').value.trim();
  const errEl=document.getElementById('driveScanError');
  const btn=document.getElementById('driveScanBtn');
  errEl.style.display='none';

  if(!url){errEl.textContent='أدخل رابط المجلد أولاً';errEl.style.display='block';return;}

  btn.disabled=true; btn.textContent='⏳ جاري الفحص...';
  try {
    const result=await api('POST','/api/gdrive/scan',{
      folder_url: url,
      api_key: apiKey||null
    });
    if(!result) throw new Error('لم يتم الحصول على نتائج');

    driveScannedFiles=result.files||[];

    // Show step 2
    driveShowStep(2);
    const summary=document.getElementById('driveScanSummary');
    if(summary) summary.innerHTML=`
      <b>${result.total_files}</b> ملف •
      <span style="color:#16a34a"><b>${result.matched_files}</b> مرتبط بعميل</span> •
      <span style="color:#dc2626"><b>${result.unmatched_files}</b> غير مرتبط</span>
      ${driveScannedFiles.filter(f=>f.is_duplicate).length>0?` • <span style="color:#f59e0b"><b>${driveScannedFiles.filter(f=>f.is_duplicate).length}</b> مكرر</span>`:''}
    `;
    renderDriveFilesList();
  } catch(e){
    errEl.textContent=e.message||'خطأ في الاتصال بـ Google Drive';
    errEl.style.display='block';
  } finally {
    btn.disabled=false; btn.textContent='🔍 فحص المجلد واستخراج الملفات';
  }
}

function renderDriveFilesList(){
  const container=document.getElementById('driveFilesList');
  if(!container) return;

  // Group by folder_path
  const grouped={};
  driveScannedFiles.forEach((f,i)=>{
    const key=f.folder_path||'المجلد الرئيسي';
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push({...f,_idx:i});
  });

  container.innerHTML=Object.entries(grouped).map(([folder,files])=>`
    <div style="margin-bottom:20px">
      <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px;padding:4px 8px;background:#f8fafc;border-radius:6px">
        📂 ${escH(folder)}
      </div>
      ${files.map(f=>driveFileRow(f)).join('')}
    </div>
  `).join('');
}

function driveFileRow(f){
  const isDup=f.is_duplicate;
  const ext=(f.name||'').split('.').pop().toLowerCase();
  const iconMap={pdf:'📄',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',xlsx:'📊',xls:'📊',docx:'📝',doc:'📝',csv:'📊'};
  const fileIcon=iconMap[ext]||'📁';
  const clientOpts=driveClientsCache.map(c=>
    `<option value="${c.id}" ${f.suggested_client_id===c.id?'selected':''}>${escH(c.name)}</option>`
  ).join('');

function driveSelectAll(checked){
  driveScannedFiles.forEach((_,i)=>{
    const chk=document.getElementById('driveChk_'+i);
    if(chk) chk.checked=checked;
  });
  updateDriveImportBtn();
}

function updateDriveImportBtn(){
  const count=driveScannedFiles.filter((_,i)=>{
    const chk=document.getElementById('driveChk_'+i);
    return chk&&chk.checked;
  }).length;
  const btn=document.getElementById('driveImportBtn');
  if(btn) btn.textContent=`✅ استيراد ${count} ملف`;
}

async function runDriveImport(){
  const btn=document.getElementById('driveImportBtn');
  btn.disabled=true; btn.textContent='⏳ جاري الاستيراد...';

  const filesToImport=driveScannedFiles
    .map((f,i)=>{
      const chk=document.getElementById('driveChk_'+i);
      if(!chk||!chk.checked) return null;
      const catSel=document.getElementById('driveCat_'+i);
      const cliSel=document.getElementById('driveCli_'+i);
      return {
        gdrive_file_id: f.id,
        name: f.name,
        client_id: cliSel&&cliSel.value?parseInt(cliSel.value):null,
        category: catSel?catSel.value:'other',
        folder_path: f.folder_path||'',
        mime_type: f.mime_type||null,
        size: f.size||null,
      };
    })
    .filter(Boolean);

  if(!filesToImport.length){toast('لم تحدد أي ملفات','error');btn.disabled=false;btn.textContent='✅ استيراد الملفات المحددة';return;}

  try {
    const result=await api('POST','/api/gdrive/import',{files:filesToImport});
    driveShowStep(3);
    document.getElementById('driveResultMsg').textContent=`تم استيراد ${result.imported} ملف بنجاح`;
    document.getElementById('driveResultDetail').innerHTML=`
      ✅ مستورد: <b>${result.imported}</b> &nbsp;&nbsp;
      ⚠️ مكرر (تخطي): <b>${result.skipped_duplicates}</b>
      ${result.errors&&result.errors.length?`<br><span style="color:#dc2626">أخطاء: ${result.errors.join(' | ')}</span>`:''}
    `;
  } catch(e){
    toast(e.message||'خطأ في الاستيراد','error');
    btn.disabled=false; btn.textContent='✅ استيراد الملفات المحددة';
  }
}

window.showDriveImportWizard=showDriveImportWizard;
window.runDriveScan=runDriveScan;
window.runDriveImport=runDriveImport;
window.driveSelectAll=driveSelectAll;
window.updateDriveImportBtn=updateDriveImportBtn;
window.driveShowStep=driveShowStep;

async function saveLeadCell(el) {
  const row=el.closest('tr[data-id]');
  if(!row) return;
  const rowId=row.dataset.id;
  const field=el.dataset.field;
  let value;
  if(el.type==='checkbox') value=el.checked;
  else if(el.type==='number') value=el.value!==''?parseFloat(el.value):null;
  else value=el.value||null;

  if(rowId==='new'){
    const nameEl=row.querySelector('[data-field="name"]');
    if(!nameEl||!nameEl.value.trim()) return;
    if(_leadNewSaving) return;
    _leadNewSaving=true;
    const body={status:'new'};
    row.querySelectorAll('[data-field]').forEach(inp=>{
      const f=inp.dataset.field;
      if(inp.type==='checkbox') body[f]=inp.checked;
      else if(inp.type==='number') body[f]=inp.value!==''?parseFloat(inp.value):null;
      else body[f]=inp.value||null;
    });
    try {
      const result=await api('POST','/api/leads',body);
      _leadNewSaving=false;
      if(!result) return;
      row.dataset.id=String(result.id);
      const codeEl=row.querySelector('td:first-child span');
      if(codeEl) codeEl.textContent=result.code||'—';
      const delBtn=row.querySelector('button[title="حذف"]');
      if(delBtn) delBtn.setAttribute('onclick',`deleteLeadRow(${result.id})`);
      leadsData.push(result);
      row.style.background='';
      toast('تم إضافة العميل المحتمل');
    } catch(err){_leadNewSaving=false;toast(err.message,'error');}
    return;
  }

  const id=parseInt(rowId);
  if(!id||isNaN(id)) return;

  const origColor=el.style.borderColor;
  el.style.borderColor='#f59e0b';
  try {
    await api('PUT',`/api/leads/${id}`,{[field]:value});
    if(field==='status'){
      const sc=LEAD_STATUS_COLORS[value]||'#94a3b8';
      el.style.background=`${sc}18`;
      el.style.color=sc;
      el.style.borderColor=`${sc}44`;
    } else {
      el.style.borderColor='#10b981';
      setTimeout(()=>{if(el!==document.activeElement)el.style.borderColor='transparent';},1000);
    }
    const lead=leadsData.find(l=>l.id===id);
    if(lead) lead[field]=value;
  } catch(err){
    el.style.borderColor='#ef4444';
    toast(err.message,'error');
  }
}

function addLeadRow() {
  const tbody=document.getElementById('leadsGridBody');
  if(!tbody){loadLeads();return;}
  if(tbody.querySelector('tr[data-id="new"]')){
    const n=tbody.querySelector('tr[data-id="new"] [data-field="name"]');
    if(n) n.focus();
    return;
  }
  const newLead={id:null,code:null,name:'',phone:'',company_activities:'',company_type:'',estimated_capital:null,has_office:false,suggested_name:'',status:'new',meeting_date:null,assigned_to:null,notes:''};
  const tmp=document.createElement('table');
  tmp.innerHTML=`<tbody>${_buildLeadRow(newLead)}</tbody>`;
  const tr=tmp.querySelector('tr');
  tr.style.background='#f0fdf4';
  tbody.insertBefore(tr,tbody.firstChild);
  const n=tr.querySelector('[data-field="name"]');
  if(n) n.focus();
}

async function deleteLeadRow(id) {
  if(!id){
    const nr=document.querySelector('tr[data-id="new"]');
    if(nr) nr.remove();
    return;
  }
  if(!confirm('حذف هذا العميل المحتمل؟')) return;
  try {
    await api('DELETE',`/api/leads/${id}`);
    const row=document.querySelector(`tr[data-id="${id}"]`);
    if(row) row.remove();
    leadsData=leadsData.filter(l=>l.id!==id);
    toast('تم الحذف');
  } catch(e){toast(e.message,'error');}
}

const OBL_NAME_AR = {

};
const OBL_STATUS_AR = {
  upcoming:'قادم', pending:'معلق', in_progress:'قيد التنفيذ',
  submitted:'مُقدَّم', paid:'مدفوع', late:'متأخر', exempted:'معفى'
};
const PRIORITY_COLOR = {urgent:'#dc2626', high:'#f97316', medium:'#d97706', low:'#16a34a'};
const PRIORITY_AR = {urgent:'عاجل', high:'مرتفع', medium:'متوسط', low:'منخفض'};
const FREQ_AR = {monthly:'شهري', quarterly:'ربعي', annual:'سنوي'};

let oblStats={}, oblInstances=[], oblTab='upcoming', oblDays=30, oblClientFilter='', oblTypeFilter='', oblStatusFilter='';
let oblClientsCache=[];

async function loadObligations() {
  try {
    const [stats, inst] = await Promise.all([
      api('GET', '/api/obligations/stats'),
      api('GET', `/api/obligations/instances?days_ahead=${oblDays}&page_size=200`),
    ]);
    if (!stats) return;
    oblStats = stats;
    oblInstances = inst?.items || [];
    // Also refresh notifications badge
    loadNotifCount();
    renderObligations();
  } catch(e){ toast(e.message,'error'); }
}

function renderObligations() {
  const main = document.getElementById('main');
  main.className = 'page';

  // Filter instances
  let filtered = oblInstances;
  if (oblClientFilter) filtered = filtered.filter(i=>String(i.client_id)===oblClientFilter);
  if (oblTypeFilter) filtered = filtered.filter(i=>i.obligation_type===oblTypeFilter);
  if (oblStatusFilter) filtered = filtered.filter(i=>i.status===oblStatusFilter);

  const overdueLst = filtered.filter(i=>i.days_remaining<0);
  const soonLst = filtered.filter(i=>i.days_remaining>=0&&i.days_remaining<=7);
  const okLst = filtered.filter(i=>i.days_remaining>7);

  // KPI row
  const kpiRow = `
  <div class="stats-grid" style="display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:22px">
    ${[
      {label:'التزام نشط',val:oblStats.total_active_obligations||0,icon:'🔔',cls:'stat-blue'},
      {label:'خلال 30 يوم',val:oblStats.upcoming_30_days||0,icon:'📅',cls:'stat-purple'},
      {label:'هذا الأسبوع',val:oblStats.due_this_week||0,icon:'⏰',cls:''},
      {label:'متأخرة',val:oblStats.overdue||0,icon:'🚨',cls:'stat-red'},
      {label:'مُقدَّم هذا الشهر',val:oblStats.submitted_this_month||0,icon:'✅',cls:'stat-green'},
      {label:'عملاء لديهم التزامات',val:oblStats.clients_with_obligations||0,icon:'👥',cls:'stat-blue'},
    ].map(k=>`<div class="stat-card ${k.cls}" style="padding:16px">
      <div style="font-size:22px;margin-bottom:6px">${k.icon}</div>
      <div style="font-size:26px;font-weight:800;color:#1e293b;line-height:1">${k.val}</div>
      <div style="font-size:11px;color:#64748b;margin-top:4px">${k.label}</div>
    </div>`).join('')}
  </div>`;

  // Build client options from instances
  const clientMap = new Map(oblInstances.filter(i=>i.client_id).map(i=>[i.client_id,i.client_name]));
  const typeSet = [...new Set(oblInstances.map(i=>i.obligation_type).filter(Boolean))];

  // Toolbar
  const toolbar = `
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:center">
      <select class="input" style="width:auto;font-size:12px;padding:5px 10px" onchange="oblDays=+this.value;loadObligations()">
        ${[7,14,30,60,90].map(d=>`<option value="${d}" ${oblDays===d?'selected':''}>خلال ${d} يوم</option>`).join('')}
      </select>
      <select class="input" style="width:auto;font-size:12px;padding:5px 10px" onchange="oblClientFilter=this.value;renderObligations()">
        <option value="">كل العملاء</option>
        ${[...clientMap.entries()].map(([id,name])=>`<option value="${id}" ${oblClientFilter===String(id)?'selected':''}>${escH(name||'')}</option>`).join('')}
      </select>
      <select class="input" style="width:auto;font-size:12px;padding:5px 10px" onchange="oblTypeFilter=this.value;renderObligations()">
        <option value="">كل الأنواع</option>
        ${typeSet.map(t=>`<option value="${t}" ${oblTypeFilter===t?'selected':''}>${OBL_NAME_AR[t]||t}</option>`).join('')}
      </select>
      <select class="input" style="width:auto;font-size:12px;padding:5px 10px" onchange="oblStatusFilter=this.value;renderObligations()">
        <option value="">كل الحالات</option>
        ${Object.entries(OBL_STATUS_AR).map(([k,v])=>`<option value="${k}" ${oblStatusFilter===k?'selected':''}>${v}</option>`).join('')}
      </select>
    </div>
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn btn-secondary" onclick="runBulkGenerate()" title="توليد الالتزامات لجميع العملاء تلقائياً">⚙️ Auto-Generate الكل</button>
      <button class="btn btn-secondary" onclick="runRefreshNotifs()">🔔 تحديث الإشعارات</button>
      <button class="btn btn-primary" onclick="showObligationModal()">+ إضافة التزام</button>
    </div>
  </div>`;

  // Instance table builder
  function instRow(i) {
    const over = i.days_remaining < 0;
    const close = i.days_remaining >= 0 && i.days_remaining <= 7;
    const rowStyle = over ? 'background:#fff5f5' : close ? 'background:#fffbeb' : '';
    const daysText = over
      ? `<span style="color:#dc2626;font-weight:700">⚠ ${Math.abs(i.days_remaining)} يوم متأخر</span>`
      : i.days_remaining === 0
        ? `<span style="color:#dc2626;font-weight:700">اليوم!</span>`
        : `<span style="color:${close?'#d97706':'#16a34a'};font-weight:600">${i.days_remaining} يوم</span>`;
    const prioColor = PRIORITY_COLOR[i.priority] || '#94a3b8';
    return `<tr style="${rowStyle}" data-id="${i.id}">
      <td>
        <div style="font-weight:600;color:#1e293b;font-size:13px">${escH(i.client_name||'—')}</div>
      </td>
      <td>
        <div style="display:flex;align-items:center;gap:6px">
          <span style="font-size:15px">${OBL_ICON[i.obligation_type]||'📋'}</span>
          <div>
            <div style="font-size:12px;font-weight:600;color:#374151">${OBL_NAME_AR[i.obligation_type]||i.obligation_type||'—'}</div>
            <div style="font-size:10px;color:#94a3b8">${i.period_label||''}</div>
          </div>
        </div>
      </td>
      <td style="font-size:13px">${dateAr(i.due_date)}</td>
      <td>${daysText}</td>
      <td>
        <span style="display:inline-flex;align-items:center;gap:3px;font-size:10px;background:${prioColor}22;color:${prioColor};padding:2px 8px;border-radius:99px;font-weight:700">
          ${PRIORITY_AR[i.priority]||'—'}
        </span>
      </td>
      <td><span class="badge ${OBL_STATUS_BADGE[i.status]||'badge-gray'}">${OBL_STATUS_AR[i.status]||i.status}</span></td>
      <td style="color:#64748b;font-size:12px">${escH(i.assigned_name||'—')}</td>
      <td onclick="event.stopPropagation()">
        <div style="display:flex;gap:4px">
          ${i.status!=='submitted'&&i.status!=='paid'?`<button class="btn btn-success btn-sm" onclick="submitObligation(${i.id})" title="تقديم">✅</button>`:''}
          ${i.status!=='paid'?`<button class="btn btn-secondary btn-sm" onclick="showUpdateOblModal(${i.id})" title="تعديل">✏️</button>`:''}
        </div>
      </td>
    </tr>`;
  }

  const tableSection = `
  <div class="card" style="overflow:hidden">
    <div style="padding:14px 16px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
      <span style="font-size:13px;font-weight:700;color:#1e293b">
        ${filtered.length} التزام
        ${overdueLst.length?`<span style="color:#dc2626;margin-right:8px">• ${overdueLst.length} متأخر</span>`:''}
        ${soonLst.length?`<span style="color:#d97706;margin-right:8px">• ${soonLst.length} هذا الأسبوع</span>`:''}
      </span>
      <span style="font-size:11px;color:#94a3b8">مرتب حسب الأقرب</span>
    </div>
    <div style="overflow-x:auto">
    <table>
      <thead><tr>
        <th>العميل</th><th>الالتزام</th><th>الاستحقاق</th><th>المتبقي</th>
        <th>الأولوية</th><th>الحالة</th><th>المحاسب</th><th>إجراءات</th>
      </tr></thead>
      <tbody>
        ${filtered.length===0
          ? `<tr><td colspan="8" style="text-align:center;padding:50px;color:#94a3b8"><div style="font-size:40px;margin-bottom:10px">✅</div><div>لا توجد التزامات بالفلاتر المختارة</div></td></tr>`
          : [...overdueLst,...soonLst,...okLst].map(instRow).join('')}
      </tbody>
    </table>
    </div>
  </div>`;

  main.innerHTML = kpiRow + toolbar + tableSection;
}

async function runBulkGenerate() {
  try {
    const btn = document.activeElement;
    if(btn) { btn.disabled=true; btn.textContent='⏳ جاري...'; }
    const r = await api('POST', '/api/obligations/bulk-generate');
    toast(`تم: ${r.total_obligations_created} التزام جديد لـ ${r.processed_clients} عميل`);
    loadObligations();
  } catch(e){ toast(e.message,'error'); }
}

async function runRefreshNotifs() {
  try {
    const r = await api('POST', '/api/obligations/refresh-notifications');
    toast(`${r.created_notifications} إشعار جديد`);
    loadNotifCount();
  } catch(e){ toast(e.message,'error'); }
}

async function submitObligation(instanceId) {
  try {
    await api('PUT', `/api/obligations/instances/${instanceId}`, {status:'submitted', submitted_at:new Date().toISOString()});
    toast('✅ تم تسجيل التقديم');
    loadObligations();
  } catch(e){ toast(e.message,'error'); }
}

        <textarea id="updNotes" class="input" rows="2">${escH(inst.notes||'')}</textarea></div>

  document.body.append(overlay);

  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};

  // Auto-fill rules
  const oblDescMap = {
    vat_monthly:'تقديم وسداد الإقرار قبل اليوم 15 من الشهر التالي',
    payroll_monthly:'نموذج 1 الخاص بالمرتبات قبل اليوم 15',
    withholding_monthly:'تسوية الخصم والإضافة على المدفوعات للغير',
    insurance_monthly:'سداد اشتراكات التأمينات الاجتماعية قبل 15',
    vat_quarterly:'للمنشآت الصغيرة — إقرار ربعي قبل 15 من الشهر التالي للربع',
    stamp_quarterly:'ضريبة الدمغة النسبية على المعاملات التجارية',
    income_annual:'الإقرار السنوي لضريبة الدخل — 30 أبريل من كل عام',
    form_41:'الإقرار السنوي عن المرتبات — 31 يناير',
    corporate_tax:'ضريبة الأرباح التجارية والصناعية — 30 أبريل',
    commercial_register_renewal:'تجديد السجل التجاري سنويًا',
  };

  window.autoFillOblFields = function(type) {
    const freqMap = {vat_monthly:'monthly',payroll_monthly:'monthly',withholding_monthly:'monthly',insurance_monthly:'monthly',vat_quarterly:'quarterly',stamp_quarterly:'quarterly',income_annual:'annual',form_41:'annual',corporate_tax:'annual',commercial_register_renewal:'annual'};
    const dayMap = {vat_monthly:15,payroll_monthly:15,withholding_monthly:15,insurance_monthly:15,vat_quarterly:15,stamp_quarterly:15,income_annual:30,form_41:31,corporate_tax:30,commercial_register_renewal:28};
    const freq = freqMap[type]; const day = dayMap[type];
    if(freq){ const f=document.getElementById('oblFreq'); if(f) f.value=freq; }
    if(day){ const d=document.getElementById('oblDay'); if(d) d.value=day; }
    const desc=document.getElementById('oblTypeDesc');
    if(desc) desc.textContent=oblDescMap[type]||'';
  };

  window.autoGenerateForClient = async function() {
    const clientId=parseInt(document.getElementById('oblClient').value);
    if(!clientId){toast('اختر العميل أولاً','error');return;}
    try {
      const r=await api('POST',`/api/obligations/auto-generate/${clientId}`);
      toast(`تم: ${r.created.length} التزام جديد للعميل`);
      overlay.remove(); loadObligations();
    } catch(e){toast(e.message,'error');}
  };

  document.getElementById('saveOblBtn').onclick=async()=>{
    const btn=document.getElementById('saveOblBtn');
    const clientId=parseInt(document.getElementById('oblClient').value);
    const oblType=document.getElementById('oblType').value;
    if(!clientId){toast('اختر العميل','error');return;}
    if(!oblType){toast('اختر نوع الالتزام','error');return;}
    btn.disabled=true; btn.textContent='جاري الحفظ...';
    try {
      await api('POST','/api/obligations',{
        client_id:clientId,
        obligation_type:oblType,
        frequency:document.getElementById('oblFreq').value,
        due_day:parseInt(document.getElementById('oblDay').value)||15,
      });
      toast('تم إنشاء الالتزام الضريبي');
      overlay.remove(); loadObligations();
    } catch(e){toast(e.message,'error');btn.disabled=false;btn.textContent='🔔 إضافة';}
  };
}

    const specs=Array.isArray(u.specialization)?u.specialization:[];
    const taskLoad=u.task_count||0;
    const leadLoad=u.lead_count||0;
    const loadColor=taskLoad+leadLoad>10?'#ef4444':taskLoad+leadLoad>5?'#f59e0b':'#10b981';
    const loadPct=Math.min(100,Math.round((taskLoad+leadLoad)/15*100));
    return `<div class="card" style="padding:0;overflow:hidden">
      <div style="padding:20px 20px 16px;border-bottom:1px solid #f1f5f9">
        <div style="display:flex;align-items:flex-start;gap:14px">

            ${u.avatar?`<img src="${u.avatar}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`:(u.name||'?')[0]}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:16px;font-weight:700;color:#1e293b;margin-bottom:3px">${escH(u.name)}</div>
            <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap">
              <span style="font-size:11px;padding:2px 8px;border-radius:10px;background:${ROLE_COLOR[u.role]+'22'};color:${ROLE_COLOR[u.role]};font-weight:600">${ROLE_LABEL[u.role]||u.role}</span>
              <span style="font-size:12px;color:#94a3b8">${escH(u.email||'')}</span>
            </div>
            ${u.phone?`<div style="font-size:12px;color:#64748b;margin-top:3px">📞 ${escH(u.phone)}</div>`:''}
          </div>
          ${currentUser?.role==='admin'?`<button onclick="showEmployeeModal(${u.id})" style="background:none;border:none;cursor:pointer;color:#94a3b8;font-size:16px;padding:4px" title="تعديل">✏️</button>`:''}
        </div>
      </div>
      <div style="padding:16px 20px">
        <div style="display:flex;gap:16px;margin-bottom:14px">
          <div style="text-align:center;flex:1;padding:10px;background:#f8fafc;border-radius:8px">
            <div style="font-size:20px;font-weight:700;color:#4478b0">${taskLoad}</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px">مهام نشطة</div>
          </div>
          <div style="text-align:center;flex:1;padding:10px;background:#f8fafc;border-radius:8px">
            <div style="font-size:20px;font-weight:700;color:#8b5cf6">${leadLoad}</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px">عملاء محتملين</div>
          </div>
          <div style="text-align:center;flex:1;padding:10px;background:#f8fafc;border-radius:8px">
            <div style="font-size:20px;font-weight:700;color:${loadColor}">${loadPct}%</div>
            <div style="font-size:11px;color:#94a3b8;margin-top:2px">الحمل الوظيفي</div>
          </div>
        </div>
        <div style="margin-bottom:10px">
          <div style="font-size:11px;font-weight:600;color:#64748b;margin-bottom:4px;display:flex;justify-content:space-between">
            <span>العبء الوظيفي</span><span style="color:${loadColor}">${taskLoad+leadLoad} / 15</span>
          </div>
          <div style="height:6px;background:#f1f5f9;border-radius:3px;overflow:hidden">
            <div style="height:100%;width:${loadPct}%;background:${loadColor};border-radius:3px;transition:width .3s"></div>
          </div>
        </div>
        ${specs.length?`<div style="display:flex;flex-wrap:wrap;gap:5px;margin-top:10px">
          ${specs.map(s=>`<span style="font-size:10px;padding:3px 8px;background:#eef1fb;color:#4478b0;border-radius:10px;border:1px solid #b3c4e8">${escH(s)}</span>`).join('')}
        </div>`:`<div style="font-size:11px;color:#cbd5e1;margin-top:10px;font-style:italic">لا توجد تخصصات محددة</div>`}
        ${u.notes?`<div style="margin-top:10px;font-size:12px;color:#64748b;padding:8px;background:#fefce8;border-radius:6px;border-right:3px solid #fbbf24">📝 ${escH(u.notes)}</div>`:''}

        <button onclick="showEmployeeTasks(${u.id},'${escH(u.name)}')" class="btn btn-secondary" style="flex:1;font-size:12px">👁 مهامه</button>
      </div>
    </div>`;
  }).join('');
}

  const overlay=document.createElement('div');

      <div style="margin-bottom:4px"><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:8px">التخصصات</label>

            <input type="checkbox" style="display:none" value="${s}" ${specs.includes(s)?'checked':''}>${s}
          </label>`).join('')}
        </div>
      </div>
      ${userId?`<div style="margin-top:16px;padding:12px;background:#fef2f2;border-radius:8px;border:1px solid #fecaca">
        <div style="font-size:12px;font-weight:600;color:#dc2626;margin-bottom:8px">⚠️ تعطيل الحساب</div>

    const email=document.getElementById('empEmail')?.value?.trim();
    const phone=document.getElementById('empPhone')?.value?.trim();
    const role=document.getElementById('empRole')?.value;
    const notes=document.getElementById('empNotes')?.value?.trim();
    const pass=document.getElementById('empPass')?.value;
    const selectedSpecs=[...overlay.querySelectorAll('#specList input[type=checkbox]:checked')].map(c=>c.value);

    if(!userId&&!email){toast('البريد الإلكتروني مطلوب','error');return;}

    btn.disabled=true;btn.textContent='جاري الحفظ...';

        await api('POST','/api/users',{name,email,password:pass,phone:phone||null,role,specialization:selectedSpecs});
        toast('تم إضافة الموظف بنجاح');
      }
      overlay.remove();
      loadEmployees();
    }catch(e){toast(e.message,'error');btn.disabled=false;btn.textContent=userId?'💾 حفظ التعديلات':'➕ إضافة الموظف';}
  };
}

async function deactivateEmployee(userId) {
  if(!confirm('هل أنت متأكد من تعطيل هذا الموظف؟'))return;
  try{
    await api('DELETE',`/api/users/${userId}`);
    toast('تم تعطيل الموظف');
    document.querySelector('.modal-overlay')?.remove();
    loadEmployees();
  }catch(e){toast(e.message,'error');}
}

          <input type="checkbox" id="colRecurring" checked style="width:15px;height:15px;accent-color:#1a2472"> توليد استحقاقات شهرية تلقائياً

  try {
    // Convert share URL to CSV export URL if needed
    let csvUrl = url;
    if (url.includes('/edit') || url.includes('/view')) {
      const match = url.match(/spreadsheets\/d\/([^/]+)/);
      const gidMatch = url.match(/[#&]gid=(\d+)/);
      if (match) {
        csvUrl = `https://docs.google.com/spreadsheets/d/${match[1]}/export?format=csv${gidMatch ? '&gid='+gidMatch[1] : ''}`;
      }
    }
    // Fetch CSV via backend proxy
    const csvResp = await fetch(csvUrl);
    if (!csvResp.ok) throw new Error('فشل في جلب البيانات من Google Sheets');
    importCsvText = await csvResp.text();
    // Send to preview endpoint
    const preview = await api('POST', '/api/import/preview', { csv_text: importCsvText });
    importPreviewData = preview;
    renderImportPreview(preview);
  } catch(e) {
    area.innerHTML = `<div class="card" style="padding:30px;text-align:center;color:#ef4444">❌ ${escH(e.message)}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '🔄 جلب البيانات وعرض المعاينة';
  }
}

function filterImportRows(filter) {
  // Update active tab
  ['all','clean','issues','inactive','dup'].forEach(t => {
    const btn = document.getElementById('iTab_'+t);
    if (btn) btn.className = 'btn btn-sm ' + (t === filter ? 'btn-primary' : 'btn-secondary');
  });
  document.querySelectorAll('.import-row').forEach(row => {
    const s = row.dataset.status;
    const inactive = row.dataset.inactive === 'true';
    let show = false;
    if (filter === 'all') show = true;
    else if (filter === 'clean') show = s === 'clean' && !inactive;
    else if (filter === 'issues') show = s === 'issues';
    else if (filter === 'inactive') show = inactive;
    else if (filter === 'dup') show = s === 'dup';
    row.style.display = show ? '' : 'none';
  });
}

async function confirmImport() {
  if (!importCsvText) { toast('لا توجد بيانات. أعد المعاينة أولاً', 'error'); return; }
  const skipDup = document.getElementById('skipDup')?.checked !== false;
  const importIssues = document.getElementById('importIssues')?.checked !== false;
  const btn = document.getElementById('confirmImportBtn');
  if (!confirm(`هل أنت متأكد من استيراد ${importPreviewData?.total || 0} شركة؟\nهذه العملية لا يمكن التراجع عنها.`)) return;
  btn.disabled = true; btn.textContent = '⏳ جاري الاستيراد...';
  try {
    const result = await api('POST', '/api/import/confirm', {
      csv_text: importCsvText,
      skip_duplicates: skipDup,
      import_with_issues: importIssues,
    });
    renderImportResult(result);
  } catch(e) {
    toast(e.message, 'error');
    btn.disabled = false;
    btn.textContent = '✅ تأكيد الاستيراد';
  }
}

        </label>
        <label style="display:flex;align-items:center;gap:6px;font-size:13px;cursor:pointer">
          <input type="checkbox" id="inclInv" checked style="width:15px;height:15px"/> الفواتير المعلقة
        </label>
      </div>
      <div style="margin-bottom:20px">
        <label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">💬 رسالة إضافية (اختياري)</label>
        <textarea id="reminderMsg" class="input" rows="3" placeholder="مثال: نرجو سرعة تسوية الالتزامات لتجنب الغرامات..." style="resize:vertical"></textarea>
      </div>
      <div id="reminderResult" style="margin-bottom:10px"></div>
      <div style="display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">إلغاء</button>
        <button id="sendReminderBtn" class="btn btn-primary" onclick="doSendClientReminder(${clientId})">📨 إرسال التذكير</button>
      </div>
    </div>
  </div>`;
  document.body.append(overlay);
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
}

async function doSendClientReminder(clientId) {
  const btn=document.getElementById('sendReminderBtn');
  const resultDiv=document.getElementById('reminderResult');
  const email=document.getElementById('reminderEmail')?.value?.trim();
  const inclObl=document.getElementById('inclObl')?.checked;
  const inclInv=document.getElementById('inclInv')?.checked;
  const msg=document.getElementById('reminderMsg')?.value?.trim();

  if(!email){resultDiv.innerHTML=`<div style="color:#dc2626;font-size:13px">⚠️ أدخل البريد الإلكتروني</div>`;return;}
  btn.disabled=true; btn.textContent='جارٍ الإرسال...';
  resultDiv.innerHTML=`<div style="color:#64748b;font-size:13px">⏳ جارٍ إرسال التذكير...</div>`;
  try {
    const r=await api('POST','/api/notifications/send-client-reminder',{
      client_id:clientId,
      to_email:email,
      include_obligations:inclObl,
      include_invoices:inclInv,
      custom_message:msg||null,
    });
    resultDiv.innerHTML=`<div style="color:#16a34a;font-size:13px;background:#f0fdf4;padding:10px;border-radius:6px">${escH(r.message)}</div>`;
    btn.textContent='✅ تم الإرسال';
    setTimeout(()=>{document.querySelector('.modal-overlay')?.remove();},2000);
  } catch(e){
    resultDiv.innerHTML=`<div style="color:#dc2626;font-size:13px">❌ ${escH(e.message)}</div>`;
    btn.disabled=false; btn.textContent='📨 إرسال التذكير';
  }
}

async function saveEmailSettings() {
  const user=document.getElementById('smtpUser')?.value?.trim();
  const pass=document.getElementById('smtpPass')?.value?.trim();
  const fromName=document.getElementById('smtpFromName')?.value?.trim()||'MS Accounting';
  const msg=document.getElementById('emailSettingsMsg');
  if(!user||!pass){
    msg.innerHTML=`<div style="color:#dc2626;font-size:13px">⚠️ يرجى إدخال حساب Gmail وكلمة مرور التطبيق</div>`;
    return;
  }
  msg.innerHTML=`<div style="color:#64748b;font-size:13px">⏳ جارٍ الحفظ والاختبار…</div>`;
  try {
    const r=await api('POST','/api/notifications/save-settings',{
      smtp_user:user, smtp_pass:pass, from_name:fromName,
      smtp_host:'smtp.gmail.com', smtp_port:587
    });
    msg.innerHTML=`<div style="color:#16a34a;font-size:13px">✅ ${escH(r.message||'تم الحفظ بنجاح')}</div>`;
    // reload page to update badge
    setTimeout(()=>loadSettings(),1500);
  } catch(e){
    msg.innerHTML=`<div style="color:#dc2626;font-size:13px">❌ ${escH(e.message||'فشل الحفظ')}</div>`;
  }
}

async function testEmailNow() {
  const to=document.getElementById('testEmailAddr')?.value?.trim();
  const msg=document.getElementById('emailSettingsMsg');
  if(!to){msg.innerHTML=`<div style="color:#dc2626;font-size:13px">⚠️ أدخل عنوان البريد الإلكتروني للاختبار</div>`;return;}
  msg.innerHTML=`<div style="color:#64748b;font-size:13px">⏳ جارٍ الإرسال إلى ${escH(to)}…</div>`;
  try {
    const r=await api('POST','/api/notifications/test-email',{to_email:to});
    msg.innerHTML=`<div style="color:#16a34a;font-size:13px">✅ ${escH(r.message||'تم الإرسال')}</div>`;
  } catch(e){
    msg.innerHTML=`<div style="color:#dc2626;font-size:13px">❌ ${escH(e.message||'فشل الإرسال — تحقق من بيانات SMTP')}</div>`;
  }
}

async function saveProfile() {
  try {
    const name=document.getElementById('profName')?.value?.trim();
    const phone=document.getElementById('profPhone')?.value?.trim();
    if(!name){toast('الاسم مطلوب','error');return}
    await api('PUT',`/api/users/${currentUser.id}`,{name,phone:phone||null});
    currentUser={...currentUser,name,phone};
    localStorage.setItem('ms_user',JSON.stringify(currentUser));
    toast('تم حفظ البيانات الشخصية بنجاح');
    renderApp();
  } catch(e){toast(e.message,'error')}
}

async function savePassword() {
  try {
    const cur=document.getElementById('curPass')?.value;
    const nw=document.getElementById('newPass')?.value;
    const cf=document.getElementById('confPass')?.value;
    if(!cur||!nw){toast('أدخل كلمات المرور','error');return}
    if(nw!==cf){toast('كلمتا المرور غير متطابقتين','error');return}
    if(nw.length<6){toast('كلمة المرور قصيرة جداً','error');return}
    await api('POST','/api/auth/change-password',{current_password:cur,new_password:nw});
    toast('تم تغيير كلمة المرور بنجاح');
    document.getElementById('curPass').value='';
    document.getElementById('newPass').value='';
    document.getElementById('confPass').value='';
  } catch(e){toast(e.message,'error')}
}

// ── Mobile Sidebar ────────────────────────────────────
function openSidebar() {
  document.getElementById('sidebar')?.classList.add('open');
  document.getElementById('sidebarOverlay')?.classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeSidebar() {
  document.getElementById('sidebar')?.classList.remove('open');
  document.getElementById('sidebarOverlay')?.classList.remove('open');
  document.body.style.overflow = '';
}
// Close sidebar on nav click (mobile)
document.addEventListener('click', e => {
  if (e.target.closest('.sidebar-link') && window.innerWidth <= 768) closeSidebar();
});
