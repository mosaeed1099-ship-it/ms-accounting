<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MS Accounting — نظام إدارة مكتب المحاسبة</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Cairo','system-ui','sans-serif'] } } }
    }
  </script>
  <style>
    *{font-family:'Cairo',system-ui,sans-serif;box-sizing:border-box}
    body{background:#f1f5f9;margin:0}
    /* Sidebar */
    .sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:500;cursor:pointer;transition:all .15s;color:#475569;margin:1px 0}
    .sidebar-link:hover{background:#f1f5f9;color:#0f1848}
    .sidebar-link.active{background:linear-gradient(135deg,#1a2472,#152060);color:white;box-shadow:0 4px 12px rgba(37,99,235,.3)}
    .sidebar-link .icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:16px;flex-shrink:0}
    /* Cards */
    .card{background:white;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);border:1px solid #e8edf3}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:inherit}
    .btn-primary{background:linear-gradient(135deg,#1a2472,#152060);color:white;box-shadow:0 2px 8px rgba(37,99,235,.3)}
    .btn-primary:hover{background:linear-gradient(135deg,#152060,#0f1848);transform:translateY(-1px)}
    .btn-secondary{background:white;color:#374151;border:1.5px solid #d1d5db}
    .btn-secondary:hover{background:#f9fafb;border-color:#9ca3af}
    .btn-success{background:#16a34a;color:white}
    .btn-danger{background:#dc2626;color:white}
    .btn-sm{padding:5px 12px;font-size:12px}
    /* Inputs */
    .input{width:100%;padding:9px 13px;border:1.5px solid #d1d5db;border-radius:9px;font-size:13.5px;font-family:inherit;outline:none;transition:border .15s;background:white}
    .input:focus{border-color:#1a2472;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    /* Badges */
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600}
    .badge-green{background:#dcfce7;color:#15803d}
    .badge-blue{background:#d8def5;color:#152060}
    .badge-red{background:#fee2e2;color:#dc2626}
    .badge-yellow{background:#fef9c3;color:#a16207}
    .badge-gray{background:#f3f4f6;color:#4b5563}
    .badge-purple{background:#ede9fe;color:#6d28d9}
    .badge-orange{background:#fff7ed;color:#c2410c}
    /* Table */
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{padding:11px 14px;text-align:right;font-size:11px;color:#6b7280;font-weight:700;background:#f8fafc;border-bottom:1.5px solid #e5e7eb;text-transform:uppercase;letter-spacing:.3px}
    tbody td{padding:11px 14px;border-bottom:1px solid #f3f4f6;color:#374151}
    tbody tr:hover{background:#fafbff}
    tbody tr:last-child td{border-bottom:none}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px)}
    .modal{background:white;border-radius:18px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.25)}
    /* Toast */
    .toasts{position:fixed;top:16px;left:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast-item{display:flex;align-items:center;gap:10px;padding:13px 18px;background:white;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.12);min-width:280px;border-right:4px solid;animation:slideIn .25s ease}
    @keyframes slideIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
    /* Kanban */
    .kanban-col{background:#f8fafc;border-radius:14px;min-height:400px;border:1.5px solid #e8edf3}
    .kanban-card{background:white;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e8edf3;transition:all .15s;cursor:pointer}
    .kanban-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px)}
    /* Stat cards */
    .stat-card{background:white;border-radius:14px;padding:20px;border:1px solid #e8edf3;box-shadow:0 1px 4px rgba(0,0,0,.06);position:relative;overflow:hidden}
    .stat-card::after{content:'';position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 14px 14px 0}
    .stat-blue::after{background:linear-gradient(180deg,#4478b0,#152060)}
    .stat-green::after{background:linear-gradient(180deg,#22c55e,#15803d)}
    .stat-red::after{background:linear-gradient(180deg,#f87171,#dc2626)}
    .stat-purple::after{background:linear-gradient(180deg,#a78bfa,#5b8ec4)}
    /* Page animation */
    .page{animation:fadeUp .2s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    /* Loading */
    .spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#1a2472;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Section headings */
    .section-title{font-size:15px;font-weight:700;color:#1a2472;margin:0 0 16px;padding-right:12px;border-right:3px solid #1a2472;line-height:1.4;display:flex;align-items:center;gap:6px}
    .page-section-title{font-size:15px;font-weight:700;color:#1a2472;margin:0 0 16px;padding:10px 14px;background:linear-gradient(135deg,#eef1fb,#f8fafc);border-radius:10px;border-right:4px solid #1a2472;display:flex;align-items:center;gap:8px}
    /* Scrollbar */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#f1f5f9}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
    select,textarea{font-family:inherit}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:640px){.form-row{grid-template-columns:1fr}}
    .priority-urgent{border-right:3px solid #dc2626!important}
    .priority-high{border-right:3px solid #f97316!important}
    .priority-medium{border-right:3px solid #eab308!important}
    .priority-low{border-right:3px solid #22c55e!important}

    /* ── Responsive Layout ─────────────────────────────── */
    .app-sidebar{width:230px;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto;background:white;border-left:1.5px solid #e8edf3;box-shadow:2px 0 8px rgba(0,0,0,.04)}
    .app-main{margin-right:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
    .mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:#1a2472}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:190;backdrop-filter:blur(2px)}

    @media(max-width:768px){
      /* Sidebar becomes a slide-in drawer */
      .app-sidebar{
        position:fixed;right:-250px;top:0;width:250px;height:100vh;
        z-index:200;transition:right .28s ease;
        box-shadow:none;border-left:none
      }
      .app-sidebar.open{right:0;box-shadow:-6px 0 24px rgba(0,0,0,.18)}
      .sidebar-overlay.open{display:block}
      /* Main content fills full width */
      .app-main{margin-right:0}
      /* Show hamburger button */
      .mobile-menu-btn{display:flex!important;align-items:center;justify-content:center}
      /* Tables scroll horizontally */
      .card{overflow-x:auto}
      table{min-width:500px}
      /* Kanban columns stack */
      .kanban-col{min-width:260px}
      /* Stat cards: 2 columns */
      .stats-grid{grid-template-columns:1fr 1fr!important}
      /* Page padding */
      #main{padding:16px!important}
      /* Modal full width */
      .modal{max-width:100%!important;margin:0;border-radius:14px 14px 0 0;position:fixed;bottom:0;right:0;left:0;max-height:92vh}
      .modal-overlay{align-items:flex-end}
      /* Topbar */
      .topbar-date{display:none}
      /* Login card */
      .login-card{margin:12px!important;padding:24px!important}
    }

    @media(max-width:480px){
      .stats-grid{grid-template-columns:1fr!important}
      thead th{font-size:10px;padding:8px}
      tbody td{font-size:12px;padding:8px}
    }
  </style>
</head>
<body>
<div id="app"></div>
<div id="toasts" class="toasts"></div>

<script type="module">
const API = window.MS_API_BASE || (
  window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
    ? `http://${window.location.hostname}:8000`
    : `https://${window.location.hostname.replace(/^[^.]+\./, 'api.')}`
);
let token = localStorage.getItem('ms_token');
let currentUser = JSON.parse(localStorage.getItem('ms_user') || 'null');
let currentPage = 'dashboard';
let chartInstances = {};

// ── Utilities ──────────────────────────────────────
const $ = (s,c=document) => c.querySelector(s);
const $$ = (s,c=document) => [...c.querySelectorAll(s)];

async function api(method, path, body=null) {
  const opts = {
    method,
    headers:{'Content-Type':'application/json', ...(token?{Authorization:`Bearer ${token}`}:{})}
  };
  if (body) opts.body = JSON.stringify(body);
  try {
    const r = await fetch(API+path, opts);
    if (r.status===401){logout();return null}
    const data = await r.json().catch(()=>({}));
    if (!r.ok) {
      let msg = 'خطأ في الطلب';
      if (typeof data.detail === 'string') msg = data.detail;
      else if (Array.isArray(data.detail)) msg = data.detail.map(e=>e.msg||e).join(' | ');
      else if (data.message) msg = data.message;
      throw new Error(msg);
    }
    return data;
  } catch(e) {
    if (e.message && e.message.includes('fetch')) throw new Error('تعذّر الاتصال بالخادم — تأكد من تشغيل الـ Backend');
    throw e;
  }
}

function toast(msg, type='success') {
  const colors={success:'#16a34a',error:'#dc2626',warning:'#d97706',info:'#1a2472'};
  const icons={success:'✓',error:'✕',warning:'⚠',info:'ℹ'};
  const el=document.createElement('div');
  el.className='toast-item';
  el.style.borderColor=colors[type];
  el.innerHTML=`<span style="color:${colors[type]};font-weight:800;font-size:16px">${icons[type]}</span><span style="font-size:13px;color:#1f2937;font-weight:500">${msg}</span>`;
  document.getElementById('toasts').append(el);
  setTimeout(()=>el.remove(),4000);
}

function money(n) {
  return new Intl.NumberFormat('ar-EG',{style:'currency',currency:'EGP',minimumFractionDigits:0}).format(n||0);
}
function dateAr(d) {
  if(!d) return '—';
  return new Intl.DateTimeFormat('ar-EG',{year:'numeric',month:'short',day:'numeric'}).format(new Date(d));
}
function daysUntil(d) {
  if(!d) return null;
  const diff = Math.ceil((new Date(d)-new Date())/(1000*60*60*24));
  return diff;
}
function destroyChart(key) {
  if(chartInstances[key]) { chartInstances[key].destroy(); delete chartInstances[key]; }
}

// ── Auth ───────────────────────────────────────────
async function login(email, password) {
  const body=new URLSearchParams({username:email,password});
  const r=await fetch(`${API}/api/auth/login`,{method:'POST',body,headers:{'Content-Type':'application/x-www-form-urlencoded'}});
  const data=await r.json();
  if(!r.ok) throw new Error(data.detail||'بيانات الدخول غير صحيحة');
  token=data.access_token; currentUser=data.user;
  localStorage.setItem('ms_token',token);
  localStorage.setItem('ms_user',JSON.stringify(currentUser));
  renderApp();
}
function logout() {
  token=null; currentUser=null;
  localStorage.removeItem('ms_token'); localStorage.removeItem('ms_user');
  renderApp();
}

// ── Login Page ─────────────────────────────────────
function renderLogin() {
  document.getElementById('app').innerHTML = `
  <div style="min-height:100vh;background:linear-gradient(135deg,#0d1540 0%,#1a2472 50%,#5b8ec4 100%);display:flex;align-items:center;justify-content:center;padding:16px">
    <div style="width:100%;max-width:420px">
      <div style="text-align:center;margin-bottom:36px">
        <div style="width:110px;height:110px;background:white;border-radius:24px;display:flex;align-items:center;justify-content:center;margin:0 auto 18px;box-shadow:0 8px 32px rgba(0,0,0,.18);padding:12px">
          <img src="assets/logo.svg" alt="MS Logo" style="width:86px;height:86px;object-fit:contain"/>
        </div>
        <h1 style="color:white;font-size:26px;font-weight:800;margin:0 0 4px;letter-spacing:.5px">MS Accounting</h1>
        <p style="color:rgba(255,255,255,.8);font-size:12px;font-weight:600;letter-spacing:1.5px;text-transform:uppercase;margin:0">Corporate Accounting Services</p>
      </div>
      <div style="background:white;border-radius:20px;padding:32px;box-shadow:0 25px 60px rgba(0,0,0,.2)">
        <h2 style="font-size:20px;font-weight:700;color:#1e293b;margin:0 0 24px;text-align:center">تسجيل الدخول</h2>
        <div style="margin-bottom:16px">
          <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">البريد الإلكتروني</label>
          <input id="loginEmail" class="input" type="email" value="admin@ms-accounting.com" placeholder="admin@ms-accounting.com"/>
        </div>
        <div style="margin-bottom:24px">
          <label style="display:block;font-size:13px;font-weight:600;color:#374151;margin-bottom:6px">كلمة المرور</label>
          <input id="loginPass" class="input" type="password" value="admin123" placeholder="••••••••"/>
        </div>
        <button id="loginBtn" class="btn btn-primary" style="width:100%;justify-content:center;padding:12px;font-size:15px">
          🔐 دخول
        </button>
        <div id="loginErr" style="color:#dc2626;font-size:13px;text-align:center;margin-top:12px;min-height:20px"></div>
        <div style="margin-top:20px;padding:14px;background:#f0f9ff;border-radius:10px;text-align:center;border:1px solid #bae6fd">
          <p style="font-size:12px;font-weight:600;color:#0369a1;margin:0 0 4px">بيانات الدخول الافتراضية:</p>
          <p style="font-size:12px;color:#0369a1;margin:0">البريد: admin@ms-accounting.com</p>
          <p style="font-size:12px;color:#0369a1;margin:0">كلمة المرور: admin123</p>
        </div>
      </div>
    </div>
  </div>`;
  document.getElementById('loginBtn').onclick = async () => {
    const btn=document.getElementById('loginBtn');
    const err=document.getElementById('loginErr');
    err.textContent='';
    btn.disabled=true; btn.textContent='جاري الدخول...';
    try { await login(document.getElementById('loginEmail').value, document.getElementById('loginPass').value); }
    catch(e){ err.textContent=e.message; btn.disabled=false; btn.innerHTML='🔐 دخول'; }
  };
  document.getElementById('loginPass').onkeydown = e => { if(e.key==='Enter') document.getElementById('loginBtn').click(); };
}

// ── Sidebar nav items ──────────────────────────────
const navItems = [
  {id:'dashboard',     icon:'📊', label:'الرئيسية'},
  {id:'clients',       icon:'👥', label:'العملاء'},
  {id:'leads',         icon:'🎯', label:'العملاء المحتملين'},
  {id:'invoices',      icon:'📄', label:'الفواتير'},
  {id:'tasks',         icon:'✅', label:'المهام'},
  {id:'obligations',   icon:'🔔', label:'الالتزامات الضريبية'},
  {id:'establishment', icon:'🏢', label:'تأسيس الشركات'},
  {id:'documents',     icon:'📁', label:'الأرشيف'},
  {id:'tax',           icon:'🧾', label:'الإقرارات'},
  {id:'employees',     icon:'👤', label:'الموظفين'},
  {id:'reports',       icon:'📈', label:'التقارير'},
  {id:'import',        icon:'📥', label:'استيراد البيانات'},
  {id:'settings',      icon:'⚙️', label:'الإعدادات'},
];

// ── App Shell ──────────────────────────────────────
function renderApp() {
  if (!token) { renderLogin(); return; }
  document.getElementById('app').innerHTML = `
  <div style="display:flex;min-height:100vh;background:#f1f5f9">
    <!-- Mobile overlay -->
    <div id="sidebarOverlay" class="sidebar-overlay" onclick="closeSidebar()"></div>
    <!-- Sidebar -->
    <div id="sidebar" class="app-sidebar" style="display:flex;flex-direction:column">
      <div style="padding:20px 16px 16px">
        <div style="margin-bottom:24px;padding-bottom:16px;border-bottom:1px solid #f1f5f9">
          <div style="display:flex;align-items:center;gap:10px">
            <img src="assets/logo.svg" alt="MS Logo" style="width:48px;height:48px;object-fit:contain;flex-shrink:0"/>
            <div>
              <div style="font-weight:800;font-size:15px;color:#1a2472;letter-spacing:.3px">MS Accounting</div>
              <div style="font-size:10px;color:#5b8ec4;font-weight:600;letter-spacing:.8px;text-transform:uppercase">Corporate Accounting</div>
            </div>
          </div>
        </div>
        <nav id="nav"></nav>
      </div>
      <div style="margin-top:auto;padding:16px;border-top:1px solid #f1f5f9">
        <div style="display:flex;align-items:center;gap:10px;padding:10px;border-radius:10px;background:#f8fafc">
          <div style="width:34px;height:34px;background:linear-gradient(135deg,#1a2472,#5b8ec4);border-radius:10px;display:flex;align-items:center;justify-content:center;color:white;font-weight:700;font-size:14px">
            ${(currentUser?.name||'A').charAt(0)}
          </div>
          <div style="flex:1;min-width:0">
            <div style="font-size:12.5px;font-weight:700;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${currentUser?.name||'مدير النظام'}</div>
            <div style="font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${currentUser?.email||''}</div>
          </div>
          <button onclick="logout()" style="background:none;border:none;cursor:pointer;font-size:16px;color:#94a3b8;padding:4px" title="خروج">🚪</button>
        </div>
        <div id="apiStatus" style="display:flex;align-items:center;gap:6px;margin-top:10px;justify-content:center">
          <span id="apiDot" style="width:8px;height:8px;border-radius:50%;background:#22c55e"></span>
          <span style="font-size:11px;color:#64748b">API متصل</span>
        </div>
      </div>
    </div>
    <!-- Main -->
    <div class="app-main">
      <!-- Topbar -->
      <div style="background:white;border-bottom:1.5px solid #e8edf3;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:9;box-shadow:0 1px 4px rgba(0,0,0,.04)">
        <div style="display:flex;align-items:center;gap:12px">
          <button class="mobile-menu-btn" onclick="openSidebar()" title="القائمة">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#1a2472" stroke-width="2.5" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
          </button>
          <h1 id="pageTitle" style="font-size:18px;font-weight:800;color:#1a2472;margin:0;padding-right:12px;border-right:3px solid #1a2472"></h1>
        </div>
        <div style="display:flex;align-items:center;gap:10px">
          <span class="topbar-date" style="font-size:12px;color:#94a3b8">${new Date().toLocaleDateString('ar-EG',{weekday:'long',year:'numeric',month:'long',day:'numeric'})}</span>
        </div>
      </div>
      <!-- Page content -->
      <div id="main" style="flex:1;padding:24px;max-width:1200px;width:100%;margin:0 auto;box-sizing:border-box"></div>
    </div>
  </div>`;

  // Build nav
  const nav = document.getElementById('nav');
  navItems.forEach(item => {
    const a = document.createElement('div');
    a.className = `sidebar-link${currentPage===item.id?' active':''}`;
    a.innerHTML = `<span class="icon">${item.icon}</span><span>${item.label}</span>`;
    a.onclick = () => navigate(item.id);
    nav.append(a);
  });

  // Check API
  fetch(`${API}/`).then(r=>r.ok?null:setApiStatus(false)).catch(()=>setApiStatus(false));

  navigate(currentPage);
}

function setApiStatus(ok) {
  const dot=document.getElementById('apiDot');
  if(dot) dot.style.background=ok?'#22c55e':'#ef4444';
}

function navigate(page) {
  currentPage = page;
  $$('.sidebar-link').forEach((el,i)=>el.classList.toggle('active',navItems[i].id===page));
  const titles={dashboard:'الرئيسية',clients:'العملاء',leads:'العملاء المحتملين (CRM)',invoices:'الفواتير',tasks:'المهام',obligations:'الالتزامات الضريبية',establishment:'تأسيس الشركات',documents:'الأرشيف',tax:'الإقرارات الضريبية',employees:'الموظفين',reports:'التقارير',import:'استيراد البيانات',settings:'الإعدادات'};
  const t=document.getElementById('pageTitle');
  if(t) t.textContent=titles[page]||page;
  const main=document.getElementById('main');
  if(main) main.innerHTML=`<div class="loading"><div class="spinner"></div></div>`;
  Object.keys(chartInstances).forEach(destroyChart);
  const pages={dashboard:loadDashboard,clients:loadClients,leads:loadLeads,invoices:loadInvoices,tasks:loadTasks,obligations:loadObligations,establishment:loadEstablishment,documents:loadDocuments,tax:loadTax,employees:loadEmployees,reports:loadReports,import:loadImport,settings:loadSettings};
  if(pages[page]) pages[page]();
}

        <div id="deadlineList"></div>
      </div>

    // Revenue Chart
    const revCtx = document.getElementById('revenueChart').getContext('2d');
    const months = Array.isArray(chart) ? chart : (chart?.months||[]);
    chartInstances.revenue = new Chart(revCtx, {
      type:'bar',
      data:{
        labels:months.map(m=>m.month),
        datasets:[
          {label:'إجمالي الفواتير',data:months.map(m=>m.invoiced||0),backgroundColor:'rgba(37,99,235,.15)',borderColor:'#1a2472',borderWidth:2,borderRadius:6},

        ]
      },
      options:{
        responsive:true,maintainAspectRatio:true,

        datasets:[{data:keys.map(k=>invData[k]),backgroundColor:keys.map(k=>statusColors[k]||'#94a3b8'),borderWidth:0,hoverOffset:4}]

    const legend = document.getElementById('invoiceLegend');

      d.style='display:flex;align-items:center;justify-content:space-between;font-size:12px';

      legend.append(d);
    });

    // Activity
    const actEl = document.getElementById('activityList');
    if(activity?.length) {
      activity.slice(0,6).forEach(a=>{

        actEl.append(d);
      });
    } else actEl.innerHTML='<p style="color:#94a3b8;font-size:13px;text-align:center;padding:20px">لا توجد نشاطات</p>';

    // Deadlines
    const dlEl = document.getElementById('deadlineList');
    if(deadlines?.length) {
      deadlines.slice(0,6).forEach(d=>{
        const days=daysUntil(d.due_date);
        const urgentColor=days<=3?'#dc2626':days<=7?'#d97706':'#16a34a';
        const el=document.createElement('div');
        el.style='display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f1f5f9';

        dlEl.append(el);
      });
    } else dlEl.innerHTML='<p style="color:#94a3b8;font-size:13px;text-align:center;padding:20px">لا مواعيد قادمة</p>';

  } catch(e) { toast(e.message,'error'); }
}

// ── CLIENTS ────────────────────────────────────────
let clientsData=[], clientSearch='', clientFilter='all';

async function loadClients() {
  try {
    const p = new URLSearchParams({limit:'100'});
    if(clientFilter && clientFilter!=='all') p.append('status', clientFilter);
    if(clientSearch) p.append('q', clientSearch);
    const data = await api('GET',`/api/clients?${p}`);
    if(!data) return;
    clientsData = data.items||[];
    renderClients();
  } catch(e) { toast(e.message,'error'); }
}

let invoicesData=[], invoiceFilter='all';

async function loadInvoices() {
  try {
    const p = new URLSearchParams({limit:'100'});
    if(invoiceFilter && invoiceFilter!=='all') p.append('status', invoiceFilter);
    const data=await api('GET',`/api/invoices?${p}`);
    if(!data) return;
    invoicesData=data.items||[];
    renderInvoices();
  } catch(e){toast(e.message,'error')}
}

  const collected=invoicesData.reduce((s,i)=>s+i.paid_amount,0);
  const outstanding=invoicesData.reduce((s,i)=>s+i.remaining,0);
  main.innerHTML=`
  <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:20px">
    <div class="card" style="padding:16px;display:flex;align-items:center;gap:14px">
      <div style="width:44px;height:44px;border-radius:12px;background:#eef1fb;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">📄</div>
      <div><div style="font-size:18px;font-weight:800;color:#1e293b">${money(total)}</div><div style="font-size:12px;color:#64748b">إجمالي الفواتير</div></div>
    </div>
    <div class="card" style="padding:16px;display:flex;align-items:center;gap:14px">
      <div style="width:44px;height:44px;border-radius:12px;background:#f0fdf4;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">💵</div>
      <div><div style="font-size:18px;font-weight:800;color:#16a34a">${money(collected)}</div><div style="font-size:12px;color:#64748b">إجمالي المحصّل</div></div>
    </div>
    <div class="card" style="padding:16px;display:flex;align-items:center;gap:14px">
      <div style="width:44px;height:44px;border-radius:12px;background:#fff1f2;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0">⏳</div>
      <div><div style="font-size:18px;font-weight:800;color:#dc2626">${money(outstanding)}</div><div style="font-size:12px;color:#64748b">المستحق</div></div>
    </div>
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:8px;flex-wrap:wrap">
      ${['all','paid','sent','partial','overdue','draft'].map(s=>`<button onclick="invoiceFilter='${s}';loadInvoices()" class="btn btn-sm ${invoiceFilter===s?'btn-primary':'btn-secondary'}">${{all:'الكل',paid:'مسددة',sent:'مرسلة',partial:'جزئي',overdue:'متأخرة',draft:'مسودة'}[s]}</button>`).join('')}
    </div>
    <button class="btn btn-primary" onclick="showInvoiceModal()">+ فاتورة جديدة</button>
  </div>
  <div class="card" style="overflow:hidden">
    <table>
      <thead><tr><th>رقم الفاتورة</th><th>العميل</th><th>تاريخ الإصدار</th><th>تاريخ الاستحقاق</th><th>الإجمالي</th><th>المدفوع</th><th>المتبقي</th><th>الحالة</th><th>إجراءات</th></tr></thead>
      <tbody>
        ${invoicesData.length===0?`<tr><td colspan="9" style="text-align:center;padding:40px;color:#94a3b8">لا توجد فواتير</td></tr>`:
          invoicesData.map(inv=>`
          <tr>
            <td><span style="font-weight:700;color:#1a2472">${inv.invoice_number}</span></td>
            <td style="font-weight:500;color:#374151">${inv.client_name||inv.client_id}</td>
            <td>${dateAr(inv.issue_date)}</td>
            <td style="color:${daysUntil(inv.due_date)<0&&inv.status!=='paid'?'#dc2626':'#374151'}">${dateAr(inv.due_date)}</td>
            <td style="font-weight:700;color:#1e293b">${money(inv.total)}</td>
            <td style="color:#16a34a;font-weight:600">${money(inv.paid_amount)}</td>
            <td style="color:${inv.remaining>0?'#dc2626':'#16a34a'};font-weight:600">${money(inv.remaining)}</td>
            <td><span class="badge ${statusBadge[inv.status]||'badge-gray'}">${statusLabel[inv.status]||inv.status}</span></td>
            <td>
              <div style="display:flex;gap:5px">
                ${inv.remaining>0&&inv.status!=='cancelled'?`<button class="btn btn-success btn-sm" onclick="showPaymentModal(${inv.id},${inv.remaining},'${inv.invoice_number}')">💵</button>`:''}
                <button class="btn btn-secondary btn-sm" onclick="showInvoiceModal(${inv.id})">✏️</button>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;

async function showInvoiceModal(id=null, preClientId=null) {
  let inv=null, clients=[];
  try {
    clients=(await api('GET','/api/clients?limit=200'))?.items||[];
    if(id) inv=invoicesData.find(x=>x.id===id);
  } catch(e){toast(e.message,'error');return}

  let items=inv?.items||[{description:'',quantity:1,unit_price:0,tax_percent:14}];

  const overlay=document.createElement('div');
  overlay.className='modal-overlay';

  function buildModal() {
    overlay.innerHTML=`<div class="modal" style="max-width:660px">
      <div style="padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
        <h2 style="font-size:17px;font-weight:700;color:#1e293b;margin:0">${inv?'تعديل فاتورة':'فاتورة جديدة'}</h2>
        <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button>
      </div>
      <div style="padding:20px 24px">
        <div class="form-row" style="margin-bottom:14px">
          <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">العميل *</label>
            <select id="invClient" class="input">
              ${clients.map(c=>`<option value="${c.id}" ${(preClientId||inv?.client_id)==c.id?'selected':''}>${c.name}</option>`).join('')}
            </select></div>
          <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">تاريخ الإصدار</label>
            <input id="invDate" class="input" type="date" value="${inv?.issue_date||new Date().toISOString().split('T')[0]}"/></div>
        </div>
        <div style="margin-bottom:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <label style="font-size:13px;font-weight:700;color:#374151">بنود الفاتورة</label>
            <button class="btn btn-secondary btn-sm" id="addItemBtn">+ بند</button>
          </div>
          <div id="itemsContainer"></div>
        </div>
        <div style="background:#f8fafc;border-radius:10px;padding:14px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:#64748b">المجموع</span><span id="subTotal" style="font-weight:700">0</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:#64748b">ضريبة القيمة المضافة (14%)</span><span id="taxTotal" style="font-weight:700;color:#d97706">0</span></div>
          <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:800;border-top:1.5px solid #e5e7eb;padding-top:8px;margin-top:8px"><span>الإجمالي</span><span id="grandTotal" style="color:#1a2472">0</span></div>
        </div>
      </div>
      <div style="padding:16px 24px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">إلغاء</button>
        <button id="saveInvBtn" class="btn btn-primary">💾 ${inv?'حفظ التعديلات':'إنشاء فاتورة'}</button>
      </div>
    </div>`;

    function renderItems() {
      const cont=document.getElementById('itemsContainer');
      if(!cont) return;
      cont.innerHTML='';
      let sub=0;
      items.forEach((item,i)=>{
        const row=document.createElement('div');
        row.style='display:grid;grid-template-columns:2fr 80px 100px 40px;gap:8px;margin-bottom:8px;align-items:center';
        row.innerHTML=`
          <input class="input" value="${item.description}" placeholder="وصف البند" oninput="items[${i}].description=this.value"/>
          <input class="input" type="number" value="${item.quantity}" placeholder="الكمية" min="0.1" step="0.1" oninput="items[${i}].quantity=parseFloat(this.value)||0;renderItemsInner()"/>
          <input class="input" type="number" value="${item.unit_price}" placeholder="السعر" oninput="items[${i}].unit_price=parseFloat(this.value)||0;renderItemsInner()"/>
          <button onclick="items.splice(${i},1);renderItemsInner()" style="background:#fee2e2;border:none;border-radius:8px;padding:7px;cursor:pointer;color:#dc2626;font-size:14px">${items.length>1?'✕':''}</button>`;
        cont.append(row);
        sub+=item.quantity*item.unit_price;
      });
      const tax=sub*0.14;
      document.getElementById('subTotal').textContent=money(sub);
      document.getElementById('taxTotal').textContent=money(tax);
      document.getElementById('grandTotal').textContent=money(sub+tax);
    }
    window.renderItemsInner=renderItems;
    renderItems();

    document.getElementById('addItemBtn').onclick=()=>{items.push({description:'',quantity:1,unit_price:0,tax_percent:14});renderItems()};

    document.getElementById('saveInvBtn').onclick=async()=>{
      const btn=document.getElementById('saveInvBtn');
      btn.disabled=true; btn.textContent='جاري الحفظ...';
      try {
        const sub=items.reduce((s,it)=>s+it.quantity*it.unit_price,0);
        const tax=sub*0.14;
        const body={
          client_id:parseInt($('#invClient',overlay).value),
          issue_date:$('#invDate',overlay).value,
          due_date:new Date(new Date($('#invDate',overlay).value).getTime()+30*86400000).toISOString().split('T')[0],
          subtotal:sub,tax_percent:14,tax_amount:tax,total:sub+tax,
          discount_percent:0,discount_amount:0,stamp_tax:0,withholding_tax:0,
          items:items.filter(it=>it.description.trim())
        };
        if(inv) await api('PUT',`/api/invoices/${inv.id}`,body);
        else await api('POST','/api/invoices',body);
        toast(inv?'تم تحديث الفاتورة':'تم إنشاء الفاتورة بنجاح');
        overlay.remove(); loadInvoices();
      } catch(e){toast(e.message,'error');btn.disabled=false;btn.innerHTML=`💾 ${inv?'حفظ التعديلات':'إنشاء فاتورة'}`}
    };
  }

  buildModal();
  document.body.append(overlay);
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
}

async function updateTaskStatus(id, status) {
  try {
    await api('PUT',`/api/tasks/${id}`,{status});
    tasksData=tasksData.map(t=>t.id===id?{...t,status}:t);
    renderKanban();
    toast('تم تحديث حالة المهمة');
  } catch(e){toast(e.message,'error')}
}

let docsData=[];

async function loadDocuments() {
  try {
    const data=await api('GET','/api/documents?page_size=100');
    if(!data) return;
    docsData=data.items||[];
    renderDocuments();
  } catch(e){toast(e.message,'error')}
}

const DOC_CAT_ICON={contract:'📝',invoice:'📄',tax_return:'🧾',financial_statement:'📊',id_documents:'🪪',commercial_register:'🏢',bank_statement:'🏦',payroll:'💰',other:'📁'};
const DOC_CAT_LABEL={contract:'عقد',invoice:'فاتورة',tax_return:'إقرار ضريبي',financial_statement:'قوائم مالية',id_documents:'وثائق هوية',commercial_register:'سجل تجاري',bank_statement:'كشف بنكي',payroll:'مرتبات',other:'أخرى'};

function docFileUrl(d){
  if(!d||!d.file_path) return null;
  const parts=d.file_path.replace(/\\/g,'/').split('/');
  return API+'/'+parts.map(p=>encodeURIComponent(p)).join('/');
}

function openDoc(idx){
  const d=docsData[idx];
  if(!d) return;
  const url=docFileUrl(d);
  if(!url){toast('رابط الملف غير متوفر','error');return;}
  window.open(url,'_blank');
}

function renderDocuments() {
  const main=document.getElementById('main');
  main.className='page';
  const imgExts=['.jpg','.jpeg','.png','.gif','.webp'];

  function docCard(d,idx){
    const url=docFileUrl(d);
    const ext=(d.file_type||'').toLowerCase();
    const isImg=imgExts.includes(ext);
    const sizeTxt=d.file_size?(d.file_size<1024*1024?(d.file_size/1024).toFixed(1)+' KB':(d.file_size/1024/1024).toFixed(2)+' MB'):'';
    const clientBadge=d.client_name?`<span style="font-size:10px;color:#64748b;background:#f1f5f9;padding:2px 7px;border-radius:4px;display:inline-block;margin-bottom:6px">👤 ${escH(d.client_name)}</span>`:'';
    const icon=DOC_CAT_ICON[d.category]||'📁';
    const preview=isImg&&url
      ?`<div style="height:110px;border-radius:8px;overflow:hidden;margin-bottom:10px;background:#f8fafc;border:1px solid #e2e8f0">
          <img src="${url}" style="width:100%;height:100%;object-fit:cover" onerror="this.parentElement.innerHTML='<div style=&quot;text-align:center;padding:35px;font-size:32px&quot;>${icon}</div>'"/>
        </div>`
      :`<div style="font-size:38px;margin-bottom:10px;text-align:center;padding:10px 0">${icon}</div>`;
    return `<div class="card" style="padding:14px;cursor:pointer;transition:transform .15s,box-shadow .15s" onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(0,0,0,.1)'" onmouseout="this.style.transform='';this.style.boxShadow=''" onclick="openDoc(${idx})">
      ${preview}
      <div style="font-size:12px;font-weight:600;color:#1e293b;margin-bottom:5px;word-break:break-word;line-height:1.4">${escH(d.original_name||d.name||'')}</div>
      ${clientBadge}
      <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:4px">
        <span class="badge badge-gray" style="font-size:10px">${DOC_CAT_LABEL[d.category]||d.category||'أخرى'}</span>
        <span style="font-size:10px;color:#94a3b8">${sizeTxt}</span>
      </div>
      <div style="font-size:10px;color:#cbd5e1;margin-top:5px">${dateAr(d.created_at)}</div>
    </div>`;
  }

  main.innerHTML=`
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;flex-wrap:wrap;gap:10px">
    <span style="font-size:13px;color:#64748b;font-weight:600">${docsData.length} ملف مرفوع</span>
    <button class="btn btn-primary" onclick="showUploadModal()">⬆️ رفع ملف</button>
  </div>
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px">
    ${docsData.length===0
      ? `<div style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8"><div style="font-size:48px;margin-bottom:14px">📁</div><div style="font-size:14px">لا توجد ملفات مرفوعة</div></div>`
      : docsData.map((d,i)=>docCard(d,i)).join('')}
  </div>`;
}

async function showUploadModal() {
  let clients=[];

  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.innerHTML=`<div class="modal" style="max-width:460px">
    <div style="padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
      <h2 style="font-size:17px;font-weight:700;color:#1e293b;margin:0">⬆️ رفع ملف جديد</h2>
      <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8">✕</button>
    </div>
    <div style="padding:20px 24px">
      <div style="margin-bottom:16px">
        <label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">اختر الملف *</label>
        <input id="docFile" type="file" class="input" accept=".pdf,.jpg,.jpeg,.png,.xlsx,.xls,.docx,.doc,.csv" style="padding:7px"/>
        <div id="docFilePreview" style="margin-top:8px;font-size:12px;color:#64748b"></div>
      </div>
      <div style="margin-bottom:14px">
        <label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">العميل</label>
        <select id="docClient" class="input"><option value="">— عام (بدون عميل) —</option>${clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>
      </div>
      <div>
        <label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:6px">التصنيف</label>
        <select id="docCat" class="input">
          <option value="contract">📝 عقد</option>
          <option value="invoice">📄 فاتورة</option>
          <option value="tax_return">🧾 إقرار ضريبي</option>
          <option value="financial_statement">📊 قوائم مالية</option>
          <option value="id_documents">🪪 وثائق هوية</option>
          <option value="commercial_register">🏢 سجل تجاري</option>
          <option value="bank_statement">🏦 كشف بنكي</option>
          <option value="payroll">💰 مرتبات</option>
          <option value="other">📁 أخرى</option>
        </select>
      </div>
    </div>
    <div style="padding:16px 24px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">إلغاء</button>
      <button id="uploadSaveBtn" class="btn btn-primary">⬆️ رفع الملف</button>
    </div>
  </div>`;
  document.body.append(overlay);
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};

  // File preview
  document.getElementById('docFile').onchange=function(){
    const f=this.files[0];
    const pv=document.getElementById('docFilePreview');
    if(f && pv){
      const size=f.size<1024*1024?`${(f.size/1024).toFixed(1)} KB`:`${(f.size/1024/1024).toFixed(2)} MB`;
      pv.innerHTML=`<span style="background:#f0fdf4;color:#16a34a;padding:3px 10px;border-radius:6px;font-weight:600">📎 ${f.name} — ${size}</span>`;
    }
  };

  document.getElementById('uploadSaveBtn').onclick=async()=>{
    const btn=document.getElementById('uploadSaveBtn');
    const file=document.getElementById('docFile').files[0];
    if(!file){toast('اختر ملفاً أولاً','error');return;}
    btn.disabled=true; btn.textContent='جاري الرفع...';
    try {
      const fd=new FormData();
      fd.append('file',file);
      fd.append('category',document.getElementById('docCat').value);
      const clientId=document.getElementById('docClient').value;
      if(clientId) fd.append('client_id',clientId);
      const r=await fetch(`${API}/api/documents/upload`,{method:'POST',headers:{Authorization:`Bearer ${token}`},body:fd});
      const rdata=await r.json().catch(()=>({}));
      if(!r.ok){
        let msg=rdata.detail||'خطأ في رفع الملف';
        if(Array.isArray(msg)) msg=msg.map(e=>e.msg||e).join(' | ');
        throw new Error(msg);
      }
      toast('تم رفع الملف بنجاح');
      overlay.remove(); loadDocuments();
    } catch(e){toast(e.message,'error');btn.disabled=false;btn.textContent='⬆️ رفع الملف';}
  };
}

async function loadLeads() {
  try {
    const p=new URLSearchParams({limit:'200'});
    if(leadsSearch) p.append('q',leadsSearch);
    if(leadsStatusFilter) p.append('status',leadsStatusFilter);
    const [data,stats,users]=await Promise.all([
      api('GET',`/api/leads?${p}`),
      api('GET','/api/leads/stats'),
      api('GET','/api/users'),
    ]);
    if(!data) return;
    leadsData=data.items||[];
    leadsUsersData=Array.isArray(users)?users:[];
    renderLeads(stats);
  } catch(e){toast(e.message,'error')}
}

}
function _cellSelect(field,optsHtml,extraStyle=''){
  return `<select style="width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:5px 6px;font-size:12px;font-family:inherit;background:transparent;outline:none;cursor:pointer;${extraStyle}" data-field="${field}" onchange="saveLeadCell(this)">${optsHtml}</select>`;
}

  </tr>`;

async function saveLeadCell(el) {
  const row=el.closest('tr[data-id]');
  if(!row) return;
  const rowId=row.dataset.id;
  const field=el.dataset.field;
  let value;
  if(el.type==='checkbox') value=el.checked;
  else if(el.type==='number') value=el.value!==''?parseFloat(el.value):null;
  else value=el.value||null;

  if(rowId==='new'){
    const nameEl=row.querySelector('[data-field="name"]');
    if(!nameEl||!nameEl.value.trim()) return;
    if(_leadNewSaving) return;
    _leadNewSaving=true;
    const body={status:'new'};
    row.querySelectorAll('[data-field]').forEach(inp=>{
      const f=inp.dataset.field;
      if(inp.type==='checkbox') body[f]=inp.checked;
      else if(inp.type==='number') body[f]=inp.value!==''?parseFloat(inp.value):null;
      else body[f]=inp.value||null;
    });
    try {
      const result=await api('POST','/api/leads',body);
      _leadNewSaving=false;
      if(!result) return;
      row.dataset.id=String(result.id);
      const codeEl=row.querySelector('td:first-child span');
      if(codeEl) codeEl.textContent=result.code||'—';
      const delBtn=row.querySelector('button[title="حذف"]');
      if(delBtn) delBtn.setAttribute('onclick',`deleteLeadRow(${result.id})`);
      leadsData.push(result);
      row.style.background='';
      toast('تم إضافة العميل المحتمل');
    } catch(err){_leadNewSaving=false;toast(err.message,'error');}
    return;
  }

  const id=parseInt(rowId);
  if(!id||isNaN(id)) return;

  const origColor=el.style.borderColor;
  el.style.borderColor='#f59e0b';
  try {
    await api('PUT',`/api/leads/${id}`,{[field]:value});
    if(field==='status'){
      const sc=LEAD_STATUS_COLORS[value]||'#94a3b8';
      el.style.background=`${sc}18`;
      el.style.color=sc;
      el.style.borderColor=`${sc}44`;
    } else {
      el.style.borderColor='#10b981';
      setTimeout(()=>{if(el!==document.activeElement)el.style.borderColor='transparent';},1000);
    }
    const lead=leadsData.find(l=>l.id===id);
    if(lead) lead[field]=value;
  } catch(err){
    el.style.borderColor='#ef4444';
    toast(err.message,'error');
  }
}

function addLeadRow() {
  const tbody=document.getElementById('leadsGridBody');
  if(!tbody){loadLeads();return;}
  if(tbody.querySelector('tr[data-id="new"]')){
    const n=tbody.querySelector('tr[data-id="new"] [data-field="name"]');
    if(n) n.focus();
    return;
  }
  const newLead={id:null,code:null,name:'',phone:'',company_activities:'',company_type:'',estimated_capital:null,has_office:false,suggested_name:'',status:'new',meeting_date:null,assigned_to:null,notes:''};
  const tmp=document.createElement('table');
  tmp.innerHTML=`<tbody>${_buildLeadRow(newLead)}</tbody>`;
  const tr=tmp.querySelector('tr');
  tr.style.background='#f0fdf4';
  tbody.insertBefore(tr,tbody.firstChild);
  const n=tr.querySelector('[data-field="name"]');
  if(n) n.focus();
}

async function deleteLeadRow(id) {
  if(!id){
    const nr=document.querySelector('tr[data-id="new"]');
    if(nr) nr.remove();
    return;
  }
  if(!confirm('حذف هذا العميل المحتمل؟')) return;
  try {
    await api('DELETE',`/api/leads/${id}`);
    const row=document.querySelector(`tr[data-id="${id}"]`);
    if(row) row.remove();
    leadsData=leadsData.filter(l=>l.id!==id);
    toast('تم الحذف');
  } catch(e){toast(e.message,'error');}
}

let obligationsData=[], upcomingData=[], oblTab='upcoming', oblDays=30;

async function loadObligations() {
  try {
    const [upc,obl]=await Promise.all([
      api('GET',`/api/obligations/upcoming?days=${oblDays}`),
      api('GET','/api/obligations'),
    ]);
    if(!upc) return;
    upcomingData=upc||[];
    obligationsData=obl?.items||[];
    renderObligations();
  } catch(e){toast(e.message,'error')}
}

function renderObligations() {
  const main=document.getElementById('main');

  const instBadge={upcoming:'badge-blue',pending:'badge-yellow',submitted:'badge-green',late:'badge-red',exempt:'badge-gray'};

  const freqLabel={monthly:'شهري',quarterly:'ربعي',annual:'سنوي'};

  const soon=upcomingData.filter(i=>i.days_remaining>=0&&i.days_remaining<=7).length;

  <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:20px">

      {label:'إجمالي الالتزامات',val:obligationsData.length,icon:'🔔',color:'#1a2472'},

      {label:'متأخرة',val:overdue,icon:'🚨',color:'#dc2626'},
    ].map(k=>`<div class="stat-card"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px"><span style="font-size:22px">${k.icon}</span></div><div style="font-size:26px;font-weight:800;color:#1e293b">${k.val}</div><div style="font-size:12px;color:#64748b;margin-top:4px">${k.label}</div></div>`).join('')}
  </div>
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;flex-wrap:wrap;gap:10px">
    <div style="display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      ${['upcoming','all'].map(t=>`<button onclick="oblTab='${t}';renderObligations()" class="btn btn-sm ${oblTab===t?'btn-primary':'btn-secondary'}">${t==='upcoming'?`المواعيد القادمة (${upcomingData.length})`:`كل الالتزامات (${obligationsData.length})`}</button>`).join('')}
      ${oblTab==='upcoming'?`<select onchange="oblDays=+this.value;loadObligations()" class="input" style="width:auto;font-size:12px;padding:5px 10px">
        ${[7,14,30,60].map(d=>`<option value="${d}" ${oblDays===d?'selected':''}>خلال ${d} يوم</option>`).join('')}
      </select>`:''}
      <input id="oblSearch" oninput="filterObligations(this.value)" class="input" style="width:200px;font-size:12px;padding:5px 10px" placeholder="🔍 بحث بالعميل..."/>
    </div>
    <button class="btn btn-primary" onclick="showObligationModal()">+ إضافة التزام</button>
  </div>
  ${oblTab==='upcoming'?`
  <div class="card" style="overflow:hidden">
    <table>
      <thead><tr><th>العميل</th><th>نوع الالتزام</th><th>الفترة</th><th>تاريخ الاستحقاق</th><th>المتبقي</th><th>الحالة</th><th>إجراءات</th></tr></thead>
      <tbody class="obl-tbody">
        ${upcomingData.length===0?`<tr><td colspan="7" style="text-align:center;padding:40px;color:#94a3b8">لا توجد مواعيد قادمة</td></tr>`:
          upcomingData.map(inst=>{
            const over=inst.days_remaining<0;
            const close=inst.days_remaining>=0&&inst.days_remaining<=7;
            const rowBg=over?'background:#fff5f5':close?'background:#fffbeb':'';
            return `<tr style="${rowBg}" data-client="${escH(inst.client_name||'')}">
              <td style="font-weight:600;color:#1e293b">${escH(inst.client_name||'—')}</td>
              <td style="font-size:12px">${oblLabel[inst.obligation_type]||inst.obligation_type||'—'}</td>

              <td style="font-weight:700;color:${over?'#dc2626':close?'#d97706':'#16a34a'}">

              <td><span class="badge ${instBadge[inst.status]||'badge-gray'}">${instLabel[inst.status]||inst.status}</span></td>
              <td>${inst.status!=='submitted'?`<button class="btn btn-success btn-sm" onclick="submitObligation(${inst.id})">✅ تقديم</button>`:''}</td>

      </tbody>

          obligationsData.map(o=>`<tr data-client="${escH(o.client_name||'')}">

            <td>${oblLabel[o.obligation_type]||o.obligation_type||'—'}</td>
            <td>${freqLabel[o.frequency]||o.frequency||'—'}</td>
            <td>اليوم ${o.due_day}</td>
            <td style="color:#64748b;font-size:12px">${o.assigned_name||'—'}</td>
            <td>${o.instances_count||0}</td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`}`;
}

function filterObligations(q) {
  const s=q.toLowerCase().trim();
  const tbody=document.querySelector('.obl-tbody');
  if(!tbody)return;
  tbody.querySelectorAll('tr[data-client]').forEach(tr=>{
    tr.style.display=!s||tr.dataset.client.toLowerCase().includes(s)?'':'none';
  });
}

async function submitObligation(instanceId) {

    await api('PUT',`/api/obligations/instances/${instanceId}`,{status:'submitted',submitted_at:new Date().toISOString()});

    loadObligations();
  } catch(e){toast(e.message,'error')}
}

async function fetchAndPreview() {
  const btn = document.getElementById('fetchSheetBtn');
  const url = document.getElementById('sheetUrl')?.value?.trim();
  if (!url) { toast('أدخل رابط الشيت', 'error'); return; }
  btn.disabled = true; btn.textContent = '⏳ جاري التحميل...';
  const area = document.getElementById('importPreviewArea');
  area.innerHTML = `<div class="card" style="padding:40px;text-align:center;color:#94a3b8"><div style="font-size:32px;margin-bottom:12px">⏳</div>جاري جلب وتحليل البيانات...</div>`;
  try {
    // Convert share URL to CSV export URL if needed
    let csvUrl = url;
    if (url.includes('/edit') || url.includes('/view')) {
      const match = url.match(/spreadsheets\/d\/([^/]+)/);
      const gidMatch = url.match(/[#&]gid=(\d+)/);
      if (match) {
        csvUrl = `https://docs.google.com/spreadsheets/d/${match[1]}/export?format=csv${gidMatch ? '&gid='+gidMatch[1] : ''}`;
      }
    }
    // Fetch CSV via backend proxy
    const csvResp = await fetch(csvUrl);
    if (!csvResp.ok) throw new Error('فشل في جلب البيانات من Google Sheets');
    importCsvText = await csvResp.text();
    // Send to preview endpoint
    const preview = await api('POST', '/api/import/preview', { csv_text: importCsvText });
    importPreviewData = preview;
    renderImportPreview(preview);
  } catch(e) {
    area.innerHTML = `<div class="card" style="padding:30px;text-align:center;color:#ef4444">❌ ${escH(e.message)}</div>`;
  } finally {
    btn.disabled = false; btn.textContent = '🔄 جلب البيانات وعرض المعاينة';
  }
}

function filterImportRows(filter) {
  // Update active tab
  ['all','clean','issues','inactive','dup'].forEach(t => {
    const btn = document.getElementById('iTab_'+t);
    if (btn) btn.className = 'btn btn-sm ' + (t === filter ? 'btn-primary' : 'btn-secondary');
  });
  document.querySelectorAll('.import-row').forEach(row => {
    const s = row.dataset.status;
    const inactive = row.dataset.inactive === 'true';
    let show = false;
    if (filter === 'all') show = true;
    else if (filter === 'clean') show = s === 'clean' && !inactive;
    else if (filter === 'issues') show = s === 'issues';
    else if (filter === 'inactive') show = inactive;
    else if (filter === 'dup') show = s === 'dup';
    row.style.display = show ? '' : 'none';
  });
}

async function confirmImport() {
  if (!importCsvText) { toast('لا توجد بيانات. أعد المعاينة أولاً', 'error'); return; }
  const skipDup = document.getElementById('skipDup')?.checked !== false;
  const importIssues = document.getElementById('importIssues')?.checked !== false;
  const btn = document.getElementById('confirmImportBtn');
  if (!confirm(`هل أنت متأكد من استيراد ${importPreviewData?.total || 0} شركة؟\nهذه العملية لا يمكن التراجع عنها.`)) return;
  btn.disabled = true; btn.textContent = '⏳ جاري الاستيراد...';
  try {
    const result = await api('POST', '/api/import/confirm', {
      csv_text: importCsvText,
      skip_duplicates: skipDup,
      import_with_issues: importIssues,
    });
    renderImportResult(result);
  } catch(e) {
    toast(e.message, 'error');
    btn.disabled = false;
    btn.textContent = '✅ تأكيد الاستيراد';
  }
}

async function doSendClientReminder(clientId) {
  const btn=document.getElementById('sendReminderBtn');
  const resultDiv=document.getElementById('reminderResult');
  const email=document.getElementById('reminderEmail')?.value?.trim();
  const inclObl=document.getElementById('inclObl')?.checked;
  const inclInv=document.getElementById('inclInv')?.checked;
  const msg=document.getElementById('reminderMsg')?.value?.trim();

  if(!email){resultDiv.innerHTML=`<div style="color:#dc2626;font-size:13px">⚠️ أدخل البريد الإلكتروني</div>`;return;}
  btn.disabled=true; btn.textContent='جارٍ الإرسال...';
  resultDiv.innerHTML=`<div style="color:#64748b;font-size:13px">⏳ جارٍ إرسال التذكير...</div>`;
  try {
    const r=await api('POST','/api/notifications/send-client-reminder',{
      client_id:clientId,
      to_email:email,
      include_obligations:inclObl,
      include_invoices:inclInv,
      custom_message:msg||null,
    });
    resultDiv.innerHTML=`<div style="color:#16a34a;font-size:13px;background:#f0fdf4;padding:10px;border-radius:6px">${escH(r.message)}</div>`;
    btn.textContent='✅ تم الإرسال';
    setTimeout(()=>{document.querySelector('.modal-overlay')?.remove();},2000);
  } catch(e){
    resultDiv.innerHTML=`<div style="color:#dc2626;font-size:13px">❌ ${escH(e.message)}</div>`;
    btn.disabled=false; btn.textContent='📨 إرسال التذكير';
  }
}

async function saveProfile() {
  try {
    const name=document.getElementById('profName')?.value?.trim();
    const phone=document.getElementById('profPhone')?.value?.trim();
    if(!name){toast('الاسم مطلوب','error');return}
    await api('PUT',`/api/users/${currentUser.id}`,{name,phone:phone||null});
    currentUser={...currentUser,name,phone};
    localStorage.setItem('ms_user',JSON.stringify(currentUser));
    toast('تم حفظ البيانات الشخصية بنجاح');
    renderApp();
  } catch(e){toast(e.message,'error')}
}

async function savePassword() {
  try {
    const cur=document.getElementById('curPass')?.value;
    const nw=document.getElementById('newPass')?.value;
    const cf=document.getElementById('confPass')?.value;
    if(!cur||!nw){toast('أدخل كلمات المرور','error');return}
    if(nw!==cf){toast('كلمتا المرور غير متطابقتين','error');return}
    if(nw.length<6){toast('كلمة المرور قصيرة جداً','error');return}
    await api('POST','/api/auth/change-password',{current_password:cur,new_password:nw});
    toast('تم تغيير كلمة المرور بنجاح');
    document.getElementById('curPass').value='';
    document.getElementById('newPass').value='';
    document.getElementById('confPass').value='';
  } catch(e){toast(e.message,'error')}
}
