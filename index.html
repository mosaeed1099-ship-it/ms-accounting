<!DOCTYPE html>
<!-- v2.5 — Google Drive Integration + Document Archive System -->
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>MS Accounting — نظام إدارة مكتب المحاسبة</title>
  <script src="config.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <script>
    tailwind.config = {
      theme: { extend: { fontFamily: { sans: ['Cairo','system-ui','sans-serif'] } } }
    }
  </script>
  <style>
    *{font-family:'Cairo',system-ui,sans-serif;box-sizing:border-box}
    body{background:#f1f5f9;margin:0}
    /* Sidebar */
    .sidebar-link{display:flex;align-items:center;gap:10px;padding:9px 14px;border-radius:10px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;color:rgba(255,255,255,.72);margin:1px 0}
    .sidebar-link:hover{background:rgba(255,255,255,.1);color:white}
    .sidebar-link.active{background:rgba(255,255,255,.18);color:white;box-shadow:0 3px 12px rgba(0,0,0,.2);border:1px solid rgba(255,255,255,.15)}
    .sidebar-link .icon{width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:8px;font-size:16px;flex-shrink:0;background:rgba(255,255,255,.1)}
    .sidebar-link:hover .icon{background:rgba(255,255,255,.18)}
    .sidebar-link.active .icon{background:rgba(255,255,255,.22)}
    /* Cards */
    .card{background:white;border-radius:14px;box-shadow:0 1px 4px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);border:1px solid #e8edf3}
    /* Buttons */
    .btn{display:inline-flex;align-items:center;gap:6px;padding:8px 18px;border-radius:9px;font-size:13.5px;font-weight:600;cursor:pointer;transition:all .15s;border:none;font-family:inherit}
    .btn-primary{background:linear-gradient(135deg,#1a2472,#152060);color:white;box-shadow:0 2px 8px rgba(37,99,235,.3)}
    .btn-primary:hover{background:linear-gradient(135deg,#152060,#0f1848);transform:translateY(-1px)}
    .btn-secondary{background:white;color:#374151;border:1.5px solid #d1d5db}
    .btn-secondary:hover{background:#f9fafb;border-color:#9ca3af}
    .btn-success{background:#16a34a;color:white}
    .btn-danger{background:#dc2626;color:white}
    .btn-sm{padding:5px 12px;font-size:12px}
    /* Inputs */
    .input{width:100%;padding:9px 13px;border:1.5px solid #d1d5db;border-radius:9px;font-size:13.5px;font-family:inherit;outline:none;transition:border .15s;background:white}
    .input:focus{border-color:#1a2472;box-shadow:0 0 0 3px rgba(37,99,235,.1)}
    /* Badges */
    .badge{display:inline-flex;align-items:center;padding:3px 10px;border-radius:999px;font-size:11.5px;font-weight:600}
    .badge-green{background:#dcfce7;color:#15803d}
    .badge-blue{background:#d8def5;color:#152060}
    .badge-red{background:#fee2e2;color:#dc2626}
    .badge-yellow{background:#fef9c3;color:#a16207}
    .badge-gray{background:#f3f4f6;color:#4b5563}
    .badge-purple{background:#ede9fe;color:#6d28d9}
    .badge-orange{background:#fff7ed;color:#c2410c}
    /* Table */
    table{width:100%;border-collapse:collapse;font-size:13px}
    thead th{padding:11px 14px;text-align:right;font-size:11px;color:#6b7280;font-weight:700;background:#f8fafc;border-bottom:1.5px solid #e5e7eb;text-transform:uppercase;letter-spacing:.3px}
    tbody td{padding:11px 14px;border-bottom:1px solid #f3f4f6;color:#374151}
    tbody tr:hover{background:#fafbff}
    tbody tr:last-child td{border-bottom:none}
    /* Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(15,23,42,.5);display:flex;align-items:center;justify-content:center;z-index:100;padding:16px;backdrop-filter:blur(4px)}
    .modal{background:white;border-radius:18px;width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 25px 60px rgba(0,0,0,.25)}
    /* Toast */
    .toasts{position:fixed;top:16px;left:16px;z-index:9999;display:flex;flex-direction:column;gap:8px}
    .toast-item{display:flex;align-items:center;gap:10px;padding:13px 18px;background:white;border-radius:12px;box-shadow:0 6px 20px rgba(0,0,0,.12);min-width:280px;border-right:4px solid;animation:slideIn .25s ease}
    @keyframes slideIn{from{opacity:0;transform:translateX(-24px)}to{opacity:1;transform:translateX(0)}}
    /* Kanban */
    .kanban-col{background:#f8fafc;border-radius:14px;min-height:400px;border:1.5px solid #e8edf3}
    .kanban-card{background:white;border-radius:12px;padding:14px;margin-bottom:10px;box-shadow:0 1px 4px rgba(0,0,0,.06);border:1px solid #e8edf3;transition:all .15s;cursor:pointer}
    .kanban-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1);transform:translateY(-2px)}
    /* Stat cards */
    .stat-card{background:white;border-radius:14px;padding:20px;border:1px solid #e8edf3;box-shadow:0 1px 4px rgba(0,0,0,.06);position:relative;overflow:hidden}
    .stat-card::after{content:'';position:absolute;top:0;right:0;width:4px;height:100%;border-radius:0 14px 14px 0}
    .stat-blue::after{background:linear-gradient(180deg,#4478b0,#152060)}
    .stat-green::after{background:linear-gradient(180deg,#22c55e,#15803d)}
    .stat-red::after{background:linear-gradient(180deg,#f87171,#dc2626)}
    .stat-purple::after{background:linear-gradient(180deg,#a78bfa,#5b8ec4)}
    /* Page animation */
    .page{animation:fadeUp .2s ease}
    @keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
    /* Loading */
    .spinner{width:28px;height:28px;border:3px solid #e2e8f0;border-top-color:#1a2472;border-radius:50%;animation:spin 1s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* Section headings */
    .section-title{font-size:15px;font-weight:700;color:#1a2472;margin:0 0 16px;padding-right:12px;border-right:3px solid #1a2472;line-height:1.4;display:flex;align-items:center;gap:6px}
    .page-section-title{font-size:15px;font-weight:700;color:#1a2472;margin:0 0 16px;padding:10px 14px;background:linear-gradient(135deg,#eef1fb,#f8fafc);border-radius:10px;border-right:4px solid #1a2472;display:flex;align-items:center;gap:8px}
    /* Scrollbar */
    ::-webkit-scrollbar{width:5px;height:5px}
    ::-webkit-scrollbar-track{background:#f1f5f9}
    ::-webkit-scrollbar-thumb{background:#cbd5e1;border-radius:99px}
    select,textarea{font-family:inherit}
    .form-row{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    @media(max-width:640px){.form-row{grid-template-columns:1fr}}
    .priority-urgent{border-right:3px solid #dc2626!important}
    .priority-high{border-right:3px solid #f97316!important}
    .priority-medium{border-right:3px solid #eab308!important}
    .priority-low{border-right:3px solid #22c55e!important}

    /* ── Responsive Layout ─────────────────────────────── */
    .app-sidebar{width:230px;flex-shrink:0;height:100vh;position:sticky;top:0;overflow-y:auto;background:linear-gradient(180deg,#0c1340 0%,#1a2472 55%,#1e3a8a 100%);border-left:none;box-shadow:4px 0 24px rgba(15,24,72,.35)}
    .app-main{margin-right:230px;flex:1;display:flex;flex-direction:column;min-height:100vh}
    .mobile-menu-btn{display:none;background:none;border:none;cursor:pointer;padding:6px;border-radius:8px;color:#1a2472}
    .sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:190;backdrop-filter:blur(2px)}

    @media(max-width:768px){
      /* Sidebar becomes a slide-in drawer */
      .app-sidebar{
        position:fixed;right:-250px;top:0;width:250px;height:100vh;
        z-index:200;transition:right .28s ease;
        box-shadow:none;border-left:none
      }
      .app-sidebar.open{right:0;box-shadow:-6px 0 24px rgba(0,0,0,.18)}
      .sidebar-overlay.open{display:block}
      /* Main content fills full width */
      .app-main{margin-right:0}
      /* Show hamburger button */
      .mobile-menu-btn{display:flex!important;align-items:center;justify-content:center}
      /* Tables scroll horizontally */
      .card{overflow-x:auto}
      table{min-width:500px}
      /* Kanban columns stack */
      .kanban-col{min-width:260px}
      /* Stat cards: 2 columns */
      .stats-grid{grid-template-columns:1fr 1fr!important}
      /* Page padding */
      #main{padding:16px!important}
      /* Modal full width */
      .modal{max-width:100%!important;margin:0;border-radius:14px 14px 0 0;position:fixed;bottom:0;right:0;left:0;max-height:92vh}
      .modal-overlay{align-items:flex-end}
      /* Topbar */
      .topbar-date{display:none}
      /* Login card */
      .login-card{margin:12px!important;padding:24px!important}
    }

    @media(max-width:480px){
      .stats-grid{grid-template-columns:1fr!important}
      thead th{font-size:10px;padding:8px}
      tbody td{font-size:12px;padding:8px}
    }

    /* ─── Bottom Navigation Bar (Mobile only) ─── */
    .bottom-nav{display:none}
    @media(max-width:768px){
      .bottom-nav{
        display:flex;position:fixed;bottom:0;left:0;right:0;z-index:180;
        background:white;border-top:1.5px solid #e8edf3;
        box-shadow:0 -4px 20px rgba(0,0,0,.08);
        height:62px;align-items:stretch;
        padding-bottom:env(safe-area-inset-bottom,0px);
      }
      .bottom-nav-item{
        flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
        gap:3px;border:none;background:none;cursor:pointer;padding:6px 2px;
        color:#94a3b8;font-size:10px;font-weight:600;font-family:inherit;
        transition:color .15s;-webkit-tap-highlight-color:transparent;
      }
      .bottom-nav-item .bn-icon{font-size:20px;line-height:1}
      .bottom-nav-item.active{color:#1a2472}
      .bottom-nav-item.active .bn-icon{filter:drop-shadow(0 0 4px rgba(26,36,114,.3))}
      /* push page content above bottom nav */
      #main{padding-bottom:74px!important}
      /* hide sidebar drawer toggle — bottom nav replaces it */
      .mobile-menu-btn{display:none!important}
    }

    /* ─── Page & Section Titles ─── */

    /* العناوين الرئيسية للصفحات (h2) — تدرج ناف/أزرق */
    #main h2 {
      background: linear-gradient(135deg, #1a2472 0%, #2563eb 100%) !important;
      -webkit-background-clip: text !important;
      background-clip: text !important;
      -webkit-text-fill-color: transparent !important;
    }

    /* عناوين الأقسام الداخلية (h3 في المودالات وغيرها) */
    #main h3 {
      color: #1a2472 !important;
    }

    /* العنوان في الـ topbar — أكثر وضوحاً */
    #pageTitle {
      background: linear-gradient(135deg, #0f1848 0%, #1a2472 50%, #2563eb 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      border-right-color: #2563eb !important;
    }

    /* ─── Skeleton Loading ─── */
    .skeleton{background:linear-gradient(90deg,#f0f4f8 25%,#e2e8f0 50%,#f0f4f8 75%);background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
    @keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}
    .skel-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid #f3f4f6}
    .skel-row:last-child{border-bottom:none}
    .skel-circle{border-radius:50%;flex-shrink:0}
    .skel-line{height:12px;border-radius:6px}

    /* ─── FAB ─── */
    .fab-wrap{position:fixed;bottom:80px;left:20px;z-index:170;display:flex;flex-direction:column;align-items:flex-end;gap:10px}
    @media(max-width:768px){.fab-wrap{bottom:74px}}
    .fab-main{width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,#1a2472,#2563eb);color:white;border:none;font-size:26px;cursor:pointer;box-shadow:0 4px 18px rgba(26,36,114,.4);display:flex;align-items:center;justify-content:center;transition:all .2s;font-family:inherit}
    .fab-main:hover{transform:scale(1.08);box-shadow:0 6px 24px rgba(26,36,114,.5)}
    .fab-main.open{transform:rotate(45deg);background:linear-gradient(135deg,#dc2626,#f87171)}
    .fab-menu{display:none;flex-direction:column;gap:8px;align-items:flex-end}
    .fab-menu.open{display:flex;animation:fadeUp .2s ease}
    .fab-option{display:flex;align-items:center;gap:10px;padding:9px 16px;background:white;border:1.5px solid #e8edf3;border-radius:24px;cursor:pointer;font-size:13px;font-weight:600;color:#1e293b;box-shadow:0 2px 10px rgba(0,0,0,.1);white-space:nowrap;font-family:inherit;transition:all .15s}
    .fab-option:hover{background:#eef1fb;border-color:#1a2472;color:#1a2472;transform:translateX(-3px)}
    .fab-option-icon{font-size:18px}

    /* ─── Nav Group Headers ─── */
    .nav-group-label{font-size:10px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:rgba(255,255,255,.35);padding:14px 14px 5px;margin-top:4px}
    .nav-group-label:first-child{padding-top:2px;margin-top:0}

    /* ─── Confirm Dialog ─── */
    .confirm-overlay{position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:9000;display:flex;align-items:center;justify-content:center;padding:16px;backdrop-filter:blur(4px)}
    .confirm-box{background:white;border-radius:18px;padding:28px 28px 20px;max-width:380px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.25);animation:fadeUp .2s ease}
    .confirm-box h3{margin:0 0 10px;font-size:16px;font-weight:800;color:#1e293b}
    .confirm-box p{margin:0 0 22px;font-size:14px;color:#64748b;line-height:1.6}
    .confirm-btns{display:flex;gap:10px;justify-content:flex-end}

    /* ─── Form Labels ─── */
    .form-label{display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px}

    /* ─── Empty State ─── */
    .empty-state{text-align:center;padding:48px 20px;color:#94a3b8}
    .empty-state .es-icon{font-size:40px;margin-bottom:10px}
    .empty-state .es-title{font-size:13px;font-weight:700;color:#475569;margin-bottom:6px}
    .empty-state .es-sub{font-size:12px;color:#94a3b8}

    /* ─── Print Styles ─── */
    .print-header { display:none }

    @media print {
      @page { size:A4; margin:15mm 12mm; }

      /* إخفاء عناصر الـ UI */
      .app-sidebar,
      .sidebar-overlay,
      #topbar-wrap,
      .mobile-menu-btn,
      .bottom-nav,
      .no-print,
      .btn,
      .btn-primary,
      .btn-secondary,
      .modal-overlay { display:none !important; }

      /* إخفاء الأزرار داخل الجداول والبطاقات */
      button { display:none !important; }

      /* تخطيط الطباعة */
      html, body { background:white !important; font-size:12px; color:#000; }
      .app-layout { display:block !important; }
      .app-main   { width:100% !important; padding:0 !important; }
      .page       { padding:0 !important; margin:0 !important; }

      /* رأس الطباعة */
      .print-header {
        display:flex !important;
        justify-content:space-between;
        align-items:center;
        border-bottom:2.5px solid #1a2472;
        margin-bottom:16px;
        padding-bottom:10px;
      }
      .print-header .ph-title { font-size:18px; font-weight:800; color:#1a2472; }
      .print-header .ph-meta  { font-size:11px; color:#64748b; text-align:left; }

      /* جداول */
      table { width:100% !important; border-collapse:collapse !important; font-size:11px; }
      th, td { border:1px solid #cbd5e1 !important; padding:5px 8px !important; }
      thead tr { background:#1a2472 !important; color:white !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      tfoot tr { background:#f1f5f9 !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }
      tr:nth-child(even) td { background:#f8fafc !important; -webkit-print-color-adjust:exact; print-color-adjust:exact; }

      /* بطاقات */
      div[style*="border-radius"] { break-inside:avoid; }
      .kanban-col, .kanban-card   { break-inside:avoid; }

      /* ألوان الشارات والحالات */
      * { -webkit-print-color-adjust:exact !important; print-color-adjust:exact !important; }

      /* لا تقطع الصفوف */
      tr { break-inside:avoid; page-break-inside:avoid; }
    }
  </style>

<body>
<div id="app"></div>
<div id="toasts" class="toasts"></div>

<script type="module">
// ── API URL detection ─────────────────────────────────────────────────────────
// Priority: 1) Electron desktop injection  2) localhost dev  3) production subdomain
const API = (() => {
  // 1) config.js sets window.MS_API_BASE — always wins on production
  if (window.MS_API_BASE) return window.MS_API_BASE;
  // 2) Electron desktop mode: preload exposes window.__msDesktop
  if (window.__msDesktop?.isDesktop) return window.__msDesktop.getApiUrl();
  // 3) Direct file:// open or MS_DESKTOP_PORT injected by Electron main process
  if (window.location.protocol === 'file:' || window.__MS_DESKTOP_PORT)
    return `http://127.0.0.1:${window.__MS_DESKTOP_PORT || 8765}`;
  // 4) localhost dev
  if (window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1')
    return `http://${window.location.hostname}:${window.location.port || 8765}`;
  // 5) fallback: api.domain.com
  return `https://${window.location.hostname.replace(/^[^.]+\./, 'api.')}`;
})();
let token = localStorage.getItem('ms_token');
let currentUser = JSON.parse(localStorage.getItem('ms_user') || 'null');
let currentPage = 'dashboard';
let chartInstances = {};

// ── Shared data caches ────────────────────────────────
let _clientsCache = null;
/** Return cached client list; re-fetches only when cache is cleared */
async function getClients(pageSize=500) {
  if (_clientsCache) return _clientsCache;
  const d = await api('GET', `/api/clients?page_size=${pageSize}`);
  _clientsCache = d?.items || [];
  return _clientsCache;
}
/** Call after any client create/edit/delete to force next getClients() to re-fetch */
function invalidateClientsCache() { _clientsCache = null; }

// ── Notification interval tracker ────────────────────
let _notifInterval = null;
let _fabClickHandler = null;

// ── Utilities ──────────────────────────────────────
const $ = (s,c=document) => c.querySelector(s);
const $$ = (s,c=document) => [...c.querySelectorAll(s)];
const v = id => (document.getElementById(id)||{}).value||'';

// ── API cache (stale-while-revalidate) ─────────────────────
const _AC = {
  TTL: 60000,  // 60 seconds
  key: (path) => 'api_cache_' + path,
  set(path, data) { try { sessionStorage.setItem(this.key(path), JSON.stringify({t: Date.now(), d: data})); } catch(e){} },
  get(path) { try { const v = JSON.parse(sessionStorage.getItem(this.key(path))||'null'); return v && (Date.now()-v.t < this.TTL*10) ? v : null; } catch(e){ return null; } },
  fresh(path) { try { const v = JSON.parse(sessionStorage.getItem(this.key(path))||'null'); return v && (Date.now()-v.t < this.TTL) ? v.d : null; } catch(e){ return null; } },
};

function _showStaleBanner() {
  if (document.getElementById('stale-banner')) return;
  const b = document.createElement('div');
  b.id = 'stale-banner';
  b.style.cssText = 'position:fixed;top:0;left:0;right:0;z-index:9999;background:#fef9c3;border-bottom:2px solid #fde68a;padding:8px 16px;text-align:center;font-size:13px;color:#92400e;font-weight:600';
  b.innerHTML = `⚠️ الخادم يُعاد تشغيله — تعرض بيانات مؤقتة. سيتم التحديث تلقائياً خلال لحظات... <button onclick="_hideStaleBanner()" style="margin-right:12px;background:none;border:none;cursor:pointer;font-size:16px;color:#92400e">✕</button>`;
  document.body.prepend(b);
}

function _hideStaleBanner() {
  document.getElementById('stale-banner')?.remove();
}

async function api(method, path, body=null, {retries=2, retryDelay=2000, useCache=true}={}) {
  const isGet = method === 'GET';
  const opts = {
    method,
    headers:{'Content-Type':'application/json', ...(token?{Authorization:`Bearer ${token}`}:{})},
    signal: AbortSignal.timeout(30000),
  };
  if (body) opts.body = JSON.stringify(body);

  // Return fresh cache immediately for GET (avoid spinner on repeat visits)
  if (isGet && useCache) {
    const fresh = _AC.fresh(path);
    if (fresh !== null) return fresh;
  }

  let lastErr;
  for(let attempt = 0; attempt <= retries; attempt++) {
    try {
      if(attempt > 0) await new Promise(res => setTimeout(res, retryDelay * Math.pow(1.5, attempt-1)));
      const r = await fetch(API+path, opts);
      if(r.status === 401){ logout(); return null; }
      const data = await r.json().catch(()=>({}));
      if(!r.ok) {
        let msg = 'خطأ في الطلب';
        if(typeof data.detail === 'string') msg = data.detail;
        else if(Array.isArray(data.detail)) msg = data.detail.map(e=>e.msg||e).join(' | ');
        else if(data.message) msg = data.message;
        throw new Error(msg);
      }
      // Success — cache GET, clear stale banner, restore status
      if (isGet && useCache) _AC.set(path, data);
      if(_connState !== 'ok') { _connState='ok'; setApiStatus(true,'API متصل'); }
      _hideStaleBanner();
      return data;
    } catch(e) {
      lastErr = e;
      const isNet = e.name==='TimeoutError' || e.name==='AbortError'
                 || (e.message && /fetch|Failed to fetch|NetworkError|network/i.test(e.message));
      if(isNet && attempt < retries) continue;  // retry with backoff
      if(isNet) {
        // Network error — try stale cache before giving up
        if (isGet && useCache) {
          const stale = _AC.get(path);
          if (stale) { _showStaleBanner(); return stale.d; }
        }
        throw new Error('الخادم يُعاد تشغيله — يُرجى الانتظار لحظة ثم حاول مجدداً');
      }
      throw e;
    }
  }
  throw lastErr;
}

function toast(msg, type='success') {
  const colors={success:'#16a34a',error:'#dc2626',warning:'#d97706',info:'#1a2472'};
  const icons={success:'✓',error:'✕',warning:'⚠',info:'ℹ'};
  const el=document.createElement('div');
  el.className='toast-item';
  el.style.borderColor=colors[type];
  el.innerHTML=`<span style="color:${colors[type]};font-weight:800;font-size:16px">${icons[type]}</span><span style="font-size:13px;color:#1f2937;font-weight:500">${msg}</span>`;
  document.getElementById('toasts').append(el);
  setTimeout(()=>el.remove(),4000);
}

function closeModal() {

/**
 * openModal(content, opts)          — single-arg: full HTML is modal body
 * openModal(title, content, opts)   — two-arg: title in header + content
 * opts: { wide: bool }
 */
function openModal(titleOrContent, bodyOrOpts, opts={}) {
  closeModal(); // close any existing modal
  let title = null, body = '';
  if (typeof bodyOrOpts === 'string') {
    title = titleOrContent;
    body  = bodyOrOpts;
    if (typeof opts !== 'object') opts = {};
  } else {
    body = titleOrContent;
    opts = bodyOrOpts || {};
  }
  const maxW = opts.wide ? '720px' : '560px';
  const el = document.createElement('div');
  el.className = 'modal-overlay';
  el.id = 'modal';
  el.innerHTML = `<div class="modal" style="max-width:${maxW}">
    ${title ? `<div style="padding:18px 22px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between;flex-shrink:0">
      <h3 style="font-size:15px;font-weight:800;color:#1e293b;margin:0">${title}</h3>
      <button onclick="closeModal()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8;line-height:1">✕</button>
    </div>` : ''}
    <div style="padding:${title?'18px 22px':'20px 24px'};overflow-y:auto;max-height:82vh">${body}</div>
  </div>`;
  document.body.append(el);
  el.onclick = e => { if (e.target === el) closeModal(); };
}

function skeletonTable(rows=5, cols=5) {

  const tds = rows => Array(rows).fill('').map(()=>`<tr>${Array(cols).fill('<td><div class="skeleton skel-line" style="width:${60+Math.random()*30|0}%"></div></td>').join('')}</tr>`).join('');
  return `<div class="card" style="overflow:hidden"><table><thead><tr>${ths}</tr></thead><tbody>${tds(rows)}</tbody></table></div>`;
}

/** Wrap a save button in a loading state while async fn runs */
async function withSaving(btn, fn) {
  const orig = btn.innerHTML;
  btn.disabled = true; btn.textContent = 'جاري الحفظ...';
  try { await fn(); }
  catch(e) { toast(e.message,'error'); btn.disabled=false; btn.innerHTML=orig; }
}

// ── Auth ───────────────────────────────────────────
async function login(email, password) {
  const body=new URLSearchParams({username:email,password});
  const r=await fetch(`${API}/api/auth/login`,{method:'POST',body,headers:{'Content-Type':'application/x-www-form-urlencoded'}});
  const data=await r.json();
  if(!r.ok) throw new Error(data.detail||'بيانات الدخول غير صحيحة');
  token=data.access_token; currentUser=data.user;
  localStorage.setItem('ms_token',token);
  localStorage.setItem('ms_user',JSON.stringify(currentUser));
  renderApp();
}
function logout() {
  token=null; currentUser=null;
  localStorage.removeItem('ms_token'); localStorage.removeItem('ms_user');
  renderApp();
}

  _startConnMonitor();

  navigate(currentPage);

  // Load notifications count and refresh every 2 minutes (clear any previous interval)
  loadNotifCount();

  _notifInterval = setInterval(loadNotifCount, 120000);

// ── Connection Monitor ────────────────────────────────────────────────────────
let _connState = 'ok';   // 'ok' | 'degraded' | 'offline'
let _connRetries = 0;
let _connTimer = null;

function setApiStatus(ok, label) {
  const dot  = document.getElementById('apiDot');
  const lbl  = document.getElementById('apiStatusLabel');
  if(dot) dot.style.background = ok ? '#22c55e' : (_connState === 'degraded' ? '#f59e0b' : '#ef4444');
  if(lbl) lbl.textContent = label || (ok ? 'API متصل' : 'غير متصل');
}

async function _checkConn() {
  try {
    const r = await fetch(`${API}/health`, {signal: AbortSignal.timeout(8000)});
    const data = await r.json().catch(()=>({}));
    const dbOk = data.db === 'connected';

    if(_connState !== 'ok') {
      // Was offline — restored
      _connState = 'ok';
      _connRetries = 0;
      setApiStatus(true, 'API متصل');
      toast('✅ تم استعادة الاتصال بالخادم');
      if(window._connMonitorNormal) window._connMonitorNormal();
      // Refresh current page silently
      const pages={dashboard:loadDashboard,clients:loadClients,leads:loadLeads,invoices:loadInvoices,collections:loadCollections,tasks:loadTasks,mail:loadMail,obligations:loadObligations,quotations:loadQuotations,establishment:loadEstablishment,documents:loadDocuments,tax:loadTax,settings:loadSettings,office_services:loadOfficeServices,company_docs:loadCompanyDocs,folders:loadFolders,audit_trail:loadAuditTrail,client_portal:loadClientPortal,permissions:loadPermissions};
      if(pages[currentPage]) try{ pages[currentPage](); }catch(e){}
    }

    if(!dbOk && _connState !== 'degraded') {
      _connState = 'degraded';
      setApiStatus(false, 'قاعدة البيانات غير متصلة');
    } else if(dbOk && _connState !== 'offline') {
      _connState = 'ok';
      setApiStatus(true, 'API متصل');
    }
  } catch(e) {
    if(_connState === 'ok') {
      _connState = 'offline';
      _connRetries = 0;
      setApiStatus(false, 'غير متصل...');
      toast('⚠️ انقطع الاتصال بالخادم. جارٍ إعادة المحاولة...', 'error');
      if(window._connMonitorFast) window._connMonitorFast();
    }
    _connRetries++;
    setApiStatus(false, `غير متصل (محاولة ${_connRetries})`);
  }
}

function _startConnMonitor() {
  _checkConn();
  // Check every 20s normally; if offline, check every 5s until restored
  let _connInterval = setInterval(_checkConn, 20000);
  window._connMonitorFast = () => {
    clearInterval(_connInterval);
    _connInterval = setInterval(_checkConn, 5000);
  };
  window._connMonitorNormal = () => {
    clearInterval(_connInterval);
    _connInterval = setInterval(_checkConn, 20000);
  };
  window.addEventListener('online',  () => { if(_connState !== 'ok') { _checkConn(); } });
  window.addEventListener('offline', () => {
    _connState = 'offline';
    setApiStatus(false, 'لا يوجد اتصال بالإنترنت');
    toast('❌ لا يوجد اتصال بالإنترنت', 'error');
    window._connMonitorFast();
  });
}

  if(msg && !String(msg).includes('ResizeObserver') && !String(msg).includes('Script error')) {
    // Don't show raw error to user — just log silently
  }

};

  const msg = e?.reason?.message || String(e?.reason || '');

});

let clientsData=[], clientSearch='', clientFilter='all';

async function loadClients() {
  const main=document.getElementById('main');
  if(main&&!clientsData.length){main.className='page';main.innerHTML=skeletonTable(5,7);}
  try {
    // Always fetch all clients; filtering is done client-side in renderClients()
    const data = await api('GET',`/api/clients?page_size=500`);
    if(!data) return;
    clientsData = data.items||[];
    invalidateClientsCache(); // keep shared cache in sync
    _clientsCache = clientsData;
    renderClients();
  } catch(e) { toast(e.message,'error'); }
}

      </tr></thead>
      <tbody>
        ${(()=>{
          // Client-side filter — no round-trip on each keystroke
          const q = clientSearch.toLowerCase();
          const filtered = clientsData.filter(c=>{
            if(clientFilter!=='all' && c.status!==clientFilter) return false;
            if(q) return (c.name||'').toLowerCase().includes(q)||(c.tax_number||'').includes(q)||(c.code||'').toLowerCase().includes(q);

          if(!filtered.length) return emptyStateRow(9,'👥','لا يوجد عملاء','اضغط "+ إضافة عميل" لإنشاء أول عميل');

            <td style="direction:ltr;text-align:right;color:#374151">${c.phone||'—'}</td>
            <td style="color:#374151;font-size:12px">${c.activity||'—'}</td>
            <td style="font-weight:600;color:#1e293b">${c.contract_value?money(c.contract_value):'—'}</td>
            <td>${balText}</td>
            <td><span class="badge ${statusBadge[c.status]||'badge-gray'}">${statusLabel[c.status]||c.status}</span></td>

              </div>
            </td>
          </tr>`;}).join('');
        })()}
      </tbody>
    </table>
  </div>`;
  // Client-side: search/filter calls renderClients() directly — no API round-trip
  document.getElementById('clientSearchInput').oninput=e=>{clientSearch=e.target.value;renderClients()};
  document.getElementById('clientFilterSelect').onchange=e=>{clientFilter=e.target.value;renderClients()};
}

      <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer;color:#94a3b8">✕</button>
    </div>
    <div id="timelineBody" style="flex:1;overflow-y:auto;padding:20px 22px">
      <div style="text-align:center;padding:40px;color:#94a3b8"><div class="spinner" style="margin:0 auto"></div></div>
    </div>
  </div>`;
  document.body.append(overlay);
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };

  try {
    const data = await api('GET', `/api/clients/${clientId}/timeline?limit=60`);
    const events = data?.events || [];
    const body = document.getElementById('timelineBody');
    if (!events.length) {
      body.innerHTML = '<div style="text-align:center;padding:40px;color:#94a3b8"><div style="font-size:40px;margin-bottom:10px">📭</div><div>لا توجد نشاطات بعد</div></div>';
      return;
    }

    const typeLabel = {client:'عميل',invoice:'فاتورة',payment:'دفعة',task:'مهمة',obligation:'التزام',document:'ملف',activity:'نشاط'};
    const typeBadge = {client:'badge-blue',invoice:'badge-blue',payment:'badge-green',task:'badge-purple',obligation:'badge-orange',document:'badge-gray',activity:'badge-gray'};

    // Group by date
    const grouped = {};
    events.forEach(e => {
      const d = e.date ? new Date(e.date).toLocaleDateString('ar-EG',{year:'numeric',month:'long',day:'numeric'}) : 'تاريخ غير معروف';
      if (!grouped[d]) grouped[d] = [];
      grouped[d].push(e);
    });

    body.innerHTML = Object.entries(grouped).map(([date, evts]) => `
      <div style="margin-bottom:20px">
        <div style="font-size:11px;font-weight:700;color:#94a3b8;margin-bottom:12px;display:flex;align-items:center;gap:8px;text-transform:uppercase;letter-spacing:.5px">
          <span style="flex:1;height:1px;background:#f1f5f9"></span>
          <span>${date}</span>
          <span style="flex:1;height:1px;background:#f1f5f9"></span>
        </div>
        ${evts.map(e => `
          <div style="display:flex;gap:12px;margin-bottom:12px">
            <div style="display:flex;flex-direction:column;align-items:center;flex-shrink:0">
              <div style="width:36px;height:36px;border-radius:50%;background:${e.color}22;border:2px solid ${e.color}44;display:flex;align-items:center;justify-content:center;font-size:15px">${e.icon}</div>
              <div style="width:2px;flex:1;background:#f1f5f9;margin-top:4px"></div>
            </div>
            <div style="flex:1;padding-bottom:4px">
              <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
                <div style="font-size:13px;font-weight:600;color:#1e293b">${escH(e.title||'')}</div>
                <span class="badge ${typeBadge[e.type]||'badge-gray'}" style="font-size:10px">${typeLabel[e.type]||e.type}</span>
              </div>
              ${e.subtitle?`<div style="font-size:11px;color:#64748b">${escH(e.subtitle)}</div>`:''}
              ${e.amount?`<div style="font-size:11px;color:#16a34a;font-weight:600;margin-top:2px">${e.amount.toLocaleString('ar-EG')} ج.م.</div>`:''}
              <div style="font-size:10px;color:#cbd5e1;margin-top:3px">${e.date?new Date(e.date).toLocaleTimeString('ar-EG',{hour:'2-digit',minute:'2-digit'}):''}</div>
            </div>
          </div>`).join('')}
      </div>`).join('');
  } catch(err) {
    const body = document.getElementById('timelineBody');
    if(body) body.innerHTML = `<div style="color:#dc2626;padding:20px;text-align:center">${err.message}</div>`;
  }
}

      if(c) await api('PUT',`/api/clients/${c.id}`,body);

      overlay.remove();
      invalidateClientsCache();
      loadClients();
    } catch(e){toast(e.message,'error');btn.disabled=false;btn.innerHTML=`💾 ${c?'حفظ التعديلات':'إضافة عميل'}`}
  };
}

function toggleOblLabel(cb){
  const lbl=document.getElementById('cObl_'+cb.dataset.key+'_label');
  if(lbl){lbl.style.borderColor=cb.checked?'#1a2472':'#e5e7eb';lbl.style.background=cb.checked?'#eef1fb':'#fff';}
}
window.toggleOblLabel=toggleOblLabel;

let invoicesData=[], invoiceFilter='all';

async function loadInvoices() {
  const main=document.getElementById('main');
  if(main&&!invoicesData.length){main.className='page';main.innerHTML=skeletonTable(5,8);}
  try {
    const p = new URLSearchParams({page_size:'100'});
    if(invoiceFilter && invoiceFilter!=='all') p.append('status', invoiceFilter);
    const data=await api('GET',`/api/invoices?${p}`);
    if(!data) return;
    invoicesData=data.items||[];
    renderInvoices();
  } catch(e){toast(e.message,'error')}
}

        ${invoicesData.length===0?`<tr><td colspan="9" style="text-align:center;padding:40px;color:#94a3b8">
          <div style="font-size:40px;margin-bottom:10px">💳</div>
          <div style="font-weight:700;color:#475569;margin-bottom:6px">لا توجد فواتير</div>
          <div style="font-size:12px">اضغط "+ أتعاب جديدة" لإنشاء أول فاتورة</div>
        </td></tr>`:
          invoicesData.map(inv=>`
          <tr>
            <td><span style="font-weight:700;color:#1a2472">${inv.invoice_number}</span></td>
            <td style="font-weight:500;color:#374151">${inv.client_name||inv.client_id}</td>
            <td>${dateAr(inv.issue_date)}</td>
            <td style="color:${daysUntil(inv.due_date)<0&&inv.status!=='paid'?'#dc2626':'#374151'}">${dateAr(inv.due_date)}</td>
            <td style="font-weight:700;color:#1e293b">${money(inv.total)}</td>
            <td style="color:#16a34a;font-weight:600">${money(inv.paid_amount)}</td>
            <td style="color:${inv.remaining>0?'#dc2626':'#16a34a'};font-weight:600">${money(inv.remaining)}</td>
            <td><span class="badge ${statusBadge[inv.status]||'badge-gray'}">${statusLabel[inv.status]||inv.status}</span></td>
            <td>
              <div style="display:flex;gap:5px">
                ${inv.remaining>0&&inv.status!=='cancelled'?`<button class="btn btn-success btn-sm" onclick="showPaymentModal(${inv.id},${inv.remaining},'${inv.invoice_number}')">💵</button>`:''}
                <button class="btn btn-secondary btn-sm" onclick="showInvoiceModal(${inv.id})">✏️</button>
              </div>
            </td>
          </tr>`).join('')}
      </tbody>
    </table>
  </div>`;
}

async function showInvoiceModal(id=null, preClientId=null) {
  let inv=null, clients=[];
  try {
    clients=await getClients();
    if(id) inv=invoicesData.find(x=>x.id===id);
  } catch(e){toast(e.message,'error');return}

  let items=inv?.items||[{description:'',quantity:1,unit_price:0,tax_percent:14}];

  const overlay=document.createElement('div');
  overlay.className='modal-overlay';

  function buildModal() {
    overlay.innerHTML=`<div class="modal" style="max-width:660px">
      <div style="padding:20px 24px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
        <h2 style="font-size:17px;font-weight:700;color:#1e293b;margin:0">${inv?'تعديل أتعاب':'أتعاب جديدة'}</h2>
        <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button>
      </div>
      <div style="padding:20px 24px">
        <div class="form-row" style="margin-bottom:14px">
          <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">العميل *</label>
            <select id="invClient" class="input">
              ${clients.map(c=>`<option value="${c.id}" ${(preClientId||inv?.client_id)==c.id?'selected':''}>${c.name}</option>`).join('')}
            </select></div>
          <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:5px">تاريخ الإصدار</label>
            <input id="invDate" class="input" type="date" value="${inv?.issue_date||new Date().toISOString().split('T')[0]}"/></div>
        </div>
        <div style="margin-bottom:16px">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:10px">
            <label style="font-size:13px;font-weight:700;color:#374151">بنود الفاتورة</label>
            <button class="btn btn-secondary btn-sm" id="addItemBtn">+ بند</button>
          </div>
          <div id="itemsContainer"></div>
        </div>
        <div style="background:#f8fafc;border-radius:10px;padding:14px">
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:#64748b">المجموع</span><span id="subTotal" style="font-weight:700">0</span></div>
          <div style="display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px"><span style="color:#64748b">ضريبة القيمة المضافة (14%)</span><span id="taxTotal" style="font-weight:700;color:#d97706">0</span></div>
          <div style="display:flex;justify-content:space-between;font-size:16px;font-weight:800;border-top:1.5px solid #e5e7eb;padding-top:8px;margin-top:8px"><span>الإجمالي</span><span id="grandTotal" style="color:#1a2472">0</span></div>
        </div>
      </div>
      <div style="padding:16px 24px;border-top:1px solid #f1f5f9;display:flex;gap:10px;justify-content:flex-end">
        <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">إلغاء</button>
        <button id="saveInvBtn" class="btn btn-primary">💾 ${inv?'حفظ التعديلات':'إنشاء الأتعاب'}</button>
      </div>
    </div>`;

    function renderItems() {
      const cont=document.getElementById('itemsContainer');
      if(!cont) return;
      cont.innerHTML='';
      let sub=0;
      items.forEach((item,i)=>{
        const row=document.createElement('div');
        row.style='display:grid;grid-template-columns:2fr 80px 100px 40px;gap:8px;margin-bottom:8px;align-items:center';
        row.innerHTML=`
          <input class="input" value="${item.description}" placeholder="وصف البند" oninput="items[${i}].description=this.value"/>
          <input class="input" type="number" value="${item.quantity}" placeholder="الكمية" min="0.1" step="0.1" oninput="items[${i}].quantity=parseFloat(this.value)||0;renderItemsInner()"/>
          <input class="input" type="number" value="${item.unit_price}" placeholder="السعر" oninput="items[${i}].unit_price=parseFloat(this.value)||0;renderItemsInner()"/>
          <button onclick="items.splice(${i},1);renderItemsInner()" style="background:#fee2e2;border:none;border-radius:8px;padding:7px;cursor:pointer;color:#dc2626;font-size:14px">${items.length>1?'✕':''}</button>`;
        cont.append(row);
        sub+=item.quantity*item.unit_price;
      });
      const tax=sub*0.14;
      document.getElementById('subTotal').textContent=money(sub);
      document.getElementById('taxTotal').textContent=money(tax);
      document.getElementById('grandTotal').textContent=money(sub+tax);
    }
    window.renderItemsInner=renderItems;
    renderItems();

    document.getElementById('addItemBtn').onclick=()=>{items.push({description:'',quantity:1,unit_price:0,tax_percent:14});renderItems()};

    document.getElementById('saveInvBtn').onclick=async()=>{
      const btn=document.getElementById('saveInvBtn');
      btn.disabled=true; btn.textContent='جاري الحفظ...';
      try {
        const sub=items.reduce((s,it)=>s+it.quantity*it.unit_price,0);
        const tax=sub*0.14;
        const body={
          client_id:parseInt($('#invClient',overlay).value),
          issue_date:$('#invDate',overlay).value,
          due_date:new Date(new Date($('#invDate',overlay).value).getTime()+30*86400000).toISOString().split('T')[0],
          subtotal:sub,tax_percent:14,tax_amount:tax,total:sub+tax,
          discount_percent:0,discount_amount:0,stamp_tax:0,withholding_tax:0,
          items:items.filter(it=>it.description.trim())
        };
        if(inv) await api('PUT',`/api/invoices/${inv.id}`,body);
        else await api('POST','/api/invoices',body);
        toast(inv?'تم تحديث الفاتورة':'تم إنشاء الفاتورة بنجاح');
        overlay.remove(); loadInvoices();
      } catch(e){toast(e.message,'error');btn.disabled=false;btn.innerHTML=`💾 ${inv?'حفظ التعديلات':'إنشاء فاتورة'}`}
    };
  }

  buildModal();
  document.body.append(overlay);
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
}

}

// ── TASKS (KANBAN) ─────────────────────────────────
let tasksData=[];

// ── Tasks globals ──────────────────────────────────────────────────
let tasksUsersData = [];
let _taskViewMode  = 'folders'; // 'folders' | 'kanban'
let _taskEmpFilter = null;      // {id, name} | null = all

async function loadTasks() {
  const main = document.getElementById('main');
  main.className = 'page';
  main.innerHTML='<div style="display:flex;justify-content:center;padding:60px"><div class="spinner"></div></div>';
  try {
    const [taskRes, userRes] = await Promise.all([
      api('GET', '/api/tasks?page_size=200'),
      api('GET', '/api/users').catch(() => []),
    ]);
    tasksData       = taskRes?.items || [];
    tasksUsersData  = Array.isArray(userRes) ? userRes : userRes?.items || [];
    if (_taskEmpFilter) {
      renderEmployeeTasks();
    } else if (_taskViewMode === 'kanban') {
      renderKanban();
    } else {
      renderTaskFolders();
    }
  } catch(e) { toast(e.message, 'error'); }
}

// ── Employee folder cards view ──────────────────────────────────────
function renderTaskFolders() {
  const main = document.getElementById('main');
  const priorityColor = PRIORITY_COLOR;
  const priorityLabel = PRIORITY_LABEL;

  // اجمّع مهام كل موظف
  const empMap = {};
  tasksData.forEach(t => {
    const key  = t.assigned_to || 0;
    const name = t.assigned_to_name || (key ? `مستخدم #${key}` : 'غير محدد');
    if (!empMap[key]) empMap[key] = {id: key, name, pending: [], done: []};
    if (t.status === 'done' || t.status === 'cancelled') empMap[key].done.push(t);
    else empMap[key].pending.push(t);
  });

  // رتّب: اللي عنده مهام معلقة أولاً
  const emps = Object.values(empMap).sort((a,b) => b.pending.length - a.pending.length);

  main.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;margin-bottom:20px">
    <div>
      <h2 style="font-size:18px;font-weight:800;color:#1e293b;margin:0">✅ المهام</h2>
      <p style="font-size:13px;color:#64748b;margin:4px 0 0">${tasksData.length} مهمة — ${emps.filter(e=>e.pending.length>0).length} موظف لديه مهام قيد التنفيذ</p>
    </div>
    <div style="display:flex;gap:8px">
      <button onclick="_taskViewMode='kanban';renderKanban()"
        style="padding:8px 16px;background:white;border:1.5px solid #e2e8f0;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;color:#475569">
        📋 الكانبان
      </button>
      <button onclick="showTaskModal()" class="btn btn-primary" style="font-size:13px">➕ مهمة جديدة</button>
    </div>
  </div>

  <!-- مهام غير محددة لموظف -->
  ${emps.find(e=>e.id===0) ? `
  <div style="background:#fff8f0;border:1.5px solid #fed7aa;border-radius:14px;padding:14px 18px;margin-bottom:18px;display:flex;justify-content:space-between;align-items:center">
    <div>
      <span style="font-size:13px;font-weight:700;color:#c2410c">⚠️ مهام بدون موظف محدد</span>
      <span style="font-size:12px;color:#9a3412;margin-right:10px">${emps.find(e=>e.id===0).pending.length} معلقة</span>
    </div>
    <button onclick="openEmployeeTasks(0,'غير محدد')"
      style="padding:6px 14px;background:#f97316;color:white;border:none;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer">عرض</button>
  </div>` : ''}

  <!-- بطاقات الموظفين -->
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px">
    ${emps.filter(e=>e.id!==0).map(emp => {
      const overdue = emp.pending.filter(t => t.due_date && daysUntil(t.due_date) < 0).length;
      const urgent  = emp.pending.filter(t => t.priority === 'urgent').length;
      return `
    <div style="background:white;border-radius:16px;padding:20px;border:1.5px solid #e8edf3;box-shadow:0 2px 8px rgba(0,0,0,.05);cursor:pointer;transition:transform .15s,box-shadow .15s"
         onmouseover="this.style.transform='translateY(-2px)';this.style.boxShadow='0 6px 20px rgba(0,0,0,.1)'"
         onmouseout="this.style.transform='';this.style.boxShadow='0 2px 8px rgba(0,0,0,.05)'"
         onclick="openEmployeeTasks(${emp.id},'${escH(emp.name)}')">
      <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px">
        <div style="width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,#1a2472,#2563eb);display:flex;align-items:center;justify-content:center;color:white;font-size:16px;font-weight:800;flex-shrink:0">
          ${escH(emp.name[0])}
        </div>
        <div>
          <div style="font-size:14px;font-weight:700;color:#1e293b">${escH(emp.name)}</div>
          ${overdue > 0 ? `<div style="font-size:11px;color:#dc2626;font-weight:600">⚠️ ${overdue} متأخرة</div>` :
            urgent > 0  ? `<div style="font-size:11px;color:#f97316;font-weight:600">🔴 ${urgent} عاجل</div>` :
            `<div style="font-size:11px;color:#94a3b8">لا تنبيهات</div>`}
        </div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px">
        <div style="background:#fef9c3;border-radius:10px;padding:10px;text-align:center;border:1px solid #fde68a">
          <div style="font-size:20px;font-weight:800;color:#92400e">${emp.pending.length}</div>
          <div style="font-size:10px;color:#92400e;font-weight:600">⏳ معلقة</div>
        </div>
        <div style="background:#f0fdf4;border-radius:10px;padding:10px;text-align:center;border:1px solid #bbf7d0">
          <div style="font-size:20px;font-weight:800;color:#15803d">${emp.done.length}</div>
          <div style="font-size:10px;color:#15803d;font-weight:600">✅ مكتملة</div>
        </div>
      </div>
      <!-- آخر 2 مهام معلقة -->
      ${emp.pending.slice(0,2).map(t=>`
      <div style="background:#f8fafc;border-radius:8px;padding:8px 10px;margin-bottom:5px;display:flex;justify-content:space-between;align-items:center">
        <span style="font-size:12px;color:#1e293b;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:160px">${escH(t.title)}</span>
        <span style="font-size:10px;font-weight:700;color:${priorityColor[t.priority]||'#64748b'};background:${priorityColor[t.priority]||'#64748b'}18;padding:2px 7px;border-radius:5px;white-space:nowrap">${priorityLabel[t.priority]||''}</span>
      </div>`).join('')}
      ${emp.pending.length > 2 ? `<div style="font-size:11px;color:#94a3b8;text-align:center;margin-top:4px">+ ${emp.pending.length-2} مهام أخرى</div>` : ''}
    </div>`}).join('')}

    ${emps.filter(e=>e.id!==0).length === 0 ? `
    <div style="grid-column:1/-1;text-align:center;padding:60px;color:#94a3b8">
      <div style="font-size:48px;margin-bottom:12px">✅</div>
      <div style="font-size:16px;font-weight:600">لا توجد مهام مسندة لموظفين</div>
      <div style="font-size:13px;margin-top:6px">أضف مهام وحدد الموظف المسؤول عنها</div>
    </div>` : ''}
  </div>`;
}

// ── فولدر الموظف: الشغل المفروض يعمله + اللي خلص ──────────────────
async function openEmployeeTasks(empId, empName) {
  _taskEmpFilter = {id: empId, name: empName};
  _taskViewMode  = 'folders';
  const main = document.getElementById('main');
  main.innerHTML='<div style="display:flex;justify-content:center;padding:60px"><div class="spinner"></div></div>';
  try {
    const res = empId
      ? await api('GET', `/api/tasks?assigned_to=${empId}&page_size=200`)
      : await api('GET', '/api/tasks?page_size=200');
    tasksData = (res?.items || []).filter(t => empId === 0 ? !t.assigned_to : true);
    renderEmployeeTasks();
  } catch(e) { toast(e.message, 'error'); }
}

function renderEmployeeTasks() {
  const main = document.getElementById('main');
  const emp  = _taskEmpFilter;
  const priorityColor = PRIORITY_COLOR;
  const priorityLabel = {urgent:'🔴 عاجل', high:'🟠 عالي', medium:'🟡 متوسط', low:'🟢 منخفض'}; // kanban uses emoji prefix
  const catLabel = CAT_LABEL;

  const pending = tasksData.filter(t => t.status !== 'done' && t.status !== 'cancelled');
  const done    = tasksData.filter(t => t.status === 'done');

  const taskCard = (t, showDone = false) => {
    const overdue = t.due_date && daysUntil(t.due_date) < 0 && t.status !== 'done';
    return `
    <div style="background:white;border-radius:14px;padding:16px 18px;border:1.5px solid ${overdue?'#fecaca':'#e8edf3'};box-shadow:0 1px 6px rgba(0,0,0,.04);display:flex;gap:14px;align-items:flex-start">
      <div style="flex:1;min-width:0">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;flex-wrap:wrap;margin-bottom:6px">
          <span style="font-size:14px;font-weight:700;color:${showDone?'#94a3b8':'#1e293b'};${showDone?'text-decoration:line-through':''}">${escH(t.title)}</span>
          <span style="font-size:11px;font-weight:700;color:${priorityColor[t.priority]||'#64748b'};background:${priorityColor[t.priority]||'#64748b'}18;padding:2px 9px;border-radius:8px;white-space:nowrap">${priorityLabel[t.priority]||''}</span>
        </div>
        <div style="display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:#64748b">
          ${t.client_name ? `<span>👤 ${escH(t.client_name)}</span>` : ''}
          ${t.category    ? `<span>📂 ${catLabel[t.category]||t.category}</span>` : ''}
          ${t.due_date    ? `<span style="color:${overdue?'#dc2626':'#64748b'};font-weight:${overdue?'700':'400'}">${overdue?'⚠️ متأخر: ':'📅 '}${dateAr(t.due_date)}</span>` : ''}
        </div>
        ${t.notes ? `<div style="font-size:11px;color:#94a3b8;margin-top:5px">${escH(t.notes)}</div>` : ''}
      </div>
      ${!showDone ? `
      <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0">
        <button onclick="quickDoneTask(${t.id})"
          style="padding:7px 14px;background:#15803d;color:white;border:none;border-radius:10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap">✅ خلصت</button>
        <button onclick="showTaskModal(${t.id})"
          style="padding:5px 10px;background:#f1f5f9;color:#475569;border:none;border-radius:8px;font-size:11px;font-weight:600;cursor:pointer">تعديل</button>
      </div>` : `
      <div style="flex-shrink:0">
        <span style="background:#f0fdf4;color:#15803d;padding:4px 10px;border-radius:8px;font-size:11px;font-weight:700">✓ مكتمل</span>
      </div>`}
    </div>`;
  };

  main.innerHTML = `
  <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px;margin-bottom:20px">
    <div style="display:flex;align-items:center;gap:12px">
      <button onclick="_taskEmpFilter=null;loadTasks()"
        style="background:#f1f5f9;border:none;border-radius:10px;padding:8px 14px;cursor:pointer;font-size:13px;color:#475569">← رجوع</button>

let docsData=[];

const DOC_CAT_ICON={
  contract:'📝',invoice:'📄',tax_return:'🧾',financial_statement:'📊',
  id_documents:'🪪',commercial_register:'🏢',tax_card:'💳',
  vat_certificate:'✅',bank_statement:'🏦',payroll:'💰',
  establishment:'🏗️',national_id:'🪪',other:'📁'
};
const DOC_CAT_LABEL={
  contract:'عقد',invoice:'فاتورة',tax_return:'إقرار ضريبي',
  financial_statement:'قوائم مالية',id_documents:'وثائق هوية',
  commercial_register:'سجل تجاري',tax_card:'بطاقة ضريبية',
  vat_certificate:'شهادة ق.م.ض',bank_statement:'كشف بنكي',
  payroll:'مرتبات',establishment:'تأسيس',national_id:'رقم قومي',other:'أخرى'
};

function docFileUrl(d){
  if(!d) return null;
  if(d.gdrive_view_url) return d.gdrive_view_url;
  if(!d.file_path) return null;
  const parts=d.file_path.replace(/\\/g,'/').split('/');
  return API+'/'+parts.map(p=>encodeURIComponent(p)).join('/');
}

function openDoc(idx){
  const d=docsData[idx];
  if(!d) return;
  const url=docFileUrl(d);
  if(!url){toast('رابط الملف غير متوفر','error');return;}
  window.open(url,'_blank');
}

function downloadDoc(idx,e){
  if(e) e.stopPropagation();
  const d=docsData[idx];
  if(!d){toast('الملف غير موجود','error');return;}
  if(d.gdrive_file_id){
    // Drive files: use export=download URL
    window.open(`https://drive.google.com/uc?export=download&id=${d.gdrive_file_id}`,'_blank');
  } else if(d.file_path){
    const url=docFileUrl(d);
    if(!url){toast('رابط التحميل غير متوفر','error');return;}
    const a=document.createElement('a');
    a.href=url; a.download=d.original_name||d.name||'file';
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
  } else {
    toast('لا يوجد ملف للتحميل','error');
  }
}

  let filtered=docsData;

    </div>`;
  }

  // Build unique client list for filter
  const clientOpts=[...new Map(docsData.filter(d=>d.client_id).map(d=>[d.client_id,d.client_name])).entries()];

    </select>
  </div>

  <!-- Files Grid (grouped by client) -->
  ${Object.keys(grouped).length===0
    ? `<div style="text-align:center;padding:60px;color:#94a3b8"><div style="font-size:48px;margin-bottom:14px">📁</div><div style="font-size:14px">لا توجد ملفات</div></div>`
    : Object.entries(grouped).map(([key,g])=>`
        <div style="margin-bottom:24px">
          <div style="font-size:12px;font-weight:700;color:#475569;margin-bottom:10px;display:flex;align-items:center;gap:6px">
            <span style="background:#f1f5f9;border-radius:6px;padding:3px 10px">👤 ${escH(g.client_name)}</span>

          </div>
          <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:12px">
            ${g.docs.map(d=>docCard(d,docsData.indexOf(d))).join('')}

}

function driveShowStep(n){
  [1,2,3].forEach(i=>{
    const el=document.getElementById('driveStep'+i);
    if(el) el.style.display=i===n?(i===2?'flex':'block'):'none';
  });
  const stepEl=document.getElementById('driveWizardStep');
  if(stepEl) stepEl.textContent={1:'الخطوة 1 من 3 — أدخل رابط المجلد',2:'الخطوة 2 من 3 — راجع الملفات',3:'الخطوة 3 من 3 — اكتمل الاستيراد'}[n]||'';
}

async function runDriveScan(){
  const url=document.getElementById('driveFolderUrl').value.trim();
  const apiKey=document.getElementById('driveApiKey').value.trim();
  const errEl=document.getElementById('driveScanError');
  const btn=document.getElementById('driveScanBtn');
  errEl.style.display='none';

  if(!url){errEl.textContent='أدخل رابط المجلد أولاً';errEl.style.display='block';return;}

  btn.disabled=true; btn.textContent='⏳ جاري الفحص...';
  try {
    const result=await api('POST','/api/gdrive/scan',{
      folder_url: url,
      api_key: apiKey||null
    });
    if(!result) throw new Error('لم يتم الحصول على نتائج');

    driveScannedFiles=result.files||[];

    // Show step 2
    driveShowStep(2);
    const summary=document.getElementById('driveScanSummary');
    if(summary) summary.innerHTML=`
      <b>${result.total_files}</b> ملف •
      <span style="color:#16a34a"><b>${result.matched_files}</b> مرتبط بعميل</span> •
      <span style="color:#dc2626"><b>${result.unmatched_files}</b> غير مرتبط</span>
      ${driveScannedFiles.filter(f=>f.is_duplicate).length>0?` • <span style="color:#f59e0b"><b>${driveScannedFiles.filter(f=>f.is_duplicate).length}</b> مكرر</span>`:''}
    `;
    renderDriveFilesList();
  } catch(e){
    errEl.textContent=e.message||'خطأ في الاتصال بـ Google Drive';
    errEl.style.display='block';
  } finally {
    btn.disabled=false; btn.textContent='🔍 فحص المجلد واستخراج الملفات';
  }
}

function renderDriveFilesList(){
  const container=document.getElementById('driveFilesList');
  if(!container) return;

  // Group by folder_path
  const grouped={};
  driveScannedFiles.forEach((f,i)=>{
    const key=f.folder_path||'المجلد الرئيسي';
    if(!grouped[key]) grouped[key]=[];
    grouped[key].push({...f,_idx:i});
  });

  container.innerHTML=Object.entries(grouped).map(([folder,files])=>`
    <div style="margin-bottom:20px">
      <div style="font-size:11px;font-weight:700;color:#64748b;margin-bottom:8px;padding:4px 8px;background:#f8fafc;border-radius:6px">
        📂 ${escH(folder)}
      </div>
      ${files.map(f=>driveFileRow(f)).join('')}
    </div>
  `).join('');
}

function driveFileRow(f){
  const isDup=f.is_duplicate;
  const ext=(f.name||'').split('.').pop().toLowerCase();
  const iconMap={pdf:'📄',jpg:'🖼️',jpeg:'🖼️',png:'🖼️',xlsx:'📊',xls:'📊',docx:'📝',doc:'📝',csv:'📊'};
  const fileIcon=iconMap[ext]||'📁';
  const clientOpts=driveClientsCache.map(c=>
    `<option value="${c.id}" ${f.suggested_client_id===c.id?'selected':''}>${escH(c.name)}</option>`
  ).join('');

  return `<div id="driveRow_${f._idx}" style="display:flex;align-items:flex-start;gap:10px;padding:10px;border:1px solid ${isDup?'#fef3c7':'#e2e8f0'};border-radius:8px;margin-bottom:8px;background:${isDup?'#fffbeb':'#fff'};transition:.15s" ${isDup?'title="هذا الملف موجود مسبقاً"':''}>
    <input type="checkbox" id="driveChk_${f._idx}" ${isDup?'':'checked'} style="margin-top:3px;flex-shrink:0;width:16px;height:16px;cursor:pointer" onchange="updateDriveImportBtn()"/>
    <div style="font-size:22px;flex-shrink:0">${fileIcon}</div>
    <div style="flex:1;min-width:0">
      <div style="font-size:12px;font-weight:600;color:#1e293b;white-space:nowrap;overflow:hidden;text-overflow:ellipsis" title="${escH(f.name)}">${escH(f.name)}</div>
      <div style="display:flex;gap:8px;margin-top:6px;flex-wrap:wrap">
        <select id="driveCat_${f._idx}" class="input" style="font-size:11px;padding:3px 6px;height:auto;max-width:160px">
          ${Object.entries(DOC_CAT_LABEL).map(([k,v])=>`<option value="${k}" ${f.suggested_category===k?'selected':''}>${DOC_CAT_ICON[k]||'📁'} ${v}</option>`).join('')}
        </select>
        <select id="driveCli_${f._idx}" class="input" style="font-size:11px;padding:3px 6px;height:auto;max-width:180px">
          <option value="">— بدون عميل —</option>
          ${clientOpts}
        </select>
      </div>
      ${f.suggested_client_name?`<div style="font-size:10px;color:#16a34a;margin-top:3px">✓ مرتبط بـ ${escH(f.suggested_client_name)}</div>`:'<div style="font-size:10px;color:#f59e0b;margin-top:3px">⚠ غير مرتبط بعميل</div>'}
      ${isDup?`<div style="font-size:10px;color:#d97706;margin-top:3px">⚠ موجود مسبقاً في النظام</div>`:''}
    </div>
    <a href="${escH(f.view_url)}" target="_blank" style="color:#64748b;font-size:18px;text-decoration:none;flex-shrink:0" title="فتح في Drive">🔗</a>
  </div>`;
}

function driveSelectAll(checked){
  driveScannedFiles.forEach((_,i)=>{
    const chk=document.getElementById('driveChk_'+i);
    if(chk) chk.checked=checked;
  });
  updateDriveImportBtn();
}

function updateDriveImportBtn(){
  const count=driveScannedFiles.filter((_,i)=>{
    const chk=document.getElementById('driveChk_'+i);
    return chk&&chk.checked;
  }).length;
  const btn=document.getElementById('driveImportBtn');
  if(btn) btn.textContent=`✅ استيراد ${count} ملف`;
}

async function runDriveImport(){
  const btn=document.getElementById('driveImportBtn');
  btn.disabled=true; btn.textContent='⏳ جاري الاستيراد...';

  const filesToImport=driveScannedFiles
    .map((f,i)=>{
      const chk=document.getElementById('driveChk_'+i);
      if(!chk||!chk.checked) return null;
      const catSel=document.getElementById('driveCat_'+i);
      const cliSel=document.getElementById('driveCli_'+i);
      return {
        gdrive_file_id: f.id,
        name: f.name,
        client_id: cliSel&&cliSel.value?parseInt(cliSel.value):null,
        category: catSel?catSel.value:'other',
        folder_path: f.folder_path||'',
        mime_type: f.mime_type||null,
        size: f.size||null,
      };
    })
    .filter(Boolean);

  if(!filesToImport.length){toast('لم تحدد أي ملفات','error');btn.disabled=false;btn.textContent='✅ استيراد الملفات المحددة';return;}

  try {
    const result=await api('POST','/api/gdrive/import',{files:filesToImport});
    driveShowStep(3);
    document.getElementById('driveResultMsg').textContent=`تم استيراد ${result.imported} ملف بنجاح`;
    document.getElementById('driveResultDetail').innerHTML=`
      ✅ مستورد: <b>${result.imported}</b> &nbsp;&nbsp;
      ⚠️ مكرر (تخطي): <b>${result.skipped_duplicates}</b>
      ${result.errors&&result.errors.length?`<br><span style="color:#dc2626">أخطاء: ${result.errors.join(' | ')}</span>`:''}
    `;
  } catch(e){
    toast(e.message||'خطأ في الاستيراد','error');
    btn.disabled=false; btn.textContent='✅ استيراد الملفات المحددة';
  }
}

window.showDriveImportWizard=showDriveImportWizard;
window.runDriveScan=runDriveScan;
window.runDriveImport=runDriveImport;
window.driveSelectAll=driveSelectAll;
window.updateDriveImportBtn=updateDriveImportBtn;
window.driveShowStep=driveShowStep;

    </div>

  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};

      const fd=new FormData();
      fd.append('file',file);
      fd.append('category',document.getElementById('docCat').value);
      const clientId=document.getElementById('docClient').value;
      if(clientId) fd.append('client_id',clientId);
      const r=await fetch(`${API}/api/documents/upload`,{method:'POST',headers:{Authorization:`Bearer ${token}`},body:fd});
      const rdata=await r.json().catch(()=>({}));
      if(!r.ok){
        let msg=rdata.detail||'خطأ في رفع الملف';
        if(Array.isArray(msg)) msg=msg.map(e=>e.msg||e).join(' | ');
        throw new Error(msg);
      }
      toast('تم رفع الملف بنجاح');
      overlay.remove(); loadDocuments();
    } catch(e){toast(e.message,'error');btn.disabled=false;btn.textContent='⬆️ رفع الملف';}
  };
}

async function loadTax() {
  const main = document.getElementById('main');

}

      <select id="tcMonthSel" class="input" style="font-size:13px;width:110px" onchange="tcPeriodChanged()">
        ${TC_MONTH_AR.slice(1).map((m,i)=>`<option value="${i+1}" ${_tcMonth===i+1?'selected':''}>${m}</option>`).join('')}

    <div>
      <select id="tcYearSel" class="input" style="font-size:13px;width:90px" onchange="tcPeriodChanged()">

      </select>
    </div>
    <div id="tcPeriodStatus" style="font-size:12px;color:#94a3b8"></div>
  </div>

    ${tabs.map(tabBtn).join('')}
  </div>
  <div id="taxTabContent"></div>`;

  // Async load clients
  getClients().then(clients => {
    const sel = document.getElementById('tcClientSel');
    if (!sel) return;
    clients.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      if (c.id == _tcClientId) opt.selected = true;
      sel.append(opt);

window.tcClientChanged = function() {
  const sel = document.getElementById('tcClientSel');
  _tcClientId = sel?.value || null;
  _tcClientName = sel?.selectedOptions[0]?.text || '';
  _tcLoadTab(_tcTab);
};
window.tcPeriodChanged = function() {
  _tcMonth = +document.getElementById('tcMonthSel')?.value || _tcMonth;
  _tcYear  = +document.getElementById('tcYearSel')?.value  || _tcYear;
  _tcLoadTab(_tcTab);
};

async function switchTaxTab(id) {
  _tcTab = id;
  document.querySelectorAll('[id^="ttab-"]').forEach(b => {
    const active = b.id === 'ttab-'+id;
    b.style.borderBottomColor = active ? '#1a2472' : 'transparent';
    b.style.color = active ? '#1a2472' : '#64748b';
  });
  await _tcLoadTab(id);
}

async function _tcLoadTab(id) {
  const el = document.getElementById('taxTabContent');
  if (!el) return;
  el.innerHTML = '<div style="display:flex;justify-content:center;padding:60px"><div class="spinner"></div></div>';
  try {
    if      (id === 'dashboard') await _tcRenderDashboard(el);
    else if (id === 'vat')       await _tcRenderVat(el);
    else if (id === 'wht')       await _tcRenderWht(el);
    else if (id === 'corporate') await _tcRenderCorporate(el);
    else if (id === 'salary')    await _tcRenderSalary(el);
    else if (id === 'calendar')  await _tcRenderCalendar(el);
    else if (id === 'portals')   _tcRenderPortals(el);
  } catch(e) {
    el.innerHTML = `<div style="color:#dc2626;padding:20px;background:white;border-radius:10px;border:1px solid #fca5a5">❌ ${escH(e.message)}</div>`;
  }
}

            rows.map(r => `<tr>
              <td style="font-weight:700">${TC_MONTH_AR[r.period_month]||r.period_month} ${r.period_year}</td>
              <td>${money(r.out_std_taxable||0)}</td>

window.tcVatBuild = async function() {
  const btn = event?.target;
  if (btn) { btn.disabled=true; btn.textContent='جاري البناء...'; }
  try {
    const r = await api('POST', `/api/tax-center/${_tcClientId}/vat/build`, {
      year: _tcYear, month: _tcMonth,
      force_rebuild: true,
    });
    toast(`✅ تم بناء إقرار ${TC_MONTH_AR[_tcMonth]} ${_tcYear} — صافي مستحق: ${money(r.net_vat_due||0)}`);
    await _tcVatLoadList();
  } catch(e) {
    toast(e.message, 'error');
  } finally {
    if (btn) { btn.disabled=false; btn.textContent=`⚡ بناء إقرار ${TC_MONTH_AR[_tcMonth]} ${_tcYear}`; }
  }
};

// ── WITHHOLDING ─────────────────────────────────────────────────────────────

    const [entries, returns, types] = await Promise.all([
      api('GET', `/api/tax-center/${_tcClientId}/wht/entries?year=${_tcYear}&month=${_tcMonth}`),
      api('GET', `/api/tax-center/${_tcClientId}/wht/returns?year=${_tcYear}`),
      api('GET', '/api/tax-center/wht/types'),
    ]);
    window._tcWhtTypes = types?.items || types || [];
    const eRows = (entries?.items || entries || []);
    const rRows = (returns?.items || returns || []);

    el.innerHTML = `
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">
      <div>
        <div style="font-size:13px;font-weight:700;color:#1e293b;margin-bottom:8px">قيود ${TC_MONTH_AR[_tcMonth]} ${_tcYear} (${eRows.length})</div>
        <div class="card" style="overflow:hidden">

                eRows.map(e=>`<tr>
                  <td style="padding:5px 8px">${escH(e.transaction_type||'')}</td>
                  <td style="padding:5px 8px">${escH(e.payee_name||'')}</td>

                  <td style="padding:5px 8px;text-align:left;font-weight:700;color:#7c3aed">${money(e.withholding_amount||0)}</td>
                  <td style="padding:5px 8px">${e.rate||0}%</td>

      </div>
      <div>

            <thead><tr><th>الشهر</th><th>إجمالي</th><th>ضريبة</th><th>الاستحقاق</th><th>الحالة</th></tr></thead>

                rRows.map(r=>`<tr>

window.tcWhtAddEntry = async function() {
  const types = window._tcWhtTypes || [];
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay';
  overlay.innerHTML = `<div class="modal" style="max-width:500px">
    <div style="padding:16px 20px;border-bottom:1px solid #f1f5f9;display:flex;align-items:center;justify-content:space-between">
      <h2 style="font-size:16px;font-weight:700;margin:0">✂️ قيد خصم وإضافة جديد</h2>
      <button onclick="this.closest('.modal-overlay').remove()" style="background:none;border:none;font-size:20px;cursor:pointer">✕</button>
    </div>
    <div style="padding:20px;display:grid;gap:12px">
      <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px">نوع الخدمة / المعاملة *</label>
        <select id="whtType" class="input" onchange="whtCalc()">
          <option value="">— اختر —</option>
          ${types.map(t=>`<option value="${t.code}">${escH(t.name_ar||t.code)}</option>`).join('')}

      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px">نوع المستفيد</label>
          <select id="whtPayeeType" class="input" onchange="whtCalc()">

          <input id="whtPayeeName" class="input" placeholder="اسم المستفيد"/></div>
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
        <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px">المبلغ الإجمالي (ج.م.) *</label>
          <input id="whtGross" class="input" type="number" placeholder="0" oninput="whtCalc()"/></div>
        <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px">تاريخ المعاملة</label>
          <input id="whtDate" class="input" type="date" value="${new Date().toISOString().split('T')[0]}"/></div>
      </div>
      <div id="whtCalcResult" style="background:#f8fafc;border-radius:8px;padding:12px;font-size:13px;color:#64748b;text-align:center">أدخل المبلغ لحساب الضريبة تلقائياً</div>
      <div><label style="display:block;font-size:12px;font-weight:600;color:#374151;margin-bottom:4px">ملاحظات</label>
        <input id="whtNotes" class="input" placeholder="وصف اختياري"/></div>
    </div>
    <div style="padding:12px 20px;border-top:1px solid #f1f5f9;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-secondary" onclick="this.closest('.modal-overlay').remove()">إلغاء</button>
      <button id="whtSaveBtn" class="btn btn-primary">💾 حفظ القيد</button>
    </div>
  </div>`;
  document.body.append(overlay);
  overlay.onclick = e => { if(e.target===overlay) overlay.remove(); };

  window.whtCalc = function() {
    const gross = parseFloat(document.getElementById('whtGross')?.value)||0;
    const typeCode = document.getElementById('whtType')?.value;
    const payeeType = document.getElementById('whtPayeeType')?.value || 'company';
    const el = document.getElementById('whtCalcResult');
    if (!el || !typeCode || !gross) return;
    const t = types.find(x=>x.code===typeCode);
    const rate = payeeType==='company'?(t?.rate_company||0):payeeType==='individual'?(t?.rate_individual||0):(t?.rate_foreign||20);
    const wht = gross < 300 ? 0 : Math.round(gross * rate / 100 * 100)/100;
    const net = gross - wht;
    el.style.background = wht>0?'#fef9c3':'#f0fdf4';
    el.innerHTML = `<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;text-align:center">
      <div><div style="font-weight:800;color:#1e293b">${money(gross)}</div><div style="font-size:11px;color:#64748b">إجمالي</div></div>

    </div>${gross<300?'<div style="margin-top:6px;font-size:11px;color:#94a3b8">المبلغ أقل من حد التطبيق (300 ج.م.)</div>':''}`;
    window._whtCurrent = {rate, wht, net};
  };

  document.getElementById('whtSaveBtn').onclick = async() => {
    const btn = document.getElementById('whtSaveBtn');
    btn.disabled=true; btn.textContent='جاري الحفظ...';
    const gross = parseFloat(document.getElementById('whtGross')?.value)||0;
    const txType = document.getElementById('whtType')?.value;
    if (!txType || !gross) { toast('أدخل نوع المعاملة والمبلغ','error'); btn.disabled=false; return; }
    try {
      await api('POST', `/api/tax-center/${_tcClientId}/wht/entries`, {
        transaction_type: txType,
        payee_type: document.getElementById('whtPayeeType')?.value,
        payee_name: document.getElementById('whtPayeeName')?.value,
        gross_amount: gross,
        transaction_date: document.getElementById('whtDate')?.value,
        period_year: _tcYear, period_month: _tcMonth,
        notes: document.getElementById('whtNotes')?.value,
      });
      toast('✅ تم حفظ قيد الخصم والإضافة');
      overlay.remove();
      await _tcWhtLoad();
    } catch(e) { toast(e.message,'error'); btn.disabled=false; btn.textContent='💾 حفظ القيد'; }
  };
};

window.tcSalCalc = function() {
  const base = parseFloat(document.getElementById('salBase')?.value)||0;
  const varPay = parseFloat(document.getElementById('salVar')?.value)||0;
  const allow = parseFloat(document.getElementById('salAllow')?.value)||0;
  const gross = base + varPay;
  const insBase = Math.min(Math.max(base, 2500), 9400);
  const insEmp = Math.round(insBase * 0.11 * 100)/100;
  const taxable = Math.max(0, gross - allow - insEmp - 1666.67);
  const annualTax = _calcProgressiveTax(taxable * 12);
  const monthlyTax = Math.round(annualTax / 12 * 100)/100;
  const net = Math.round((gross - insEmp - monthlyTax) * 100)/100;

  const el = document.getElementById('salResult');
  if (!el) return;
  el.style.display = 'block';
  el.innerHTML = `<div class="card" style="padding:16px">

function _calcProgressiveTax(annualTaxable) {
  const exempt = 20000;
  let taxable = Math.max(0, annualTaxable - exempt);
  const brackets = [[40000,0],[15000,10],[20000,15],[20000,20],[100000,22.5],[205000,25]];
  let tax = 0;
  for (const [size, rate] of brackets) {
    if (taxable <= 0) break;
    const portion = Math.min(taxable, size);
    tax += Math.round(portion * rate / 100 * 100)/100;
    taxable -= portion;
  }
  if (taxable > 0) tax += Math.round(taxable * 27.5 / 100 * 100)/100;
  return tax;
}

/**
 * تحويل أي صيغة رقم مصري إلى الصيغة الدولية لواتساب (201XXXXXXXXX)
 * يتعامل مع: 01x... / 1x... / 201x... / +201x...
 */
function toWAPhone(raw) {
  let d = (raw || '').replace(/\D/g, ''); // احذف كل حرف غير رقمي
  if (!d) return null;
  // إذا كان الرقم يبدأ بـ 20 وطوله 12 → صحيح مباشرة
  if (d.startsWith('20') && d.length === 12) return d;
  // إذا بدأ بـ 0 وطوله 11 → 01XXXXXXXXX → نحذف الصفر ونضيف 20
  if (d.startsWith('0') && d.length === 11) return '20' + d.slice(1);
  // إذا بدأ بـ 1 وطوله 10 → 1XXXXXXXXX → نضيف 20 مباشرة
  if (d.startsWith('1') && d.length === 10) return '20' + d;
  // أي حالة أخرى → احذف الأصفار الأولى وأضف 20
  return '20' + d.replace(/^0+/, '');
}

// Auto-fill legal entity from company type dropdown
function _onLeadCompanyTypeChange(sel){
  const row = sel.closest('tr[data-id]');
  if(!row) return;
  const legalInp = row.querySelector('[data-field="quote_legal_entity"]');
  if(!legalInp) return;
  const full = COMPANY_TYPE_FULL[sel.value] || '';
  legalInp.value = full;
  // sync to expand state
  const id = parseInt(row.dataset.id);
  if(id && _leadExpandState[id]) _leadExpandState[id].legal_entity = full;
}

// Sync inline row fields (email, legal_entity, total_fees) into _leadExpandState
function _syncLeadInlineToState(row){
  if(!row) return;
  const id = parseInt(row.dataset.id);
  if(!id || isNaN(id)) return;
  if(!_leadExpandState[id]) return;
  const emailEl = row.querySelector('[data-field="email"]');
  const legalEl = row.querySelector('[data-field="quote_legal_entity"]');
  const feesEl  = row.querySelector('[data-field="quote_total_fees"]');
  if(emailEl) _leadExpandState[id].email = emailEl.value || '';
  if(legalEl) _leadExpandState[id].legal_entity = legalEl.value || '';
  if(feesEl)  _leadExpandState[id].total_fees = feesEl.value !== '' ? parseFloat(feesEl.value) : '';
}

function _getLeadExpandState(l) {
  if (!_leadExpandState[l.id]) {
    // Initialize from saved data or defaults
    let deliverables, reqDocs;
    try { deliverables = l.quote_deliver_docs ? JSON.parse(l.quote_deliver_docs) : null; } catch(e) { deliverables = null; }
    try { reqDocs = l.quote_required_docs ? JSON.parse(l.quote_required_docs) : null; } catch(e) { reqDocs = null; }
    _leadExpandState[l.id] = {
      email: l.email || '',
      legal_entity: l.quote_legal_entity || '',
      activity: l.quote_activity || l.company_activities || '',
      capital: l.quote_capital != null ? l.quote_capital : (l.estimated_capital || ''),
      total_fees: l.quote_total_fees || l.quote_expenses_total || '',
      notes2: l.quote_notes || '',
      extra: l.losses_detail || '',
      deliverables: deliverables || LEAD_DEFAULT_DELIVERABLES.map(t => ({text: t, checked: true})),
      reqDocs: reqDocs || LEAD_DEFAULT_REQUIRED_DOCS.map(t => ({text: t, checked: true})),
    };
  }
  return _leadExpandState[l.id];
}
